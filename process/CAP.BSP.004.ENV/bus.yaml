meta:
  capability: CAP.BSP.004.ENV
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-TECH-STRAT-001  # Dual-rail event infrastructure — NORMATIVE

# ──────────────────────────────────────────────────────────────
# Bus topology — the operational rail (RabbitMQ topic exchange)
# owned by this capability. Machine-readable view consumed by
# the create-bff / implement-capability agents downstream.
# ──────────────────────────────────────────────────────────────

publication:
  broker: rabbitmq
  exchange:
    name: bsp.004.env-events
    type: topic
    durable: true
    owned_by: CAP.BSP.004.ENV
    rule_reference: ADR-TECH-STRAT-001 Rules 1, 5

  # Per ADR-TECH-STRAT-001 Rule 2, only resource events generate autonomous
  # bus messages. Business events appear ONLY as the prefix of the routing
  # key (Rule 4) — never as standalone messages.

  routing_keys:
    - resource_event: RVT.BSP.004.ENVELOPE_INITIALIZED
      paired_business_event: EVT.BSP.004.ENVELOPE_ALLOCATED
      routing_key: EVT.BSP.004.ENVELOPE_ALLOCATED.RVT.BSP.004.ENVELOPE_INITIALIZED
      schema: schemas/RVT.BSP.004.ENVELOPE_INITIALIZED.schema.json
      payload_form: domain-event-ddd

    - resource_event: RVT.BSP.004.CONSUMPTION_RECORDED
      paired_business_event: EVT.BSP.004.ENVELOPE_CONSUMED
      routing_key: EVT.BSP.004.ENVELOPE_CONSUMED.RVT.BSP.004.CONSUMPTION_RECORDED
      schema: schemas/RVT.BSP.004.CONSUMPTION_RECORDED.schema.json
      payload_form: domain-event-ddd

    - resource_event: RVT.BSP.004.ENVELOPE_CAP_REACHED
      paired_business_event: EVT.BSP.004.ENVELOPE_DEPLETED
      routing_key: EVT.BSP.004.ENVELOPE_DEPLETED.RVT.BSP.004.ENVELOPE_CAP_REACHED
      schema: schemas/RVT.BSP.004.ENVELOPE_CAP_REACHED.schema.json
      payload_form: domain-event-ddd

    - resource_event: RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION
      paired_business_event: EVT.BSP.004.ENVELOPE_UNCONSUMED
      routing_key: EVT.BSP.004.ENVELOPE_UNCONSUMED.RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION
      schema: schemas/RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION.schema.json
      payload_form: domain-event-ddd

  correlation_key: case_id
  identity_resolution: >-
    Consumers resolve case_id → OBJ.REF.001.BENEFICIARY_RECORD.internal_id via
    a CAP.REF.001.BEN lookup. This producer NEVER carries the canonical
    internal_id; it only emits the case_id (the participation case identifier
    owned by CAP.BSP.002.ENR).

# ──────────────────────────────────────────────────────────────
# Subscription side — events consumed from upstream capabilities.
# The producing exchange is owned by the upstream capability;
# this capability declares queues bound to it.
# ──────────────────────────────────────────────────────────────

subscriptions:
  - source_capability: CAP.BSP.002.ENR
    source_exchange: bsp.002.enr-events
    binding_pattern: EVT.BSP.002.BENEFICIARY_ENROLLED.RVT.BSP.002.CASE_OPENED
    queue: bsp.004.env.q.case-opened
    business_subscription: SUB.BUSINESS.BSP.004.004
    resource_subscription: SUB.RESOURCE.BSP.004.004
    consumed_by: POL.BSP.004.ENV.ON_BENEFICIARY_ENROLLED

  - source_capability: CAP.BSP.001.TIE
    source_exchange: bsp.001.tie-events
    binding_pattern: EVT.BSP.001.TIER_UPGRADED.RVT.BSP.001.TIER_UPGRADE_RECORDED
    queue: bsp.004.env.q.tier-upgraded
    business_subscription: SUB.BUSINESS.BSP.004.005
    resource_subscription: SUB.RESOURCE.BSP.004.005
    consumed_by: POL.BSP.004.ENV.ON_TIER_UPGRADED

  # Two further upstream subscriptions are EXPECTED but absent from BCM today
  # — see open questions in the README. Not declared here on purpose: bus.yaml
  # must mirror the BCM subscription chain exactly. Adding them prematurely
  # would let the implementation agent generate queues against a non-existent
  # business contract.
  #
  # Missing #1 — Transaction authorised:
  #   would bind to: bsp.004.aut-events / EVT.BSP.004.TRANSACTION_AUTHORIZED.RVT.BSP.004.PAYMENT_GRANTED
  #   would feed:    POL.BSP.004.ENV.ON_TRANSACTION_AUTHORIZED
  #   blocker:       no business-subscription declared in BCM today
  #
  # Missing #2 — Period-end timer:
  #   would bind to: a future SUP-zone scheduling capability emitting PERIOD_DUE
  #   would feed:    POL.BSP.004.ENV.ON_PERIOD_END_DUE
  #   blocker:       no scheduling capability modelled in BCM today

# ──────────────────────────────────────────────────────────────
# Known / anticipated consumers of THIS capability's events.
# Strictly evidenced consumers should be sourced from BCM
# business-subscription chain. The pack returned by `bcm-pack pack
# CAP.BSP.004.ENV --deep` does NOT include downstream subscription
# data, so the entries below are derived from the FUNC ADR-0008
# narrative (capability description "Triggers card funding —
# B2B.001.FLW" and "An unconsumed budget triggers a potential
# relapse signal" → CAP.BSP.001.SIG). Each is flagged
# `evidenced_by: func-adr-narrative` until the downstream BCM
# formalises the subscriptions.
# ──────────────────────────────────────────────────────────────

consumers:
  - capability: CAP.B2B.001.FLW
    binds_to:
      - EVT.BSP.004.ENVELOPE_ALLOCATED.RVT.BSP.004.ENVELOPE_INITIALIZED
    rationale: >-
      Card-funding capability — funds the dedicated card with the per-category
      caps published at allocation time.
    evidenced_by: func-adr-narrative   # not formal BCM subscription yet

  - capability: CAP.BSP.001.SIG
    binds_to:
      - EVT.BSP.004.ENVELOPE_UNCONSUMED.RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION
    rationale: >-
      Behavioural signal qualification — turns the counter-intuitive non-
      consumption signal into a qualified relapse signal consumed downstream
      by CAP.BSP.001.SCO and CAP.BSP.001.ARB.
    evidenced_by: func-adr-narrative

  - capability: CAP.CHN.001.DSH
    binds_to:
      - EVT.BSP.004.ENVELOPE_ALLOCATED.#
      - EVT.BSP.004.ENVELOPE_CONSUMED.#
      - EVT.BSP.004.ENVELOPE_DEPLETED.#
    rationale: >-
      Beneficiary dashboard — live update of envelope progress widgets and
      cap-reached notifications.
    evidenced_by: anticipated   # by analogy with the SCO model
