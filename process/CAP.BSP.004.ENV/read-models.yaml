meta:
  capability: CAP.BSP.004.ENV
  layer: process-modelling
  version: 0.1.0

# ──────────────────────────────────────────────────────────────
# Read models — projections built from this capability's domain
# events for query-time consumption. Read models are owned by
# this capability; outside consumers do not query the aggregate
# directly, they either subscribe to events or call a query.
# Identifier: PRJ.<ZONE>.<L1>.<L2>.<NAME> — projections
#             QRY.<ZONE>.<L1>.<L2>.<NAME> — queries served on top
# ──────────────────────────────────────────────────────────────

read_models:

  - id: PRJ.BSP.004.ENV.CURRENT_PERIOD_BUDGET_VIEW
    name: Current period budget view
    backs_resource: RES.BSP.004.OPEN_ENVELOPE
    fed_by:
      - RVT.BSP.004.ENVELOPE_INITIALIZED                # adds rows on allocation / recalibration
      - RVT.BSP.004.CONSUMPTION_RECORDED                # updates consumed_amount
      - RVT.BSP.004.ENVELOPE_CAP_REACHED                # flips status to DEPLETED
      - RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION # flips status to UNCONSUMED at closure
    fields:
      - case_id
      - period_index
      - period_start
      - period_end
      - period_status        # ACTIVE | CLOSED
      - allocation_id        # one row per envelope
      - category
      - cap_amount
      - consumed_amount
      - remaining_amount     # cap_amount - consumed_amount (denormalised for query speed)
      - envelope_status      # OPEN | DEPLETED | UNCONSUMED
      - last_consumption_at
    consistency: eventual

  - id: PRJ.BSP.004.ENV.ENVELOPE_HISTORY
    name: Envelope lifecycle history projection
    fed_by:
      - RVT.BSP.004.ENVELOPE_INITIALIZED
      - RVT.BSP.004.CONSUMPTION_RECORDED
      - RVT.BSP.004.ENVELOPE_CAP_REACHED
      - RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION
    fields:
      - case_id
      - period_index
      - allocation_id
      - category
      - lifecycle_event      # INITIALIZED | CONSUMPTION_RECORDED | CAP_REACHED | UNCONSUMED_AT_CLOSURE
      - amount               # consumption amount, or cap on init/cap_reached, or 0 on unconsumed
      - consumed_amount_after
      - occurred_at
      - source_event_id      # the RVT.* event_id that fed this row
    retention: 24m
    consistency: eventual

queries:

  - id: QRY.BSP.004.ENV.GET_CURRENT_PERIOD_BUDGET
    served_by: PRJ.BSP.004.ENV.CURRENT_PERIOD_BUDGET_VIEW
    request:
      case_id: string
    response:
      shape: object
      fields:
        - case_id
        - period_index
        - period_start
        - period_end
        - period_status
        - envelopes  # array of {allocation_id, category, cap_amount, consumed_amount, remaining_amount, envelope_status, last_consumption_at}
    consumers:
      - CAP.CHN.001.DSH  # beneficiary dashboard (envelope progress widgets)
      - CAP.CHN.002.VUE  # prescriber view (read-only oversight)
      - CAP.B2B.001.FLW  # card-funding capability (anticipated — see bus.yaml consumers note)
    api_binding: { method: GET, path: /cases/{case_id}/period-budget }
    cache: { etag: true, max_age: PT5S }

  - id: QRY.BSP.004.ENV.GET_ENVELOPE_BY_CATEGORY
    served_by: PRJ.BSP.004.ENV.CURRENT_PERIOD_BUDGET_VIEW
    request:
      case_id: string
      category: string
    response:
      shape: object
      fields: [allocation_id, category, cap_amount, consumed_amount, remaining_amount, envelope_status, period_end]
    consumers:
      - CAP.CHN.001.DSH  # beneficiary dashboard (per-category drilldown)
      - CAP.BSP.004.AUT  # authorisation pre-check (anticipated — see open question on transaction subscription)
    api_binding: { method: GET, path: /cases/{case_id}/period-budget/envelopes/{category} }
    cache: { etag: true, max_age: PT2S }

  - id: QRY.BSP.004.ENV.LIST_ENVELOPE_HISTORY
    served_by: PRJ.BSP.004.ENV.ENVELOPE_HISTORY
    request:
      case_id: string
      since: { type: date, optional: true }
      limit: { type: integer, default: 100, max: 1000 }
    response:
      shape: array
      item_fields: [period_index, allocation_id, category, lifecycle_event, amount, consumed_amount_after, occurred_at, source_event_id]
    consumers:
      - CAP.CHN.001.DSH  # progression timeline
      - CAP.CHN.002.VUE  # prescriber timeline
      - CAP.BSP.001.SIG  # relapse-signal qualifier (history of unconsumed envelopes)
    api_binding: { method: GET, path: /cases/{case_id}/envelope-history }
