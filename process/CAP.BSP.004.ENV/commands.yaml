meta:
  capability: CAP.BSP.004.ENV
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0008
    - ADR-BCM-URBA-0009

# ──────────────────────────────────────────────────────────────
# Commands — verbs this capability accepts. Each CMD is the unit
# a client (in-process policy, scheduled job, HTTP API for back-
# channel use) issues to request a state transition. A CMD is
# always handled by exactly one aggregate, and emits zero or more
# domain events.
# Identifier: CMD.<ZONE>.<L1>.<L2>.<VERB>
# ──────────────────────────────────────────────────────────────

commands:

  - id: CMD.BSP.004.ENV.ALLOCATE_PERIOD_BUDGET
    name: Allocate the period budget of a beneficiary
    intent: >-
      At enrolment time (period_index = 0) or at the start of any subsequent
      period, allocate the categorised budget envelopes for the beneficiary's
      current participation period, sized according to the active tier
      definition. Establishes the period's reference point against which all
      subsequent consumption is measured and against which non-consumption is
      detected at the end of the period.
    accepted_by: AGG.BSP.004.ENV.PERIOD_BUDGET
    issued_by:
      - POL.BSP.004.ENV.ON_BENEFICIARY_ENROLLED
    payload_schema: schemas/CMD.BSP.004.ENV.ALLOCATE_PERIOD_BUDGET.schema.json
    preconditions:
      - id: PRE.001
        rule: >-
          No prior period budget exists for (case_id, period_index). The
          allocate operation is one-shot per period.
      - id: PRE.002
        rule: >-
          case_id resolves to an active beneficiary case. The tier_snapshot
          carried by the command is presumed validated by the issuing policy
          (sourced from CAP.BSP.002.ENR / CAP.REF.001.TIE).
    invariants_enforced:
      - INV.ENV.001
      - INV.ENV.007
    emits:
      - RVT.BSP.004.ENVELOPE_INITIALIZED  # one event per envelope created (fan-out by category)
      # business-event family pivot (no autonomous bus message — Rule 2 of ADR-TECH-STRAT-001):
      # EVT.BSP.004.ENVELOPE_ALLOCATED
    errors:
      - code: PERIOD_BUDGET_ALREADY_ALLOCATED
        when: A period budget already exists for (case_id, period_index).
      - code: TIER_SNAPSHOT_EMPTY
        when: tier_snapshot.categories is missing or empty.
    idempotency:
      key: trigger.event_id
      window: lifetime  # initial allocation is a one-shot per period
    api_binding: { method: POST, path: /cases/{case_id}/period-budgets }

  - id: CMD.BSP.004.ENV.RECALIBRATE_PERIOD_BUDGET
    name: Recalibrate the active period budget on tier change
    intent: >-
      When the beneficiary moves to a new tier mid-period, recalibrate the
      current period's envelope caps according to the new tier definition.
      Adds new categories, adjusts caps on existing categories. Caps are
      clamped to already-consumed amounts to avoid retroactively revoking
      authorised spending.
    accepted_by: AGG.BSP.004.ENV.PERIOD_BUDGET
    issued_by:
      - POL.BSP.004.ENV.ON_TIER_UPGRADED
    payload_schema: schemas/CMD.BSP.004.ENV.RECALIBRATE_PERIOD_BUDGET.schema.json
    preconditions:
      - id: PRE.001
        rule: An ACTIVE period budget exists for (case_id, period_index).
      - id: PRE.002
        rule: trigger.event_id has not already been processed (idempotency by causation).
    invariants_enforced:
      - INV.ENV.002
      - INV.ENV.006
      - INV.ENV.007
    emits:
      - RVT.BSP.004.ENVELOPE_INITIALIZED  # only for newly-added categories
      - RVT.BSP.004.ENVELOPE_CAP_REACHED  # conditional — only when a cap-clamp lands at-or-below current consumed amount
      # paired EVT.* on the routing key:
      # EVT.BSP.004.ENVELOPE_ALLOCATED (for new envelopes)
      # EVT.BSP.004.ENVELOPE_DEPLETED  (for clamp-induced depletion)
    errors:
      - code: PERIOD_BUDGET_NOT_FOUND
        when: No active period budget for (case_id, period_index).
      - code: PERIOD_BUDGET_CLOSED
        when: The period budget exists but its status is CLOSED.
      - code: TRIGGER_ALREADY_PROCESSED
        when: trigger.event_id has previously been applied for this period.
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: { method: POST, path: /cases/{case_id}/period-budgets/{period_index}/recalibrations }

  - id: CMD.BSP.004.ENV.RECORD_CONSUMPTION
    name: Record a transaction's debit against an envelope
    intent: >-
      Apply a positive debit to the envelope of the given category in the
      beneficiary's active period budget. Captures the magnitude (amount) and
      atomically detects when the envelope reaches its cap, in which case
      both CONSUMPTION_RECORDED and ENVELOPE_CAP_REACHED are emitted in the
      same transaction.
    accepted_by: AGG.BSP.004.ENV.PERIOD_BUDGET
    issued_by:
      - POL.BSP.004.ENV.ON_TRANSACTION_AUTHORIZED  # placeholder — see policies.yaml
    payload_schema: schemas/CMD.BSP.004.ENV.RECORD_CONSUMPTION.schema.json
    preconditions:
      - id: PRE.001
        rule: An ACTIVE period budget exists for (case_id, period_index).
      - id: PRE.002
        rule: An envelope of the requested `category` exists and is OPEN.
      - id: PRE.003
        rule: trigger.event_id has not already been processed (idempotency by causation).
    invariants_enforced:
      - INV.ENV.002
      - INV.ENV.003
      - INV.ENV.004
      - INV.ENV.007
    emits:
      - RVT.BSP.004.CONSUMPTION_RECORDED  # always
      - RVT.BSP.004.ENVELOPE_CAP_REACHED  # conditional — only when cap reached/crossed atomically
      # paired EVT.* on the routing key:
      # EVT.BSP.004.ENVELOPE_CONSUMED, EVT.BSP.004.ENVELOPE_DEPLETED
    errors:
      - code: PERIOD_BUDGET_NOT_FOUND
        when: No active period budget for (case_id, period_index).
      - code: ENVELOPE_NOT_FOUND
        when: No envelope matches the requested category.
      - code: ENVELOPE_NOT_OPEN
        when: The envelope status is DEPLETED or UNCONSUMED.
      - code: AMOUNT_NOT_POSITIVE
        when: amount <= 0.
      - code: TRIGGER_ALREADY_PROCESSED
        when: trigger.event_id has previously been applied.
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: { method: POST, path: /cases/{case_id}/period-budgets/{period_index}/consumptions }

  - id: CMD.BSP.004.ENV.CLOSE_PERIOD
    name: Close the active period and emit unconsumed signals
    intent: >-
      At the end of the period, close every envelope of the period budget.
      For each envelope whose consumed_amount is at or below the configurable
      unconsumed threshold (default 5% of cap), emit one
      ENVELOPE_PERIOD_WITHOUT_CONSUMPTION event — the counter-intuitive
      relapse signal. Envelopes above the threshold close silently. The
      period budget transitions to CLOSED.
    accepted_by: AGG.BSP.004.ENV.PERIOD_BUDGET
    issued_by:
      - POL.BSP.004.ENV.ON_PERIOD_END_DUE  # placeholder — see policies.yaml
    payload_schema: schemas/CMD.BSP.004.ENV.CLOSE_PERIOD.schema.json
    preconditions:
      - id: PRE.001
        rule: An ACTIVE period budget exists for (case_id, period_index).
      - id: PRE.002
        rule: closing_at is at or after period_end.
      - id: PRE.003
        rule: trigger.event_id has not already been processed (idempotency by causation).
    invariants_enforced:
      - INV.ENV.002
      - INV.ENV.005
      - INV.ENV.007
    emits:
      - RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION  # one per unconsumed envelope
      # paired EVT.* on the routing key:
      # EVT.BSP.004.ENVELOPE_UNCONSUMED
    errors:
      - code: PERIOD_BUDGET_NOT_FOUND
        when: No active period budget for (case_id, period_index).
      - code: PERIOD_NOT_DUE
        when: closing_at < period_end.
      - code: PERIOD_ALREADY_CLOSED
        when: Status is already CLOSED.
      - code: TRIGGER_ALREADY_PROCESSED
        when: trigger.event_id has previously been applied.
    idempotency:
      key: trigger.event_id
      window: 30d
    api_binding: { method: POST, path: /cases/{case_id}/period-budgets/{period_index}/closures }
