meta:
  capability: CAP.BSP.004.ENV
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0008  # L2 breakdown of CAP.BSP.004 — Transaction Control
    - ADR-BCM-URBA-0009  # event meta-model
    - ADR-TECH-STRAT-001 # Rule 3 — payload form is a domain-event DDD (atomic transition)

# ──────────────────────────────────────────────────────────────
# Aggregates — the consistency boundaries of this capability.
# Each AGG owns a piece of state, accepts commands, enforces
# invariants atomically, and emits domain events on transition.
# Identifier: AGG.<ZONE>.<L1>.<L2>.<NAME>
#
# Granularity decision: one aggregate per (case_id, period_index)
# i.e. the period budget for one beneficiary in one period. The
# envelopes (one per spending category) live as inner entities of
# the period budget, not as separate aggregates. Rationale:
#   • Initial allocation at enrolment fans out to N envelopes —
#     atomic on a single aggregate, no orchestrator required.
#   • Tier-upgrade recalibration touches all envelopes of the
#     active period — atomic.
#   • Period closure must emit one PERIOD_WITHOUT_CONSUMPTION
#     event per unconsumed envelope — atomic on the same aggregate.
#   • Consumption (RECORD_CONSUMPTION) targets exactly one envelope
#     by category, so per-transaction contention is bounded by the
#     beneficiary's own usage rate — acceptable for the domain.
#   • Avoids a process-manager / saga, which the process modelling
#     DSL does not represent natively (a policy issues exactly one
#     command).
# Alternative envelope-per-aggregate granularity rejected — see
# README "Open process-level questions".
# ──────────────────────────────────────────────────────────────

aggregates:

  - id: AGG.BSP.004.ENV.PERIOD_BUDGET
    name: Period budget of a beneficiary
    business_object: OBJ.BSP.004.ALLOCATION
    aggregate_id_field: period_budget_id   # composite identity, derived: "{case_id}.{period_index}"
    cardinality: one-per-case-and-period
    description: >-
      Per-(beneficiary, period) singleton holding the categorised budget
      envelopes for a beneficiary's current participation period. All envelope
      lifecycle transitions for that period — allocation, recalibration on
      tier change, debit on transaction, closure at period end — pass through
      this aggregate to guarantee a single source of truth on caps and
      consumption, and atomic detection of cap-reached and end-of-period
      unconsumed states.

    state:
      - field: period_budget_id
        kind: identity
        derivation: "{case_id}.{period_index}"
      - field: case_id
        kind: identity
      - field: period_index
        kind: identity
      - field: period_start
        kind: snapshot
      - field: period_end
        kind: snapshot
      - field: tier_snapshot
        kind: configuration
        description: >-
          Snapshot of the categories and caps coming from the beneficiary's
          tier definition (CAP.REF.001.TIE) at the moment the period was
          allocated or last recalibrated. Holds {category, cap_amount} pairs.
      - field: envelopes
        kind: snapshot
        description: >-
          Inner collection of envelope value-objects, one per category. Each
          envelope holds: allocation_id, category, cap_amount, consumed_amount,
          status (OPEN | DEPLETED | UNCONSUMED), last_consumption_event_id.
      - field: status
        kind: snapshot
        description: ACTIVE | CLOSED — period-level lifecycle.
      - field: last_processed_trigger_event_id
        kind: idempotency
      - field: last_recalibration_event_id
        kind: idempotency

    accepted_commands:
      - CMD.BSP.004.ENV.ALLOCATE_PERIOD_BUDGET
      - CMD.BSP.004.ENV.RECALIBRATE_PERIOD_BUDGET
      - CMD.BSP.004.ENV.RECORD_CONSUMPTION
      - CMD.BSP.004.ENV.CLOSE_PERIOD

    emitted_resource_events:
      - RVT.BSP.004.ENVELOPE_INITIALIZED                # one per envelope created at allocation/recalibration
      - RVT.BSP.004.CONSUMPTION_RECORDED                # one per RECORD_CONSUMPTION
      - RVT.BSP.004.ENVELOPE_CAP_REACHED                # conditional — atomic with consumption when envelope cap hit
      - RVT.BSP.004.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION # one per unconsumed envelope at CLOSE_PERIOD

    invariants:

      - id: INV.ENV.001
        rule: >-
          Exactly one period budget per (case_id, period_index).
          CMD.ALLOCATE_PERIOD_BUDGET is rejected if the aggregate already exists.
        rationale: >-
          ADR-BCM-FUNC-0008 — a beneficiary holds at most one open period at a
          time, and each period is defined by an integer index advancing on
          each closure-then-reopen cycle.

      - id: INV.ENV.002
        rule: >-
          CMD.RECALIBRATE_PERIOD_BUDGET, CMD.RECORD_CONSUMPTION and
          CMD.CLOSE_PERIOD are rejected if the period budget has not been
          allocated yet (status would be missing). Enforces causal ordering:
          allocate → consume → close.
        rationale: Avoids debits or closures on a non-existent envelope set.

      - id: INV.ENV.003
        rule: >-
          CMD.RECORD_CONSUMPTION targets exactly one inner envelope identified
          by `category`. The command is rejected if no envelope matches that
          category, if the envelope status != OPEN, or if amount <= 0.
        rationale: >-
          The envelope is the atomic debit unit; cross-category transfers are
          not part of this capability's contract.

      - id: INV.ENV.004
        rule: >-
          When RECORD_CONSUMPTION causes an envelope's `consumed_amount` to
          reach or exceed its `cap_amount`, the aggregate emits BOTH
          RVT.CONSUMPTION_RECORDED and RVT.ENVELOPE_CAP_REACHED in the same
          transaction; the envelope status flips to DEPLETED atomically and
          subsequent RECORD_CONSUMPTION on that envelope is rejected
          (INV.ENV.003). Never one event without the other when the threshold
          is crossed.
        rationale: >-
          Prevents a downstream observer from seeing a consumption without the
          paired cap-reached event. Matches the domain-event-DDD semantics of
          ADR-TECH-STRAT-001 Rule 3, mirroring the SCO pattern for atomic
          threshold detection.
        open_question: >-
          Could be lifted to a separate observer reacting to
          RVT.CONSUMPTION_RECORDED. Rejected here because cap detection is a
          property of the envelope's own state — externalising it duplicates
          the cap-amount knowledge.

      - id: INV.ENV.005
        rule: >-
          CMD.CLOSE_PERIOD is valid only when `closing_at >= period_end` and
          the period is not already CLOSED. On closure, for each inner
          envelope whose `consumed_amount <= cap_amount * unconsumed_threshold`
          (default 0.05, configurable by command payload), emit one
          RVT.ENVELOPE_PERIOD_WITHOUT_CONSUMPTION; envelopes above the
          threshold do NOT produce that event. The aggregate transitions
          status to CLOSED atomically.
        rationale: >-
          ADR-BCM-FUNC-0008 — the unconsumed envelope is the counter-intuitive
          relapse signal; a marginal-consumption threshold prevents trivial
          test transactions from masking the signal.
        open_question: >-
          The numeric threshold (here defaulted to 5%) is a product/regulatory
          decision. Captured here as a command parameter so it can evolve
          without changing the contract.

      - id: INV.ENV.006
        rule: >-
          CMD.RECALIBRATE_PERIOD_BUDGET adjusts the cap_amount of existing
          envelopes and may add new categories present in the new tier.
          Existing envelopes whose category is no longer in the new tier
          remain in the period until closure (no retroactive deletion).
          The new cap_amount of an existing envelope must NOT be set below
          its current `consumed_amount` — instead, the cap is clamped to
          consumed_amount (the envelope becomes immediately DEPLETED if
          consumed >= new cap, emitting RVT.ENVELOPE_CAP_REACHED).
        rationale: >-
          A tier upgrade is conceptually expansive (more autonomy, larger
          caps), but downgrades or category reshuffles must not retroactively
          revoke spending already authorised.
        open_question: >-
          ADR-BCM-FUNC-0008 does not specify whether tier upgrade triggers
          in-place recalibration or a period close-then-reopen. We pick
          in-place — to be confirmed with the upstream FUNC ADR.

      - id: INV.ENV.007
        rule: >-
          A single trigger.event_id is applied at most once per command kind.
          Duplicates are silently dropped (idempotent no-op).
        rationale: At-least-once delivery on the bus — consumers must tolerate replay.

    consistency_boundary: per-aggregate-instance
    transactional_outbox: required
    snapshotting:
      strategy: every-N-events
      n: 100
