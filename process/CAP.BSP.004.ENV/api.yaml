meta:
  capability: CAP.BSP.004.ENV
  layer: process-modelling
  version: 0.1.0
  derivation: >-
    This file is the synthesised HTTP/RPC surface of CAP.BSP.004.ENV. It is
    DERIVED from commands.yaml + read-models.yaml — the api_binding fields
    declared there. Keep in sync; the BFF/microservice scaffolding agents
    consume this view, not the raw command/query files.

api:
  base_path: /capabilities/bsp/004/env
  authentication: bearer-token (sourced from CAP.SUP.001 — out of scope here)

  # ── Command endpoints (state-mutating) ──
  commands:
    - operation_id: allocatePeriodBudget
      method: POST
      path: /cases/{case_id}/period-budgets
      issues: CMD.BSP.004.ENV.ALLOCATE_PERIOD_BUDGET
      request_schema: schemas/CMD.BSP.004.ENV.ALLOCATE_PERIOD_BUDGET.schema.json
      responses:
        201: { description: "Period budget allocated; body summarises the envelopes created (one per category)" }
        409: { description: "PERIOD_BUDGET_ALREADY_ALLOCATED" }
        400: { description: "TIER_SNAPSHOT_EMPTY" }
      note: >-
        This endpoint exists primarily for back-channel triggers and tests.
        The canonical flow is event-driven via POL.ON_BENEFICIARY_ENROLLED.

    - operation_id: recalibratePeriodBudget
      method: POST
      path: /cases/{case_id}/period-budgets/{period_index}/recalibrations
      issues: CMD.BSP.004.ENV.RECALIBRATE_PERIOD_BUDGET
      request_schema: schemas/CMD.BSP.004.ENV.RECALIBRATE_PERIOD_BUDGET.schema.json
      responses:
        202: { description: "Recalibration accepted (async; bus carries any new ENVELOPE_INITIALIZED / CAP_REACHED outcomes)" }
        404: { description: "PERIOD_BUDGET_NOT_FOUND" }
        409: { description: "PERIOD_BUDGET_CLOSED" }
        200: { description: "TRIGGER_ALREADY_PROCESSED — idempotent no-op" }

    - operation_id: recordConsumption
      method: POST
      path: /cases/{case_id}/period-budgets/{period_index}/consumptions
      issues: CMD.BSP.004.ENV.RECORD_CONSUMPTION
      request_schema: schemas/CMD.BSP.004.ENV.RECORD_CONSUMPTION.schema.json
      responses:
        202: { description: "Consumption recorded (async; bus carries CONSUMPTION_RECORDED, possibly CAP_REACHED)" }
        404: { description: "PERIOD_BUDGET_NOT_FOUND or ENVELOPE_NOT_FOUND" }
        409: { description: "ENVELOPE_NOT_OPEN" }
        400: { description: "AMOUNT_NOT_POSITIVE" }
        200: { description: "TRIGGER_ALREADY_PROCESSED — idempotent no-op" }
      note: >-
        This endpoint exists primarily for back-channel triggers and tests.
        The canonical flow is event-driven via POL.ON_TRANSACTION_AUTHORIZED
        (placeholder until upstream BCM declares the subscription).

    - operation_id: closePeriod
      method: POST
      path: /cases/{case_id}/period-budgets/{period_index}/closures
      issues: CMD.BSP.004.ENV.CLOSE_PERIOD
      request_schema: schemas/CMD.BSP.004.ENV.CLOSE_PERIOD.schema.json
      responses:
        202: { description: "Period closure accepted (async; bus carries one PERIOD_WITHOUT_CONSUMPTION per unconsumed envelope)" }
        404: { description: "PERIOD_BUDGET_NOT_FOUND" }
        409: { description: "PERIOD_NOT_DUE or PERIOD_ALREADY_CLOSED" }
        200: { description: "TRIGGER_ALREADY_PROCESSED — idempotent no-op" }
      note: >-
        This endpoint exists primarily for ops/back-channel; the canonical
        flow is the time-based POL.ON_PERIOD_END_DUE policy (placeholder).

  # ── Query endpoints (read-only) ──
  queries:
    - operation_id: getCurrentPeriodBudget
      method: GET
      path: /cases/{case_id}/period-budget
      serves: QRY.BSP.004.ENV.GET_CURRENT_PERIOD_BUDGET
      cache: { etag: true, max_age: PT5S }
      responses:
        200: { description: "Current period budget — envelopes with caps, consumption, status" }
        404: { description: "No active period budget for case_id" }

    - operation_id: getEnvelopeByCategory
      method: GET
      path: /cases/{case_id}/period-budget/envelopes/{category}
      serves: QRY.BSP.004.ENV.GET_ENVELOPE_BY_CATEGORY
      cache: { etag: true, max_age: PT2S }
      responses:
        200: { description: "Envelope details for the requested category in the active period" }
        404: { description: "No active period budget, or no envelope for that category" }

    - operation_id: listEnvelopeHistory
      method: GET
      path: /cases/{case_id}/envelope-history
      serves: QRY.BSP.004.ENV.LIST_ENVELOPE_HISTORY
      query_params:
        - { name: since, in: query, type: date }
        - { name: limit, in: query, type: integer, default: 100 }
      responses:
        200: { description: "Envelope lifecycle history (chronological)" }
        404: { description: "No envelope history for case_id" }
