meta:
  capability: CAP.BSP.004.ENV
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0008

# ──────────────────────────────────────────────────────────────
# Policies — reactive rules. A policy listens to one or more
# events and issues a command. Policies are the only place in
# the model where consumed events become commands; aggregates
# never subscribe to events directly.
# Identifier: POL.<ZONE>.<L1>.<L2>.<NAME>
# ──────────────────────────────────────────────────────────────

policies:

  - id: POL.BSP.004.ENV.ON_BENEFICIARY_ENROLLED
    name: Allocate the initial period budget on case opening
    intent: >-
      When a beneficiary's case is opened, materialise the first period
      budget (period_index = 0) using the tier definition that the case is
      opened under. Establishes the categorised envelopes that will govern
      every subsequent transaction in that period.
    listens_to:
      # Backed by SUB.BUSINESS.BSP.004.004 + SUB.RESOURCE.BSP.004.004
      - resource_event: RVT.BSP.002.CASE_OPENED
        business_subscription: SUB.BUSINESS.BSP.004.004
        resource_subscription: SUB.RESOURCE.BSP.004.004
        trigger_kind: CASE_OPENED
    issues: CMD.BSP.004.ENV.ALLOCATE_PERIOD_BUDGET
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id            <- upstream.case_id
        period_index       <- 0  (initial period)
        period_start       <- upstream.case_opened_at  (or upstream.period.start when present)
        period_end         <- period_start + tier_period_duration (sourced from tier_snapshot)
        tier_snapshot      <- upstream.tier_definition  (carries the tier categories and caps;
                              if not carried by RVT.BSP.002.CASE_OPENED, the policy resolves
                              them via a query to CAP.REF.001.TIE keyed on upstream.tier_id)
        trigger.event_id   <- upstream.event_id  (idempotency anchor)
    error_handling:
      - on: PERIOD_BUDGET_ALREADY_ALLOCATED
        action: ack-and-drop
        rationale: At-least-once redelivery of the same enrolment event.
      - on: TIER_SNAPSHOT_EMPTY
        action: dlq
        rationale: Upstream emitted with no tier definition — operational anomaly.
    delivery: at-least-once

  - id: POL.BSP.004.ENV.ON_TIER_UPGRADED
    name: Recalibrate the active period budget on tier upgrade
    intent: >-
      When the beneficiary moves to a new tier mid-period, re-derive the
      caps and category set from the new tier definition and apply them to
      the active period budget. The recalibration is in-place — it does NOT
      close the period (see INV.ENV.006).
    listens_to:
      # Backed by SUB.BUSINESS.BSP.004.005 + SUB.RESOURCE.BSP.004.005
      - resource_event: RVT.BSP.001.TIER_UPGRADE_RECORDED
        business_subscription: SUB.BUSINESS.BSP.004.005
        resource_subscription: SUB.RESOURCE.BSP.004.005
        trigger_kind: TIER_UPGRADED
    issues: CMD.BSP.004.ENV.RECALIBRATE_PERIOD_BUDGET
    mapping_rule: >-
      Build CMD payload from the upstream resource event:
        case_id              <- upstream.case_id
        period_index         <- (resolved) the case's current ACTIVE period_index
        new_tier_snapshot    <- upstream.new_tier_definition  (or resolved via CAP.REF.001.TIE
                                lookup keyed on upstream.new_tier_id)
        trigger.event_id     <- upstream.event_id
    error_handling:
      - on: TRIGGER_ALREADY_PROCESSED
        action: ack-and-drop
      - on: PERIOD_BUDGET_NOT_FOUND
        action: dlq
        rationale: Tier upgrade for a case with no active period — operational anomaly.
      - on: PERIOD_BUDGET_CLOSED
        action: dlq
        rationale: Tier upgrade arrived after period closure — race condition to investigate.
    delivery: at-least-once

  - id: POL.BSP.004.ENV.ON_TRANSACTION_AUTHORIZED
    name: Record consumption when a transaction is authorised
    status: placeholder
    intent: >-
      Translate every authorised transaction into a debit on the matching
      envelope. The envelope's category is resolved from the transaction's
      merchant category code (or the transaction's declared category). The
      command carries the case_id, the active period_index, the category and
      the amount.
    listens_to:
      - resource_event: TBD  # most likely RVT.BSP.004.PAYMENT_GRANTED from CAP.BSP.004.AUT
    issues: CMD.BSP.004.ENV.RECORD_CONSUMPTION
    open_question: >-
      ADR-BCM-FUNC-0008 lists `Transaction.Authorized` as an impacted event of
      the L2 breakdown but `bcm-pack` returns no business subscription for
      CAP.BSP.004.ENV ← CAP.BSP.004.AUT. Without that link, the envelope
      cannot maintain a faithful consumed_amount and depletion cannot be
      detected. To be confirmed before /code: the upstream BCM must declare
      the SUB.BUSINESS.BSP.004.* subscription on EVT.BSP.004.TRANSACTION_AUTHORIZED.
    mapping_rule: >-
      Build CMD payload from the upstream resource event (when wired):
        case_id            <- upstream.case_id
        period_index       <- (resolved) the case's current ACTIVE period_index
        category           <- upstream.category  (or resolved from upstream.mcc)
        amount             <- upstream.amount
        occurred_at        <- upstream.occurred_at
        trigger.event_id   <- upstream.event_id
    error_handling:
      - on: TRIGGER_ALREADY_PROCESSED
        action: ack-and-drop
      - on: ENVELOPE_NOT_OPEN
        action: dlq
        rationale: >-
          A transaction was authorised against a depleted envelope — must
          have bypassed the AUTH check or arrived out of order. Investigate.
      - on: ENVELOPE_NOT_FOUND
        action: dlq
        rationale: Authorised transaction on an unknown category — operational anomaly.
    delivery: at-least-once

  - id: POL.BSP.004.ENV.ON_PERIOD_END_DUE
    name: Close the period when its end date is reached
    status: placeholder
    intent: >-
      When the period_end of an active period budget is reached, close the
      period — emitting one ENVELOPE_PERIOD_WITHOUT_CONSUMPTION per unconsumed
      envelope (the counter-intuitive relapse signal).
    listens_to:
      - resource_event: TBD  # time-based trigger; no upstream BCM event today
        trigger_kind: time-based
    issues: CMD.BSP.004.ENV.CLOSE_PERIOD
    open_question: >-
      No business subscription declared in BCM for an end-of-period trigger.
      Most likely a future scheduling capability (SUP zone) emitting a
      `PERIOD_DUE` resource event for cases whose period_end has been reached.
      The implementation may, in the interim, rely on a scheduled job — but
      the process layer treats this as a placeholder until the upstream BCM
      formalises the trigger.
    mapping_rule: >-
      Build CMD payload from the (future) timer event:
        case_id              <- upstream.case_id
        period_index         <- upstream.period_index
        closing_at           <- upstream.occurred_at  (must be >= period_end)
        unconsumed_threshold <- 0.05  (configurable; product/regulatory decision)
        trigger.event_id     <- upstream.event_id
    error_handling:
      - on: TRIGGER_ALREADY_PROCESSED
        action: ack-and-drop
      - on: PERIOD_ALREADY_CLOSED
        action: ack-and-drop
        rationale: Idempotent closure — concurrent timer redeliveries.
      - on: PERIOD_NOT_DUE
        action: dlq
        rationale: Timer fired early — clock skew or scheduler bug.
    delivery: at-least-once
