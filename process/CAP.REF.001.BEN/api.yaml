meta:
  capability: CAP.REF.001.BEN
  layer: process-modelling
  version: 0.1.0
  derivation: >-
    This file is the synthesised HTTP/RPC surface of CAP.REF.001.BEN. It is
    DERIVED from commands.yaml + read-models.yaml — the api_binding fields
    declared there. Keep in sync; the BFF/microservice scaffolding agents
    consume this view, not the raw command/query files.

api:
  base_path: /capabilities/ref/001/ben
  authentication: bearer-token (sourced from CAP.SUP.001 — out of scope here)

  # ── Command endpoints (state-mutating) ──
  commands:
    - operation_id: registerBeneficiary
      method: POST
      path: /beneficiaries
      issues: CMD.REF.001.BEN.REGISTER_BENEFICIARY
      request_schema: schemas/CMD.REF.001.BEN.REGISTER_BENEFICIARY.schema.json
      responses:
        201: { description: "Beneficiary registered; body returns the canonical record incl. server-generated internal_id" }
        200: { description: "BENEFICIARY_ALREADY_REGISTERED — idempotent re-call; body returns the existing record" }
        400: { description: "IDENTITY_FIELDS_MISSING" }

    - operation_id: updateBeneficiaryIdentity
      method: PATCH
      path: /beneficiaries/{internal_id}
      issues: CMD.REF.001.BEN.UPDATE_BENEFICIARY_IDENTITY
      request_schema: schemas/CMD.REF.001.BEN.UPDATE_BENEFICIARY_IDENTITY.schema.json
      responses:
        200: { description: "Beneficiary updated; body returns the post-transition record" }
        404: { description: "BENEFICIARY_NOT_FOUND" }
        409: { description: "BENEFICIARY_ARCHIVED" }
        400: { description: "NO_FIELDS_TO_UPDATE" }
        # COMMAND_ALREADY_PROCESSED → 200 with the prior result (idempotent no-op)

    - operation_id: archiveBeneficiary
      method: POST
      path: /beneficiaries/{internal_id}/archive
      issues: CMD.REF.001.BEN.ARCHIVE_BENEFICIARY
      request_schema: schemas/CMD.REF.001.BEN.ARCHIVE_BENEFICIARY.schema.json
      responses:
        200: { description: "Beneficiary archived; body returns the post-transition record" }
        404: { description: "BENEFICIARY_NOT_FOUND" }
        409: { description: "BENEFICIARY_ALREADY_ARCHIVED" }

    - operation_id: restoreBeneficiary
      method: POST
      path: /beneficiaries/{internal_id}/restore
      issues: CMD.REF.001.BEN.RESTORE_BENEFICIARY
      request_schema: schemas/CMD.REF.001.BEN.RESTORE_BENEFICIARY.schema.json
      responses:
        200: { description: "Beneficiary restored; body returns the post-transition record" }
        404: { description: "BENEFICIARY_NOT_FOUND" }
        409: { description: "BENEFICIARY_NOT_ARCHIVED" }

  # ── Query endpoints (read-only) ──
  queries:
    - operation_id: getBeneficiary
      method: GET
      path: /beneficiaries/{internal_id}
      serves: QRY.REF.001.BEN.GET_BENEFICIARY
      cache: { etag: true, max_age: PT30S }
      responses:
        200: { description: "Canonical beneficiary record" }
        404: { description: "BENEFICIARY_NOT_FOUND" }

    - operation_id: getBeneficiaryByExternalId
      method: GET
      path: /beneficiaries/by-external-id/{external_id}
      serves: QRY.REF.001.BEN.GET_BENEFICIARY_BY_EXTERNAL_ID
      cache: { etag: true, max_age: PT30S }
      responses:
        200: { description: "Canonical beneficiary record matched by external_id" }
        404: { description: "No beneficiary for that external_id" }

    - operation_id: listBeneficiaryHistory
      method: GET
      path: /beneficiaries/{internal_id}/history
      serves: QRY.REF.001.BEN.LIST_BENEFICIARY_HISTORY
      query_params:
        - { name: since, in: query, type: date-time }
        - { name: limit, in: query, type: integer, default: 50 }
      responses:
        200: { description: "Lifecycle history (chronological)" }
        404: { description: "BENEFICIARY_NOT_FOUND" }
