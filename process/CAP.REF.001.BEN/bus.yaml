meta:
  capability: CAP.REF.001.BEN
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-TECH-STRAT-001  # Dual-rail event infrastructure — NORMATIVE
    - ADR-TECH-STRAT-004  # dual-referential-access — bus replication is one of the two access paths

# ──────────────────────────────────────────────────────────────
# Bus topology — the operational rail (RabbitMQ topic exchange)
# owned by this capability. Per ADR-TECH-STRAT-004 the bus is the
# canonical replication path for downstream local-cache hydration;
# the QRY API (read-models.yaml) is the secondary access path for
# point-in-time lookups.
# ──────────────────────────────────────────────────────────────

publication:
  broker: rabbitmq
  exchange:
    name: ref.001.ben-events
    type: topic
    durable: true
    owned_by: CAP.REF.001.BEN
    rule_reference: ADR-TECH-STRAT-001 Rules 1, 5

  # Per ADR-TECH-STRAT-001 Rule 2, only resource events generate autonomous
  # bus messages. Business events appear ONLY as the prefix of the routing
  # key (Rule 4) — never as standalone messages.
  #
  # Single emitted resource event family — every transition (REGISTER /
  # UPDATE / ARCHIVE / RESTORE) emits the SAME RVT, with the kind of
  # transition discriminated by the payload's `transition_kind` field. This
  # keeps consumer subscriptions simple (one binding per consumer) and
  # matches the ECST (entity-change-state-tracking) pattern.

  routing_keys:
    - resource_event: RVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED
      paired_business_event: EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED
      routing_key: EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.RVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED
      schema: schemas/RVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.schema.json
      payload_form: domain-event-ddd
      note: >-
        Carries the full post-transition snapshot plus the monotonic
        `revision` and the `transition_kind` discriminator (see INV.BEN.006).

  correlation_key: internal_id
  identity_resolution: >-
    THIS capability IS the canonical resolver. The internal_id IS the
    canonical reference. No upstream lookup is needed; downstream consumers
    use the value carried on the wire as the master key for their own caches.

# ──────────────────────────────────────────────────────────────
# Subscription side — events consumed from upstream capabilities.
#
# CAP.REF.001.BEN has NO subscriptions. The BCM corpus declares
# zero consumed_business_events / consumed_resource_events for
# this capability (it is the source of truth — nothing upstream
# of it). All state transitions are driven by direct API calls.
# This empty list is intentional and matches the canonical
# golden-record / MDM pattern of ADR-BCM-FUNC-0013.
# ──────────────────────────────────────────────────────────────

subscriptions: []

# ──────────────────────────────────────────────────────────────
# Known / anticipated consumers of THIS capability's events.
#
# Per ADR-TECH-STRAT-004's dual-referential-access rule, every
# capability that needs the canonical beneficiary identity should
# either (a) maintain a local cache fed by this exchange OR
# (b) call QRY.GET_BENEFICIARY synchronously. The bus path is the
# canonical replication path.
#
# The bcm-pack pack returned for this capability does NOT include
# downstream subscription data, so the entries below are derived
# from the FUNC ADR-0013 narrative (golden-record rule applies to
# all capabilities) plus the prior process-modelling work for
# CAP.BSP.001.SCO and CAP.BSP.004.ENV (which both name this
# capability as their identity resolver). Each entry is flagged
# `evidenced_by` accordingly. The full canonical list of
# consumers will be confirmed when the downstream BCM business-
# subscription chain is exhaustive.
# ──────────────────────────────────────────────────────────────

consumers:
  - capability: CAP.BSP.001.SCO
    binds_to:
      - EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
    rationale: >-
      Behavioural scoring needs canonical identity; the SCO model explicitly
      defers internal_id resolution to a CAP.REF.001.BEN lookup
      (see process/CAP.BSP.001.SCO/bus.yaml.identity_resolution).
    evidenced_by: prior-process-model

  - capability: CAP.BSP.002.ENR
    binds_to:
      - EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
    rationale: >-
      Enrolment opens the participation case keyed on internal_id and must
      observe identity changes (renames, contact updates) for the duration
      of the case.
    evidenced_by: anticipated

  - capability: CAP.BSP.004.ENV
    binds_to:
      - EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
    rationale: >-
      Budget envelopes use case_id but anchor identity resolution to this
      capability (see process/CAP.BSP.004.ENV/bus.yaml.identity_resolution).
    evidenced_by: prior-process-model

  - capability: CAP.CHN.001.DSH
    binds_to:
      - EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
    rationale: Beneficiary dashboard renders names and contact details.
    evidenced_by: anticipated

  - capability: CAP.CHN.002.VUE
    binds_to:
      - EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
    rationale: Prescriber view — names of supervised beneficiaries.
    evidenced_by: anticipated

  - capability: CAP.B2B.001.FLW
    binds_to:
      - EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
    rationale: >-
      Card-funding capability — needs canonical identity for KYC handover to
      the partner bank.
    evidenced_by: anticipated

  - capability: CAP.DAT.*   # data-analytics zone, exact L2 ids TBD
    binds_to:
      - EVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED.#
    rationale: >-
      Per ADR-TECH-STRAT-001 / 004, the analytical rail (Kafka / data-mesh)
      ingests the operational stream for downstream BI and signal mining.
    evidenced_by: anticipated
