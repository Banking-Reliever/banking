meta:
  capability: CAP.REF.001.BEN
  layer: process-modelling
  version: 0.1.0
  governing_adrs:
    - ADR-BCM-FUNC-0013   # L2 breakdown of CAP.REF.001 — Common Referentials
    - ADR-BCM-URBA-0009   # event meta-model
    - ADR-BCM-URBA-0012   # canonical business concept (CPT.BCM.000.BENEFICIARY)
    - ADR-TECH-STRAT-001  # Rule 3 — payload form is a domain-event DDD (atomic transition)
    - ADR-TECH-STRAT-004  # Data and Referential Layer — PII governance, dual referential access

# ──────────────────────────────────────────────────────────────
# Aggregates — the consistency boundaries of this capability.
# Each AGG owns a piece of state, accepts commands, enforces
# invariants atomically, and emits domain events on transition.
# Identifier: AGG.<ZONE>.<L1>.<L2>.<NAME>
#
# Granularity decision: one aggregate per beneficiary, keyed by
# the canonical internal_id. The internal_id is generated by the
# aggregate at registration time (server-side ULID/UUID); the
# REGISTER command carries an `external_id` (e.g. the candidacy /
# eligibility reference) that serves as the idempotency key over
# the lifetime of the case — preventing duplicate creation under
# retry/redelivery.
#
# The capability has NO upstream subscriptions (consumed_business_
# events / consumed_resource_events are empty in the BCM corpus).
# This is the canonical golden-record / source-of-truth pattern:
# all transitions are driven by direct API calls, not by reactive
# policies. `policies.yaml` is therefore intentionally empty.
# ──────────────────────────────────────────────────────────────

aggregates:

  - id: AGG.REF.001.BEN.BENEFICIARY_IDENTITY
    name: Canonical beneficiary identity
    business_object: OBJ.REF.001.BENEFICIARY_RECORD
    aggregate_id_field: internal_id
    cardinality: one-per-beneficiary
    description: >-
      The golden record of one beneficiary's canonical identity. Single
      source of truth for every other capability that needs to resolve a
      beneficiary by internal_id (per ADR-TECH-STRAT-004's dual-referential-
      access rule). Holds personally identifiable information (PII) under the
      data-ownership rules of ADR-TECH-STRAT-004 and is the only place such
      data may live in the Reliever programme — no other capability may keep
      a private mirror of these fields.

    state:
      - field: internal_id
        kind: identity
        description: >-
          Server-generated stable identifier (ULID/UUID). NOT a natural key;
          opaque from the caller's perspective.
      - field: external_id
        kind: idempotency
        description: >-
          Externally-provided reference at registration (e.g. candidacy /
          eligibility identifier). Used as the idempotency key for REGISTER
          and as a back-reference for traceability. Unique per beneficiary.
      - field: last_name
        kind: snapshot
      - field: first_name
        kind: snapshot
      - field: date_of_birth
        kind: snapshot
      - field: contact_details
        kind: snapshot
        description: >-
          Postal address + contact channels. Object — see schemas for shape.
      - field: referential_status
        kind: snapshot
        description: ACTIVE | ARCHIVED. (PURGED reserved — see open question.)
      - field: creation_date
        kind: snapshot
        description: Date of entry into the referential.
      - field: last_processed_command_id
        kind: idempotency
        description: >-
          Idempotency anchor for UPDATE / ARCHIVE / RESTORE — caller-supplied
          command_id, deduplicated over a 30-day window.
      - field: revision
        kind: snapshot
        description: >-
          Monotonic counter incremented on every state transition. Carried
          in the emitted RVT so consumers can detect out-of-order delivery
          and reconcile their local cache (per ADR-TECH-STRAT-004).

    accepted_commands:
      - CMD.REF.001.BEN.REGISTER_BENEFICIARY
      - CMD.REF.001.BEN.UPDATE_BENEFICIARY_IDENTITY
      - CMD.REF.001.BEN.ARCHIVE_BENEFICIARY
      - CMD.REF.001.BEN.RESTORE_BENEFICIARY

    emitted_resource_events:
      - RVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED  # canonical change event — emitted on every state transition

    invariants:

      - id: INV.BEN.001
        rule: >-
          Exactly one beneficiary per (external_id). REGISTER is rejected if
          a beneficiary already exists with the same external_id (idempotent
          re-call returns the existing internal_id).
        rationale: >-
          ADR-BCM-FUNC-0013 — golden record rule. The natural-key collision
          (same name + dob) is NOT enforced here; homonyms are legitimate.
          Disambiguation is the upstream candidacy capability's concern.

      - id: INV.BEN.002
        rule: >-
          internal_id is generated by the aggregate at REGISTER time. It is
          immutable for the lifetime of the record; UPDATE / ARCHIVE / RESTORE
          NEVER change it.
        rationale: >-
          Every other capability keys its local cache on internal_id (per
          ADR-TECH-STRAT-004). Mutating it would invalidate every cache.

      - id: INV.BEN.003
        rule: >-
          UPDATE_BENEFICIARY_IDENTITY accepts partial payloads — only fields
          present in the command are modified. Empty / null fields in the
          payload are NOT applied (they mean "leave unchanged"). To clear a
          contact channel, the caller must explicitly pass the channel with
          an empty value via a dedicated nullability marker; otherwise PII
          fields are sticky.
        rationale: >-
          Defends against accidental PII erasure under partial integrations.

      - id: INV.BEN.004
        rule: >-
          ARCHIVE flips referential_status from ACTIVE to ARCHIVED. Rejected
          if status is already ARCHIVED. Archived records remain queryable
          (referential reads still resolve them) but no further UPDATE is
          accepted until RESTORE is issued.
        rationale: >-
          ADR-BCM-FUNC-0013 — programme exit may archive a beneficiary while
          consumers still need to resolve historical references.

      - id: INV.BEN.005
        rule: >-
          RESTORE flips referential_status from ARCHIVED back to ACTIVE.
          Rejected if status is already ACTIVE. Restoration must be a rare,
          audited operation (typically: archival in error).
        rationale: Operational safety — undo path for ARCHIVE.

      - id: INV.BEN.006
        rule: >-
          Every accepted state transition emits exactly one
          RVT.REF.001.BENEFICIARY_REFERENTIAL_UPDATED carrying the FULL post-
          transition state of the record (snapshot semantics) plus the
          monotonically-incremented `revision`. The kind of transition
          (REGISTERED | UPDATED | ARCHIVED | RESTORED) is carried in the
          payload's `transition_kind` discriminator so consumers can route
          without inferring from referential_status.
        rationale: >-
          ADR-TECH-STRAT-004 — consumers maintain local caches; full-state
          snapshot semantics make their reconciliation a simple last-write-
          wins merge keyed on (internal_id, revision).

      - id: INV.BEN.007
        rule: >-
          A single command_id is applied at most once per command kind.
          Duplicates are silently dropped (idempotent no-op) and return the
          previously emitted result.
        rationale: At-least-once delivery on the API path — clients must tolerate retry.

    consistency_boundary: per-aggregate-instance
    transactional_outbox: required
    snapshotting:
      strategy: every-N-events
      n: 50
      rationale: >-
        A beneficiary's identity changes infrequently (a few transitions
        per year). Snapshot frequency is deliberately low.

    # ────────────────────────────────────────────────────────────
    # Open question — see README — left here as a marker so the
    # remediation path is visible at the aggregate level.
    # ────────────────────────────────────────────────────────────
    open_question: >-
      GDPR right-to-be-forgotten (physical PURGE of PII fields) is not modelled
      in v1. ADR-TECH-STRAT-004 mandates the capability; BCM does not yet declare
      the corresponding event family (no RVT.REF.001.BENEFICIARY_PURGED). Once
      the BCM is updated, this aggregate will accept a CMD.PURGE_BENEFICIARY,
      transitioning referential_status to PURGED and emitting a dedicated RVT
      so consumers can wipe their local caches.
