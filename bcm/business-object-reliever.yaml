meta:
  bcm_name: BCM Reliever — Business Objects
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

resources:

  # ── Zone REFERENTIAL ────────────────────────────────────────────────────────

  - id: OBJ.REF.001.FICHE_BENEFICIAIRE
    name: Beneficiary record
    definition: >-
      The canonical record of a beneficiary's identity in the Reliever shared
      referential. Single source of truth for all capabilities —
      golden record. No other capability may maintain its own identity copy.
    emitting_capability: CAP.REF.001.BEN
    data:
      - name: identifiant_interne
        type: string
        description: Unique beneficiary identifier in the Reliever system
        required: true
      - name: nom
        type: string
        description: Last name
        required: true
      - name: prenom
        type: string
        description: First name
        required: true
      - name: date_naissance
        type: date
        description: Date of birth
        required: true
      - name: coordonnees
        type: object
        description: Postal address and contact details
        required: true
      - name: statut_referentiel
        type: string
        description: Status in the referential — active, archived
        required: true
      - name: date_creation
        type: date
        description: Date of entry into the referential
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - golden-record
      - master-data

  - id: OBJ.REF.001.FICHE_PRESCRIPTEUR
    name: Prescriber record
    definition: >-
      The canonical record of a prescriber's identity and authorisations
      within the Reliever programme. Distinguishes types (banking, medical, social)
      and their affiliated organisation.
    emitting_capability: CAP.REF.001.PRE
    data:
      - name: identifiant_interne
        type: string
        description: Unique prescriber identifier in the Reliever system
        required: true
      - name: type_prescripteur
        type: string
        description: Prescriber type — BANCAIRE, MEDICAL, SOCIAL
        required: true
      - name: nom_complet
        type: string
        description: Full name of the prescriber
        required: true
      - name: organisation
        type: string
        description: Affiliated institution or organisation
        required: true
      - name: habilitations
        type: array
        description: List of authorisations granted within the programme
        required: true
      - name: statut_referentiel
        type: string
        description: Status in the referential — active, suspended, archived
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - golden-record
      - master-data

  - id: OBJ.REF.001.DEFINITION_PALIER
    name: Tier definition
    definition: >-
      The normative specification of a financial autonomy tier: usage rules,
      transition thresholds, associated rights. Single source of truth consumed by
      BSP.001, BSP.004 and B2B.001. Any modification must go through this L2.
    emitting_capability: CAP.REF.001.PAL
    data:
      - name: code_palier
        type: string
        description: Tier identifier (e.g. TIER_1, TIER_2...)
        required: true
      - name: libelle
        type: string
        description: Business label of the tier
        required: true
      - name: plafond_journalier
        type: number
        description: Authorised daily spending limit
        required: true
      - name: categories_autorisees
        type: array
        description: Spending categories authorised at this tier
        required: true
      - name: seuil_franchissement
        type: number
        description: Minimum score required to progress to the next tier
        required: true
      - name: seuil_retrogradation
        type: number
        description: Score below which a demotion is triggered
        required: true
      - name: version
        type: string
        description: Definition version (rules versioning)
        required: true
      - name: statut
        type: string
        description: Definition status — active, archived
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - normative
      - master-data
      - versioned

  # ── Zone BUSINESS_SERVICE_PRODUCTION ────────────────────────────────────────

  - id: OBJ.BSP.002.PARTICIPATION
    name: Programme participation
    definition: >-
      The current state of a beneficiary's participation in the Reliever programme:
      active tier, assigned prescribers, case status. Created at enrolment,
      archived at exit. Central reference point for all BSP capabilities.
    emitting_capability: CAP.BSP.002.CYC
    data:
      - name: identifiant_dossier
        type: string
        description: Unique case identifier
        required: true
      - name: identifiant_beneficiaire
        type: string
        description: Reference to the beneficiary record (REF.001.BEN)
        required: true
      - name: palier_courant
        type: string
        description: Active autonomy tier code
        required: true
      - name: statut_dossier
        type: string
        description: Case status — ACTIF, CLOS_SUCCES, CLOS_ABANDON, CLOS_ADMINISTRATIF
        required: true
      - name: date_ouverture
        type: date
        description: Programme enrolment date
        required: true
      - name: date_cloture
        type: date
        description: Programme exit date (null if active)
        required: false
      - name: prescripteurs_assignes
        type: array
        description: List of identifiers of prescribers assigned to the case
        required: true
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - stateful
      - core-domain

  - id: OBJ.BSP.001.EVALUATION
    name: Behavioural evaluation
    definition: >-
      The result of a behavioural score computation for a beneficiary:
      numeric value, contributing factors, timestamp. Recomputed after each
      transaction or significant behavioural signal.
    emitting_capability: CAP.BSP.001.SCO
    data:
      - name: identifiant_evaluation
        type: string
        description: Unique identifier for this evaluation
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the relevant participation case
        required: true
      - name: valeur_score
        type: number
        description: Numeric value of the behavioural score
        required: true
      - name: facteurs_contributifs
        type: array
        description: List of factors that influenced this score (types and weights)
        required: true
      - name: timestamp_calcul
        type: date
        description: Computation timestamp
        required: true
      - name: version_modele
        type: string
        description: Version of the scoring model used for this computation
        required: true
      - name: type_evaluation
        type: string
        description: Type — INITIAL (enrolment baseline), COURANT (post-transaction)
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - algorithmic
      - core-domain
      - real-time

  - id: OBJ.BSP.001.CHANGEMENT_PALIER
    name: Tier change
    definition: >-
      The record of a tier transition for a beneficiary: trigger context,
      trigger source (algorithm or prescriber override), before and after tiers.
      Historised for audit and analytics.
    emitting_capability: CAP.BSP.001.PAL
    data:
      - name: identifiant_transition
        type: string
        description: Unique identifier for this transition
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the relevant participation case
        required: true
      - name: palier_precedent
        type: string
        description: Tier code before the transition
        required: true
      - name: nouveau_palier
        type: string
        description: Tier code after the transition
        required: true
      - name: sens
        type: string
        description: Transition direction — FRANCHISSEMENT (upward) or RETROGRADATION
        required: true
      - name: declencheur
        type: string
        description: Trigger — ALGORITHME or SURCHARGE_PRESCRIPTEUR
        required: true
      - name: score_au_moment
        type: number
        description: Score value at the time of the transition
        required: true
      - name: timestamp_transition
        type: date
        description: Transition timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - stateful
      - core-domain
      - audit

  - id: OBJ.BSP.001.SURCHARGE_ALGO
    name: Algorithm override
    definition: >-
      A prescriber's decision to force a tier against the algorithmic recommendation.
      The algorithm monitors outcomes and automatically resumes control
      when reality confirms or refutes the prescriber's decision.
    emitting_capability: CAP.BSP.001.ARB
    data:
      - name: identifiant_surcharge
        type: string
        description: Unique identifier for this override
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the relevant case
        required: true
      - name: identifiant_prescripteur
        type: string
        description: Prescriber who decided the override
        required: true
      - name: palier_force
        type: string
        description: Tier imposed by the prescriber
        required: true
      - name: justification
        type: string
        description: Business justification for the override
        required: true
      - name: statut_surcharge
        type: string
        description: Status — ACTIVE (prescriber in control) or CLOTUREE (algo resumes)
        required: true
      - name: date_surcharge
        type: date
        description: Override activation date
        required: true
      - name: date_reprise_algo
        type: date
        description: Date on which the algorithm resumed control (null if still active)
        required: false
      - name: resultat_observe
        type: string
        description: Override outcome assessment — CONFIRME, INFIRME, EN_ATTENTE
        required: false
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - human-override
      - audit
      - core-domain

  - id: OBJ.BSP.001.SIGNAL_INTERPRETE
    name: Interpreted behavioural signal
    definition: >-
      A qualified and contextualised behavioural signal, produced by interpreting
      raw transactional alerts. Directly feeds scoring and can
      trigger a prescriber notification.
    emitting_capability: CAP.BSP.001.SIG
    data:
      - name: identifiant_signal
        type: string
        description: Unique signal identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the relevant case
        required: true
      - name: type_signal
        type: string
        description: Type — ENVELOPPE_NON_CONSOMMEE, TENTATIVE_CONTOURNEMENT, REFUS_RECURRENTS, etc.
        required: true
      - name: intensite
        type: string
        description: Intensity — FAIBLE, MODERE, ELEVE
        required: true
      - name: source
        type: string
        description: Source — identifier of the originating transactional alert
        required: true
      - name: timestamp_detection
        type: date
        description: Detection timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - behavioral
      - counterintuitive

  - id: OBJ.BSP.003.DECISION_CONCERTEE
    name: Concerted decision
    definition: >-
      A formalised decision arising from deliberation among multiple prescribers
      on a beneficiary case. Produces a validated resolution transmitted
      to BSP.001.PAL or BSP.001.ARB for application.
    emitting_capability: CAP.BSP.003.COD
    data:
      - name: identifiant_decision
        type: string
        description: Unique identifier for this decision
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the relevant case
        required: true
      - name: objet_decision
        type: string
        description: Subject of the decision (e.g. tier change, override)
        required: true
      - name: participants
        type: array
        description: List of prescribers involved and their positions
        required: true
      - name: resolution
        type: string
        description: Final validated decision
        required: true
      - name: statut
        type: string
        description: Status — EN_COURS, VALIDEE, ANNULEE
        required: true
      - name: date_finalisation
        type: date
        description: Decision validation date
        required: false
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - governance

  - id: OBJ.BSP.004.DECISION_PAIEMENT
    name: Payment decision
    definition: >-
      The authorisation or decline decision for a transaction on the dedicated card,
      made in real time by applying the beneficiary's current tier rules.
    emitting_capability: CAP.BSP.004.AUT
    data:
      - name: identifiant_decision
        type: string
        description: Unique decision identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the beneficiary case
        required: true
      - name: montant
        type: number
        description: Amount of the attempted transaction
        required: true
      - name: categorie_marchand
        type: string
        description: Merchant category (food, transport, etc.)
        required: true
      - name: identifiant_marchand
        type: string
        description: Point-of-sale identifier
        required: true
      - name: resultat
        type: string
        description: Result — AUTORISEE or REFUSEE
        required: true
      - name: regle_appliquee
        type: string
        description: Tier rule identifier that led to the decision
        required: true
      - name: timestamp_decision
        type: date
        description: Real-time decision timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time
      - core-domain

  - id: OBJ.BSP.004.ALLOCATION
    name: Budget allocation
    definition: >-
      The allocation of a spending category for a given period, according to the
      beneficiary's current tier. The envelope consumption state is a behavioural
      signal — including its non-consumption.
    emitting_capability: CAP.BSP.004.ENV
    data:
      - name: identifiant_allocation
        type: string
        description: Unique identifier for this allocation
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the beneficiary case
        required: true
      - name: categorie
        type: string
        description: Spending category covered by this envelope
        required: true
      - name: montant_plafond
        type: number
        description: Maximum amount authorised for the period
        required: true
      - name: montant_consomme
        type: number
        description: Amount actually spent to date
        required: true
      - name: periode_debut
        type: date
        description: Start of the allocation period
        required: true
      - name: periode_fin
        type: date
        description: End of the allocation period
        required: true
      - name: statut
        type: string
        description: Status — OUVERTE, EPUISEE, NON_CONSOMMEE (period ended without consumption)
        required: true
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget
      - behavioral-signal

  # ── Zone EXCHANGE_B2B ───────────────────────────────────────────────────────

  - id: OBJ.B2B.001.CARTE_DEDIEE
    name: Dedicated card
    definition: >-
      The payment card dedicated to the beneficiary within the Reliever programme.
      Lifecycle driven by case events, usage rules synchronised
      with the current tier. Universal spending control point.
    emitting_capability: CAP.B2B.001.CRT
    data:
      - name: identifiant_carte
        type: string
        description: Unique card identifier (masked PAN)
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the cardholder's case
        required: true
      - name: statut_carte
        type: string
        description: Status — EMISE, ACTIVE, SUSPENDUE, RESILIEE
        required: true
      - name: palier_reference
        type: string
        description: Tier code from which current usage rules derive
        required: true
      - name: date_emission
        type: date
        description: Card issuance date
        required: true
      - name: date_derniere_maj_regles
        type: date
        description: Date of last rule synchronisation with the tier
        required: true
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-instrument
      - lifecycle

  # ── Zone SUPPORT ────────────────────────────────────────────────────────────

  - id: OBJ.SUP.001.CONSENTEMENT_RGPD
    name: GDPR consent
    definition: >-
      A beneficiary's consent to a scope of sharing of their sensitive data.
      Mandatory precondition to enrolment and any prescriber access.
      Revocable at any time with immediate effect.
    emitting_capability: CAP.SUP.001.CON
    data:
      - name: identifiant_consentement
        type: string
        description: Unique consent identifier
        required: true
      - name: identifiant_beneficiaire
        type: string
        description: Reference to the relevant beneficiary
        required: true
      - name: perimetre
        type: array
        description: Types of sharing covered (banking, medical, social, open-banking)
        required: true
      - name: statut
        type: string
        description: Status — ACCORDE or REVOQUE
        required: true
      - name: date_accord
        type: date
        description: Initial consent date
        required: true
      - name: date_revocation
        type: date
        description: Revocation date (null if still active)
        required: false
      - name: version_formulaire
        type: string
        description: Version of the consent form used
        required: true
    adrs:
      - ADR-BCM-FUNC-0012
    tags:
      - RGPD
      - compliance
      - blocking-precondition

  # ── Zone DATA_ANALYTIQUE ────────────────────────────────────────────────────

  - id: OBJ.DAT.001.MODELE_SCORE
    name: Versioned scoring model
    definition: >-
      The versioned algorithmic behavioural scoring model. Produced by
      DAT.001.MOD after aggregated pattern analysis. Submitted to PIL.001.GOV for
      validation before any production deployment on BSP.001.SCO.
    emitting_capability: CAP.DAT.001.MOD
    data:
      - name: identifiant_modele
        type: string
        description: Unique model identifier
        required: true
      - name: version
        type: string
        description: Semantic version of the model (e.g. 2.3.1)
        required: true
      - name: parametres
        type: object
        description: Model parameters and weightings
        required: true
      - name: metriques_performance
        type: object
        description: Measured performance metrics (precision, recall, AUC...)
        required: true
      - name: statut_validation
        type: string
        description: Status — EN_VALIDATION, VALIDE, REJETE, ACTIF, ARCHIVE
        required: true
      - name: date_soumission
        type: date
        description: Submission date to PIL.001.GOV
        required: true
      - name: date_validation
        type: date
        description: Validation date by PIL.001.GOV (null if pending)
        required: false
    adrs:
      - ADR-BCM-FUNC-0014
      - ADR-BCM-FUNC-0015
    tags:
      - versioned
      - governance
      - algorithmic

  # ── Zone BUSINESS_SERVICE_PRODUCTION — BSP.003 complements ──────────────────

  - id: OBJ.BSP.003.ROLE_PRESCRIPTEUR
    name: Prescriber role
    definition: >-
      The assignment and revocation of a prescriber role on a beneficiary case.
      Determines the prescriber's consultation and action rights on the case.
    emitting_capability: CAP.BSP.003.ROL
    data:
      - name: identifiant_attribution
        type: string
        description: Unique role assignment identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the relevant case
        required: true
      - name: identifiant_prescripteur
        type: string
        description: Prescriber identifier
        required: true
      - name: type_role
        type: string
        description: Role type — BANCAIRE, MEDICAL, SOCIAL
        required: true
      - name: statut
        type: string
        description: Status — ATTRIBUE or REVOQUE
        required: true
      - name: date_attribution
        type: date
        description: Role assignment date
        required: true
      - name: date_revocation
        type: date
        description: Revocation date (null if active)
        required: false
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - access-control

  - id: OBJ.BSP.003.ALERTE_PRESCRIPTEUR
    name: Prescriber alert
    definition: >-
      A notification addressed to one or more prescribers in response to a
      significant behavioural signal or a case event requiring attention.
    emitting_capability: CAP.BSP.003.NOT
    data:
      - name: identifiant_alerte
        type: string
        description: Unique alert identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the relevant case
        required: true
      - name: destinataires
        type: array
        description: List of recipient prescribers
        required: true
      - name: type_alerte
        type: string
        description: Type — SIGNAL_RECHUTE, FRANCHISSEMENT_PALIER, INACTIVITE, OVERRIDE_DEMANDE
        required: true
      - name: niveau_urgence
        type: string
        description: Level — INFORMATIF, ATTENTION, URGENT
        required: true
      - name: timestamp_emission
        type: date
        description: Alert emission timestamp
        required: true
      - name: source_evenement
        type: string
        description: Identifier of the triggering event
        required: true
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - notification

  # ── Zone BUSINESS_SERVICE_PRODUCTION — BSP.004 complements ──────────────────

  - id: OBJ.BSP.004.ALTERNATIVE_ACHAT
    name: Purchase alternative
    definition: >-
      A proposed consumption alternative compatible with the current tier,
      issued in response to a declined transaction. Aims to preserve the dignity and
      autonomy of the beneficiary following a payment refusal.
    emitting_capability: CAP.BSP.004.ALT
    data:
      - name: identifiant_alternative
        type: string
        description: Unique proposal identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the beneficiary case
        required: true
      - name: identifiant_decision_origine
        type: string
        description: Reference to the decline decision that triggered this proposal
        required: true
      - name: alternatives_proposees
        type: array
        description: List of alternatives compatible with the tier (merchants, categories)
        required: true
      - name: acceptee
        type: boolean
        description: True if the beneficiary accepted a proposed alternative
        required: true
      - name: timestamp_proposition
        type: date
        description: Proposal timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - dignity
      - behavioral-signal

  # ── Zone CHANNEL ────────────────────────────────────────────────────────────

  - id: OBJ.CAN.001.NOTIFICATION
    name: Beneficiary notification
    definition: >-
      A message sent to the beneficiary via their application channel — information about
      a decision, a progression alert, an envelope reminder or a proposed alternative.
    emitting_capability: CAP.CAN.001.NOT
    data:
      - name: identifiant_notification
        type: string
        description: Unique notification identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the recipient beneficiary's case
        required: true
      - name: type_notification
        type: string
        description: Type — REFUS_PAIEMENT, ALTERNATIVE_PROPOSEE, PROGRESSION_PALIER, ALERTE_ENVELOPPE
        required: true
      - name: contenu
        type: string
        description: Message content adapted to tier and profile
        required: true
      - name: canal_emission
        type: string
        description: Channel used — PUSH, SMS, IN_APP
        required: true
      - name: timestamp_emission
        type: date
        description: Emission timestamp
        required: true
      - name: accusee_reception
        type: boolean
        description: True if reading has been confirmed
        required: false
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - channel
      - notification

  - id: OBJ.CAN.002.RAPPORT_PRESCRIPTEUR
    name: Prescriber report
    definition: >-
      A summary report generated for a prescriber: beneficiary progress,
      key events during the period, possible recommendations.
    emitting_capability: CAP.CAN.002.RAP
    data:
      - name: identifiant_rapport
        type: string
        description: Unique report identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the analysed case
        required: true
      - name: identifiant_prescripteur
        type: string
        description: Recipient prescriber
        required: true
      - name: periode_couverte
        type: object
        description: Report reference period (start / end)
        required: true
      - name: contenu_synthetique
        type: object
        description: Progress data, key signals, current tier
        required: true
      - name: timestamp_generation
        type: date
        description: Report generation timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - channel
      - reporting

  # ── Zone EXCHANGE_B2B — complements ─────────────────────────────────────────

  - id: OBJ.B2B.001.SNAPSHOT_FIN
    name: Open banking financial snapshot
    definition: >-
      A snapshot of the beneficiary's main account financial data,
      obtained via PSD2/open banking. Feeds behavioural scoring and
      repayment capacity control.
    emitting_capability: CAP.B2B.001.OBK
    data:
      - name: identifiant_snapshot
        type: string
        description: Unique snapshot identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the beneficiary case
        required: true
      - name: solde_courant
        type: number
        description: Main account balance at the time of the snapshot
        required: true
      - name: patterns_depenses
        type: object
        description: Spending aggregates by category over the period
        required: true
      - name: timestamp_snapshot
        type: date
        description: Snapshot timestamp
        required: true
      - name: source_psp
        type: string
        description: Identifier of the PSP providing the PSD2 data
        required: true
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - open-banking
      - DSP2

  - id: OBJ.B2B.001.FLUX_FINANCIER
    name: Card financial flow
    definition: >-
      A fund transfer from the beneficiary's main account to the dedicated card,
      carried out by the partner issuing institution according to the current tier definition.
    emitting_capability: CAP.B2B.001.FLX
    data:
      - name: identifiant_flux
        type: string
        description: Unique flow identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the beneficiary case
        required: true
      - name: montant
        type: number
        description: Amount transferred to the card
        required: true
      - name: categorie_enveloppe
        type: string
        description: Budget envelope category funded
        required: true
      - name: timestamp_flux
        type: date
        description: Transfer timestamp
        required: true
      - name: partenaire_emission
        type: string
        description: Identifier of the partner institution that performed the transfer
        required: true
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-flow
      - B2B

  # ── Zone SUPPORT — complements ───────────────────────────────────────────────

  - id: OBJ.SUP.001.TRACE_ACCES
    name: Access log entry
    definition: >-
      An audit record of each access to a beneficiary's sensitive data
      by a prescriber or a system capability. Guarantees complete GDPR traceability.
    emitting_capability: CAP.SUP.001.AUD
    data:
      - name: identifiant_trace
        type: string
        description: Unique log entry identifier
        required: true
      - name: identifiant_dossier
        type: string
        description: Reference to the accessed case
        required: true
      - name: acteur_acces
        type: string
        description: Identifier of the accessing actor (prescriber or IS capability)
        required: true
      - name: type_donnee_accedee
        type: string
        description: Type of data consulted — BANCAIRE, MEDICAL, SOCIAL, SCORE
        required: true
      - name: action
        type: string
        description: Action performed — LECTURE, MODIFICATION, EXPORT
        required: true
      - name: timestamp_acces
        type: date
        description: Precise access timestamp
        required: true
      - name: consentement_reference
        type: string
        description: GDPR consent identifier covering this access
        required: true
    adrs:
      - ADR-BCM-FUNC-0012
    tags:
      - RGPD
      - audit
      - compliance

  - id: OBJ.SUP.001.DROIT_EXERCE
    name: Exercised GDPR right
    definition: >-
      The formalised exercise of a GDPR right by a beneficiary: access, rectification,
      erasure or portability. Processed within legal timeframes, with full traceability.
    emitting_capability: CAP.SUP.001.RET
    data:
      - name: identifiant_demande
        type: string
        description: Unique rights request identifier
        required: true
      - name: identifiant_beneficiaire
        type: string
        description: Reference to the beneficiary who exercised the right
        required: true
      - name: type_droit
        type: string
        description: Type — ACCES, RECTIFICATION, EFFACEMENT, PORTABILITE, OPPOSITION
        required: true
      - name: statut_traitement
        type: string
        description: Status — RECU, EN_COURS, TRAITE, REJETE
        required: true
      - name: date_reception
        type: date
        description: Request reception date
        required: true
      - name: date_traitement
        type: date
        description: Effective processing date (null if in progress)
        required: false
      - name: reponse
        type: string
        description: Summary of the response provided
        required: false
    adrs:
      - ADR-BCM-FUNC-0012
    tags:
      - RGPD
      - compliance

  # ── Zone DATA_ANALYTIQUE — complements ──────────────────────────────────────

  - id: OBJ.DAT.001.DONNEES_COMPORTEMENTALES
    name: Aggregated behavioural data
    definition: >-
      An anonymised aggregate of transactional data and behavioural signals
      used for training and improving the scoring model. Never
      directly connected to the operational scoring pipeline.
    emitting_capability: CAP.DAT.001.ING
    data:
      - name: identifiant_lot
        type: string
        description: Unique aggregated data batch identifier
        required: true
      - name: periode_couverte
        type: object
        description: Data reference period (start / end)
        required: true
      - name: volume_dossiers
        type: number
        description: Number of anonymised cases contributing to this batch
        required: true
      - name: agregats
        type: object
        description: Behavioural aggregates by cohort and tier
        required: true
      - name: timestamp_ingestion
        type: date
        description: Ingestion timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0014
    tags:
      - analytics
      - anonymized

  - id: OBJ.DAT.001.RAPPORT_PROGRAMME
    name: Programme report
    definition: >-
      An analytical performance report on the Reliever programme: progression
      rate, exit rate by reason, tier effectiveness, social impact metrics.
      Intended for PIL.001.KPI and stakeholders.
    emitting_capability: CAP.DAT.001.REP
    data:
      - name: identifiant_rapport
        type: string
        description: Unique report identifier
        required: true
      - name: periode_couverte
        type: object
        description: Report reference period
        required: true
      - name: metriques_programme
        type: object
        description: Global programme KPIs (progression rate, relapses, exits)
        required: true
      - name: distribution_paliers
        type: object
        description: Distribution of beneficiaries by tier
        required: true
      - name: timestamp_generation
        type: date
        description: Generation timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0014
    tags:
      - analytics
      - reporting

  # ── Zone STEERING ────────────────────────────────────────────────────────────

  - id: OBJ.PIL.001.POLITIQUE_GOUVERNANCE
    name: Governance policy
    definition: >-
      A governance rule or set of rules for the Reliever programme, validated
      by PIL.001.GOV and binding on all BCM capabilities. Includes scoring
      model validation rules.
    emitting_capability: CAP.PIL.001.GOV
    data:
      - name: identifiant_politique
        type: string
        description: Unique policy identifier
        required: true
      - name: domaine
        type: string
        description: Domain covered — SCORING, PALIERS, ACCES_DONNEES, CONFORMITE
        required: true
      - name: contenu
        type: object
        description: Rules and constraints defined by this policy
        required: true
      - name: version
        type: string
        description: Policy version
        required: true
      - name: statut
        type: string
        description: Status — EN_REVISION, ACTIVE, ARCHIVEE
        required: true
      - name: date_activation
        type: date
        description: Effective date
        required: true
    adrs:
      - ADR-BCM-FUNC-0015
    tags:
      - governance
      - steering

  - id: OBJ.PIL.001.PERFORMANCE_PROGRAMME
    name: Programme performance
    definition: >-
      A periodic evaluation of the Reliever programme performance indicators,
      produced by PIL.001.KPI from DAT.001 analytics data.
    emitting_capability: CAP.PIL.001.KPI
    data:
      - name: identifiant_evaluation
        type: string
        description: Unique performance evaluation identifier
        required: true
      - name: periode
        type: object
        description: Evaluated period (start / end)
        required: true
      - name: kpis
        type: object
        description: Programme KPI values (progression rate, social impact, etc.)
        required: true
      - name: tendances
        type: object
        description: KPI evolution compared to previous periods
        required: true
      - name: timestamp_evaluation
        type: date
        description: Evaluation timestamp
        required: true
    adrs:
      - ADR-BCM-FUNC-0015
    tags:
      - governance
      - KPI

  - id: OBJ.PIL.001.CONFORMITE_PROGRAMME
    name: Programme compliance
    definition: >-
      A regulatory and programmatic compliance verification result:
      GDPR, PSD2, tier rules, model governance. Produced by PIL.001.AUD.
    emitting_capability: CAP.PIL.001.AUD
    data:
      - name: identifiant_verification
        type: string
        description: Unique verification identifier
        required: true
      - name: domaine_controle
        type: string
        description: Controlled domain — RGPD, DSP2, PALIERS, MODELES, ACCES
        required: true
      - name: statut_conformite
        type: string
        description: Status — CONFORME, NON_CONFORME, ANOMALIE_MINEURE
        required: true
      - name: constats
        type: array
        description: List of audit findings (compliant or non-compliant)
        required: true
      - name: date_verification
        type: date
        description: Verification date
        required: true
      - name: prochaine_verification
        type: date
        description: Scheduled date for the next verification
        required: false
    adrs:
      - ADR-BCM-FUNC-0015
    tags:
      - governance
      - compliance
      - audit
