meta:
  bcm_name: BCM Reliever — Resource Subscriptions
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

resource_subscriptions:

  # ── CAP.BSP.001.SCO — Behavioural scoring ────────────────────────────────────

  - id: SUB.RESOURCE.BSP.001.001
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.001
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_ACCORDE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_AUTORISEE
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consumes RES.BSP.004.PAIEMENT_AUTORISE to extract the
      amount, category and merchant of the authorised transaction — data
      required for the behavioural score recomputation.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.002
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.002
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_BLOQUE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_REFUSEE
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consumes RES.BSP.004.PAIEMENT_REFUSE to extract the
      decline reason, category and amount as a negative behavioural signal
      feeding the score recomputation.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.003
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.003
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_RECHUTE_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_RECHUTE
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consumes RES.BSP.001.SIGNAL_COMPORTEMENTAL to extract
      the impact score and category of the relapse signal in order to
      negatively adjust the current score recomputation.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.004
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.004
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_PROGRESSION_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_PROGRESSION
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consumes RES.BSP.001.SIGNAL_COMPORTEMENTAL to extract
      the positive impact score and category of the progression signal in order
      to positively adjust the current score recomputation.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.001.PAL — Tier management ───────────────────────────────────────

  - id: SUB.RESOURCE.BSP.001.005
    consumer_capability: CAP.BSP.001.PAL
    linked_business_subscription: SUB.BUSINESS.BSP.001.005
    subscribed_resource_event:
      id: RVT.BSP.001.SEUIL_SCORE_ATTEINT
      emitting_capability: CAP.BSP.001.SCO
      linked_business_event: EVT.BSP.001.SCORE_SEUIL_ATTEINT
    scope: public
    rationale: >-
      CAP.BSP.001.PAL consumes RES.BSP.001.SCORE_COURANT to verify the exact
      score value and the crossed threshold — data required for the algorithmic
      tier transition decision.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.006
    consumer_capability: CAP.BSP.001.PAL
    linked_business_subscription: SUB.BUSINESS.BSP.001.006
    subscribed_resource_event:
      id: RVT.BSP.003.CODECISION_OUVERTE
      emitting_capability: CAP.BSP.003.COD
      linked_business_event: EVT.BSP.003.OVERRIDE_DEMANDE
    scope: public
    rationale: >-
      CAP.BSP.001.PAL consumes RES.BSP.003.CODECISION_EN_COURS to know the
      requested target tier and suspend the algorithm while awaiting
      prescriber co-validation.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.001.SIG — Signal detection ─────────────────────────────────────

  - id: SUB.RESOURCE.BSP.001.007
    consumer_capability: CAP.BSP.001.SIG
    linked_business_subscription: SUB.BUSINESS.BSP.001.007
    subscribed_resource_event:
      id: RVT.BSP.004.ENVELOPPE_PERIODE_SANS_CONSOMMATION
      emitting_capability: CAP.BSP.004.ENV
      linked_business_event: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
    scope: public
    rationale: >-
      CAP.BSP.001.SIG consumes RES.BSP.004.ENVELOPPE_NON_CONSOMMEE to
      contextualise the counter-intuitive relapse signal with the details
      of the category and the duration of inactivity on the envelope.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.008
    consumer_capability: CAP.BSP.001.SIG
    linked_business_subscription: SUB.BUSINESS.BSP.001.008
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_ACCORDE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_AUTORISEE
    scope: public
    rationale: >-
      CAP.BSP.001.SIG consumes RES.BSP.004.PAIEMENT_AUTORISE to extract
      consumption patterns (category, merchant, frequency) required for
      detecting behaviours and potential circumventions.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.001.ARB — Algorithm / prescriber arbitration ─────────────────────

  - id: SUB.RESOURCE.BSP.001.009
    consumer_capability: CAP.BSP.001.ARB
    linked_business_subscription: SUB.BUSINESS.BSP.001.009
    subscribed_resource_event:
      id: RVT.BSP.001.SURCHARGE_ACTIVEE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
    scope: public
    rationale: >-
      CAP.BSP.001.ARB consumes RES.BSP.001.SURCHARGE_ACTIVE to record the
      active override parameters: enforced tier, deciding prescriber
      and planned expiry date.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.010
    consumer_capability: CAP.BSP.001.ARB
    linked_business_subscription: SUB.BUSINESS.BSP.001.010
    subscribed_resource_event:
      id: RVT.BSP.001.SCORE_COURANT_RECALCULE
      emitting_capability: CAP.BSP.001.SCO
      linked_business_event: EVT.BSP.001.SCORE_RECALCULE
    scope: public
    rationale: >-
      CAP.BSP.001.ARB consumes RES.BSP.001.SCORE_COURANT to compare the
      algorithmic value against the active prescriber tier and decide whether
      the conditions for algorithmic resumption are met.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.ELI — Eligibility qualification ───────────────────────────────

  - id: SUB.RESOURCE.BSP.002.001
    consumer_capability: CAP.BSP.002.ELI
    linked_business_subscription: SUB.BUSINESS.BSP.002.001
    subscribed_resource_event:
      id: RVT.BSP.003.CODECISION_OUVERTE
      emitting_capability: CAP.BSP.003.COD
      linked_business_event: EVT.BSP.003.OVERRIDE_DEMANDE
    scope: public
    rationale: >-
      CAP.BSP.002.ELI consumes RES.BSP.003.CODECISION_EN_COURS to identify
      the candidate targeted by the prescriber override request and force
      their qualification as eligible for the programme.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.ENR — Enrolment ────────────────────────────────────────────────

  - id: SUB.RESOURCE.BSP.002.002
    consumer_capability: CAP.BSP.002.ENR
    linked_business_subscription: SUB.BUSINESS.BSP.002.002
    subscribed_resource_event:
      id: RVT.BSP.002.ELIGIBILITE_ENREGISTREE
      emitting_capability: CAP.BSP.002.ELI
      linked_business_event: EVT.BSP.002.ELIGIBILITE_VALIDEE
    scope: public
    rationale: >-
      CAP.BSP.002.ENR consumes RES.BSP.002.DOSSIER_ELIGIBLE to extract the
      eligible candidate's identity and the retained criteria, required for
      initialising the formal enrolment case.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.CYC — Beneficiary lifecycle ─────────────────────────────────

  - id: SUB.RESOURCE.BSP.002.003
    consumer_capability: CAP.BSP.002.CYC
    linked_business_subscription: SUB.BUSINESS.BSP.002.003
    subscribed_resource_event:
      id: RVT.BSP.002.DOSSIER_OUVERT
      emitting_capability: CAP.BSP.002.ENR
      linked_business_event: EVT.BSP.002.BENEFICIAIRE_ENROLE
    scope: public
    rationale: >-
      CAP.BSP.002.CYC consumes RES.BSP.002.DOSSIER_ACTIF to initialise
      the beneficiary lifecycle tracking with their initial state, entry
      tier and enrolment date.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.002.004
    consumer_capability: CAP.BSP.002.CYC
    linked_business_subscription: SUB.BUSINESS.BSP.002.004
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_RECHUTE_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_RECHUTE
    scope: public
    rationale: >-
      CAP.BSP.002.CYC consumes RES.BSP.001.SIGNAL_COMPORTEMENTAL to assess
      the severity of the relapse signal and decide on a temporary suspension
      or an adjustment of the beneficiary's case status.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.SOR — Exit from the programme ──────────────────────────────────

  - id: SUB.RESOURCE.BSP.002.005
    consumer_capability: CAP.BSP.002.SOR
    linked_business_subscription: SUB.BUSINESS.BSP.002.005
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.002.SOR consumes RES.BSP.001.FRANCHISSEMENT to verify that the
      reached tier is the terminal tier and trigger the programme exit procedure
      and transfer to the standard application.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.003.ROL — Prescriber role management ─────────────────────────────

  - id: SUB.RESOURCE.BSP.003.001
    consumer_capability: CAP.BSP.003.ROL
    linked_business_subscription: SUB.BUSINESS.BSP.003.001
    subscribed_resource_event:
      id: RVT.BSP.002.DOSSIER_OUVERT
      emitting_capability: CAP.BSP.002.ENR
      linked_business_event: EVT.BSP.002.BENEFICIAIRE_ENROLE
    scope: public
    rationale: >-
      CAP.BSP.003.ROL consumes RES.BSP.002.DOSSIER_ACTIF to extract the
      prescriber network associated with the beneficiary and trigger the
      assignment of differentiated rights by role (banker, psychiatrist, social worker).
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  # ── CAP.BSP.003.NOT — Prescriber alerts & notifications ─────────────────────

  - id: SUB.RESOURCE.BSP.003.002
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.002
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_RECHUTE_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_RECHUTE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consumes RES.BSP.001.SIGNAL_COMPORTEMENTAL to personalise
      the prescriber alert with the nature of the signal, its intensity and
      its behavioural context.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.003.003
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.003
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consumes RES.BSP.001.FRANCHISSEMENT to include in the
      prescriber notification the detail of the tier reached and the new
      autonomy rules applicable to the beneficiary.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.003.004
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.004
    subscribed_resource_event:
      id: RVT.BSP.001.RETROGRADATION_ENREGISTREE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_RETROGRADE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consumes RES.BSP.001.RETROGRADATION to include in the
      prescriber alert the detail of the demotion and the new constraints of
      the lower tier requiring enhanced monitoring.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.003.005
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.005
    subscribed_resource_event:
      id: RVT.BSP.004.ENVELOPPE_PERIODE_SANS_CONSOMMATION
      emitting_capability: CAP.BSP.004.ENV
      linked_business_event: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consumes RES.BSP.004.ENVELOPPE_NON_CONSOMMEE to alert
      the prescriber with the details of the unused envelope and enable them
      to interpret the potential circumvention signal.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  # ── CAP.BSP.003.COD — Inter-prescriber co-decision ───────────────────────────

  - id: SUB.RESOURCE.BSP.003.006
    consumer_capability: CAP.BSP.003.COD
    linked_business_subscription: SUB.BUSINESS.BSP.003.006
    subscribed_resource_event:
      id: RVT.CAN.002.OVERRIDE_UX_INITIE
      emitting_capability: CAP.CAN.002.ACT
      linked_business_event: EVT.CAN.002.OVERRIDE_UX_DECLENCHE
    scope: public
    rationale: >-
      CAP.BSP.003.COD consumes RES.BSP.003.CODECISION_EN_COURS (carried by
      RVT.CAN.002.OVERRIDE_UX_INITIE) to initialise the co-decision process
      with the identified prescribers and the requested target tier.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  # ── CAP.BSP.004.AUT — Purchase authorisation ────────────────────────────────

  - id: SUB.RESOURCE.BSP.004.001
    consumer_capability: CAP.BSP.004.AUT
    linked_business_subscription: SUB.BUSINESS.BSP.004.001
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.004.AUT consumes RES.BSP.001.FRANCHISSEMENT to update its
      authorisation rule referential with the new authorised categories and
      the new daily cap of the reached tier.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.004.002
    consumer_capability: CAP.BSP.004.AUT
    linked_business_subscription: SUB.BUSINESS.BSP.004.002
    subscribed_resource_event:
      id: RVT.BSP.001.RETROGRADATION_ENREGISTREE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_RETROGRADE
    scope: public
    rationale: >-
      CAP.BSP.004.AUT consumes RES.BSP.001.RETROGRADATION to immediately apply
      the restrictive rules of the lower tier in its purchase authorisation
      decisions.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.004.003
    consumer_capability: CAP.BSP.004.AUT
    linked_business_subscription: SUB.BUSINESS.BSP.004.003
    subscribed_resource_event:
      id: RVT.BSP.001.SURCHARGE_ACTIVEE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
    scope: public
    rationale: >-
      CAP.BSP.004.AUT consumes RES.BSP.001.SURCHARGE_ACTIVE to apply the
      prescriber-enforced tier in its authorisation rules, temporarily
      ignoring the algorithmic tier.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  # ── CAP.BSP.004.ENV — Envelope management ────────────────────────────────────

  - id: SUB.RESOURCE.BSP.004.004
    consumer_capability: CAP.BSP.004.ENV
    linked_business_subscription: SUB.BUSINESS.BSP.004.004
    subscribed_resource_event:
      id: RVT.BSP.002.DOSSIER_OUVERT
      emitting_capability: CAP.BSP.002.ENR
      linked_business_event: EVT.BSP.002.BENEFICIAIRE_ENROLE
    scope: public
    rationale: >-
      CAP.BSP.004.ENV consumes RES.BSP.002.DOSSIER_ACTIF to extract the
      beneficiary's initial tier and initialise the corresponding budget
      envelopes for the programme's first period.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.004.005
    consumer_capability: CAP.BSP.004.ENV
    linked_business_subscription: SUB.BUSINESS.BSP.004.005
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.004.ENV consumes RES.BSP.001.FRANCHISSEMENT to recalibrate the
      budget envelopes according to the categories and caps defined for
      the newly reached tier.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  # ── CAP.BSP.004.ALT — Comparison & alternatives ────────────────────────────

  - id: SUB.RESOURCE.BSP.004.006
    consumer_capability: CAP.BSP.004.ALT
    linked_business_subscription: SUB.BUSINESS.BSP.004.006
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_BLOQUE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_REFUSEE
    scope: public
    rationale: >-
      CAP.BSP.004.ALT consumes RES.BSP.004.PAIEMENT_REFUSE to extract the
      category, amount and merchant of the decline in order to search for
      commercial alternatives compatible with the current tier.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  # ── CAP.CAN.001.TAB — Progression dashboard ────────────────────────────────

  - id: SUB.RESOURCE.CAN.001.001
    consumer_capability: CAP.CAN.001.TAB
    linked_business_subscription: SUB.BUSINESS.CAN.001.001
    subscribed_resource_event:
      id: RVT.BSP.001.SCORE_COURANT_RECALCULE
      emitting_capability: CAP.BSP.001.SCO
      linked_business_event: EVT.BSP.001.SCORE_RECALCULE
    scope: public
    rationale: >-
      CAP.CAN.001.TAB consumes RES.BSP.001.SCORE_COURANT to display the
      numerical score value in the gamified progress bar of the
      beneficiary dashboard.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.CAN.001.002
    consumer_capability: CAP.CAN.001.TAB
    linked_business_subscription: SUB.BUSINESS.CAN.001.002
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.CAN.001.TAB consumes RES.BSP.001.FRANCHISSEMENT to update the tier
      level displayed in the dashboard and trigger the motivational
      progression animation.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.CAN.001.003
    consumer_capability: CAP.CAN.001.TAB
    linked_business_subscription: SUB.BUSINESS.CAN.001.003
    subscribed_resource_event:
      id: RVT.BSP.004.CONSOMMATION_ENREGISTREE
      emitting_capability: CAP.BSP.004.ENV
      linked_business_event: EVT.BSP.004.ENVELOPPE_CONSOMMEE
    scope: public
    rationale: >-
      CAP.CAN.001.TAB consumes RES.BSP.004.ENVELOPPE_OUVERTE to update in
      near real-time the available balance for each category displayed
      in the beneficiary dashboard.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  # ── CAP.CAN.001.ACH — Purchase assistance ──────────────────────────────────

  - id: SUB.RESOURCE.CAN.001.004
    consumer_capability: CAP.CAN.001.ACH
    linked_business_subscription: SUB.BUSINESS.CAN.001.004
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_ACCORDE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_AUTORISEE
    scope: public
    rationale: >-
      CAP.CAN.001.ACH consumes RES.BSP.004.PAIEMENT_AUTORISE to display the
      success UX feedback with the transaction details: amount, merchant
      and remaining envelope balance.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.CAN.001.005
    consumer_capability: CAP.CAN.001.ACH
    linked_business_subscription: SUB.BUSINESS.CAN.001.005
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_BLOQUE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_REFUSEE
    scope: public
    rationale: >-
      CAP.CAN.001.ACH consumes RES.BSP.004.PAIEMENT_REFUSE to display the
      decline UX feedback with the explicit reason and the link to the
      proposed alternatives if available.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.CAN.001.006
    consumer_capability: CAP.CAN.001.ACH
    linked_business_subscription: SUB.BUSINESS.CAN.001.006
    subscribed_resource_event:
      id: RVT.BSP.004.ALTERNATIVE_IDENTIFIEE
      emitting_capability: CAP.BSP.004.ALT
      linked_business_event: EVT.BSP.004.ALTERNATIVE_PROPOSEE
    scope: public
    rationale: >-
      CAP.CAN.001.ACH consumes RES.BSP.004.ALTERNATIVE_PROPOSEE to display
      the list of commercial alternatives with their details
      (name, category, tier compatibility).
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
