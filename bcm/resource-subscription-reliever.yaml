meta:
  bcm_name: BCM Reliever — Abonnements ressource
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Direction Programme Reliever

resource_subscriptions:

  # ── CAP.BSP.001.SCO — Scoring comportemental ────────────────────────────────

  - id: SUB.RESOURCE.BSP.001.001
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.001
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_ACCORDE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_AUTORISEE
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consomme le RES.BSP.004.PAIEMENT_AUTORISE pour extraire le
      montant, la catégorie et le marchand de la transaction autorisée, données
      nécessaires au recalcul du score comportemental.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.002
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.002
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_BLOQUE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_REFUSEE
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consomme le RES.BSP.004.PAIEMENT_REFUSE pour extraire le
      motif, la catégorie et le montant du refus comme signal comportemental
      négatif alimentant le recalcul du score.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.003
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.003
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_RECHUTE_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_RECHUTE
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consomme le RES.BSP.001.SIGNAL_COMPORTEMENTAL pour
      extraire le score d'impact et la catégorie du signal de rechute afin
      d'ajuster négativement le recalcul du score courant.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.004
    consumer_capability: CAP.BSP.001.SCO
    linked_business_subscription: SUB.BUSINESS.BSP.001.004
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_PROGRESSION_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_PROGRESSION
    scope: public
    rationale: >-
      CAP.BSP.001.SCO consomme le RES.BSP.001.SIGNAL_COMPORTEMENTAL pour
      extraire le score d'impact positif et la catégorie du signal de
      progression afin d'ajuster positivement le recalcul du score courant.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.001.PAL — Gestion des paliers ───────────────────────────────────

  - id: SUB.RESOURCE.BSP.001.005
    consumer_capability: CAP.BSP.001.PAL
    linked_business_subscription: SUB.BUSINESS.BSP.001.005
    subscribed_resource_event:
      id: RVT.BSP.001.SEUIL_SCORE_ATTEINT
      emitting_capability: CAP.BSP.001.SCO
      linked_business_event: EVT.BSP.001.SCORE_SEUIL_ATTEINT
    scope: public
    rationale: >-
      CAP.BSP.001.PAL consomme le RES.BSP.001.SCORE_COURANT pour vérifier la
      valeur exacte du score et le seuil franchi, données nécessaires à la
      décision de transition de palier algorithmique.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.006
    consumer_capability: CAP.BSP.001.PAL
    linked_business_subscription: SUB.BUSINESS.BSP.001.006
    subscribed_resource_event:
      id: RVT.BSP.003.CODECISION_OUVERTE
      emitting_capability: CAP.BSP.003.COD
      linked_business_event: EVT.BSP.003.OVERRIDE_DEMANDE
    scope: public
    rationale: >-
      CAP.BSP.001.PAL consomme le RES.BSP.003.CODECISION_EN_COURS pour
      connaître le palier cible demandé et suspendre l'algorithme en attente
      de co-validation prescripteur.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.001.SIG — Détection des signaux ─────────────────────────────────

  - id: SUB.RESOURCE.BSP.001.007
    consumer_capability: CAP.BSP.001.SIG
    linked_business_subscription: SUB.BUSINESS.BSP.001.007
    subscribed_resource_event:
      id: RVT.BSP.004.ENVELOPPE_PERIODE_SANS_CONSOMMATION
      emitting_capability: CAP.BSP.004.ENV
      linked_business_event: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
    scope: public
    rationale: >-
      CAP.BSP.001.SIG consomme le RES.BSP.004.ENVELOPPE_NON_CONSOMMEE pour
      contextualiser le signal de rechute contre-intuitif avec les détails
      de la catégorie et de la durée d'inactivité sur l'enveloppe.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.008
    consumer_capability: CAP.BSP.001.SIG
    linked_business_subscription: SUB.BUSINESS.BSP.001.008
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_ACCORDE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_AUTORISEE
    scope: public
    rationale: >-
      CAP.BSP.001.SIG consomme le RES.BSP.004.PAIEMENT_AUTORISE pour extraire
      les patterns de consommation (catégorie, marchand, fréquence) nécessaires
      à la détection de comportements et de contournements éventuels.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.001.ARB — Arbitrage algo / prescripteur ─────────────────────────

  - id: SUB.RESOURCE.BSP.001.009
    consumer_capability: CAP.BSP.001.ARB
    linked_business_subscription: SUB.BUSINESS.BSP.001.009
    subscribed_resource_event:
      id: RVT.BSP.001.SURCHARGE_ACTIVEE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
    scope: public
    rationale: >-
      CAP.BSP.001.ARB consomme le RES.BSP.001.SURCHARGE_ACTIVE pour enregistrer
      les paramètres de la surcharge active : palier forcé, prescripteur
      décisionnaire et date d'expiration prévue.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.001.010
    consumer_capability: CAP.BSP.001.ARB
    linked_business_subscription: SUB.BUSINESS.BSP.001.010
    subscribed_resource_event:
      id: RVT.BSP.001.SCORE_COURANT_RECALCULE
      emitting_capability: CAP.BSP.001.SCO
      linked_business_event: EVT.BSP.001.SCORE_RECALCULE
    scope: public
    rationale: >-
      CAP.BSP.001.ARB consomme le RES.BSP.001.SCORE_COURANT pour comparer la
      valeur algorithmique avec le palier prescripteur actif et décider si les
      conditions de reprise algorithmique sont réunies.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.ELI — Qualification de l'éligibilité ───────────────────────

  - id: SUB.RESOURCE.BSP.002.001
    consumer_capability: CAP.BSP.002.ELI
    linked_business_subscription: SUB.BUSINESS.BSP.002.001
    subscribed_resource_event:
      id: RVT.BSP.003.CODECISION_OUVERTE
      emitting_capability: CAP.BSP.003.COD
      linked_business_event: EVT.BSP.003.OVERRIDE_DEMANDE
    scope: public
    rationale: >-
      CAP.BSP.002.ELI consomme le RES.BSP.003.CODECISION_EN_COURS pour
      identifier le candidat ciblé par la demande de surcharge prescripteur
      et forcer sa qualification comme éligible au programme.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.ENR — Enrôlement ────────────────────────────────────────────

  - id: SUB.RESOURCE.BSP.002.002
    consumer_capability: CAP.BSP.002.ENR
    linked_business_subscription: SUB.BUSINESS.BSP.002.002
    subscribed_resource_event:
      id: RVT.BSP.002.ELIGIBILITE_ENREGISTREE
      emitting_capability: CAP.BSP.002.ELI
      linked_business_event: EVT.BSP.002.ELIGIBILITE_VALIDEE
    scope: public
    rationale: >-
      CAP.BSP.002.ENR consomme le RES.BSP.002.DOSSIER_ELIGIBLE pour extraire
      l'identité du candidat éligible et les critères retenus, nécessaires
      à l'initialisation du dossier d'enrôlement formel.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.CYC — Cycle de vie du bénéficiaire ─────────────────────────

  - id: SUB.RESOURCE.BSP.002.003
    consumer_capability: CAP.BSP.002.CYC
    linked_business_subscription: SUB.BUSINESS.BSP.002.003
    subscribed_resource_event:
      id: RVT.BSP.002.DOSSIER_OUVERT
      emitting_capability: CAP.BSP.002.ENR
      linked_business_event: EVT.BSP.002.BENEFICIAIRE_ENROLE
    scope: public
    rationale: >-
      CAP.BSP.002.CYC consomme le RES.BSP.002.DOSSIER_ACTIF pour initialiser
      le suivi du cycle de vie du bénéficiaire avec son état initial, son
      palier d'entrée et sa date d'enrôlement.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.002.004
    consumer_capability: CAP.BSP.002.CYC
    linked_business_subscription: SUB.BUSINESS.BSP.002.004
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_RECHUTE_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_RECHUTE
    scope: public
    rationale: >-
      CAP.BSP.002.CYC consomme le RES.BSP.001.SIGNAL_COMPORTEMENTAL pour
      évaluer la sévérité du signal de rechute et décider d'une suspension
      temporaire ou d'un ajustement du statut du dossier bénéficiaire.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.002.SOR — Sortie du dispositif ──────────────────────────────────

  - id: SUB.RESOURCE.BSP.002.005
    consumer_capability: CAP.BSP.002.SOR
    linked_business_subscription: SUB.BUSINESS.BSP.002.005
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.002.SOR consomme le RES.BSP.001.FRANCHISSEMENT pour vérifier
      que le palier atteint est le palier terminal et déclencher la procédure
      de sortie du dispositif et de transfert vers l'application standard.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - resource
      - subscription

  # ── CAP.BSP.003.ROL — Gestion des rôles prescripteurs ───────────────────────

  - id: SUB.RESOURCE.BSP.003.001
    consumer_capability: CAP.BSP.003.ROL
    linked_business_subscription: SUB.BUSINESS.BSP.003.001
    subscribed_resource_event:
      id: RVT.BSP.002.DOSSIER_OUVERT
      emitting_capability: CAP.BSP.002.ENR
      linked_business_event: EVT.BSP.002.BENEFICIAIRE_ENROLE
    scope: public
    rationale: >-
      CAP.BSP.003.ROL consomme le RES.BSP.002.DOSSIER_ACTIF pour extraire le
      réseau prescripteur associé au bénéficiaire et déclencher l'attribution
      des droits différenciés par rôle (banquier, psychiatre, travailleur social).
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  # ── CAP.BSP.003.NOT — Alertes & notifications prescripteurs ─────────────────

  - id: SUB.RESOURCE.BSP.003.002
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.002
    subscribed_resource_event:
      id: RVT.BSP.001.SIGNAL_RECHUTE_QUALIFIE
      emitting_capability: CAP.BSP.001.SIG
      linked_business_event: EVT.BSP.001.SIGNAL_RECHUTE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consomme le RES.BSP.001.SIGNAL_COMPORTEMENTAL pour
      personnaliser l'alerte prescripteur avec la nature du signal, son
      intensité et son contexte comportemental.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.003.003
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.003
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consomme le RES.BSP.001.FRANCHISSEMENT pour inclure dans
      la notification prescripteur le détail du palier atteint et les nouvelles
      règles d'autonomie applicables au bénéficiaire.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.003.004
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.004
    subscribed_resource_event:
      id: RVT.BSP.001.RETROGRADATION_ENREGISTREE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_RETROGRADE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consomme le RES.BSP.001.RETROGRADATION pour inclure dans
      l'alerte prescripteur le détail de la rétrogradation et les nouvelles
      contraintes du palier inférieur nécessitant un suivi renforcé.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.003.005
    consumer_capability: CAP.BSP.003.NOT
    linked_business_subscription: SUB.BUSINESS.BSP.003.005
    subscribed_resource_event:
      id: RVT.BSP.004.ENVELOPPE_PERIODE_SANS_CONSOMMATION
      emitting_capability: CAP.BSP.004.ENV
      linked_business_event: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
    scope: public
    rationale: >-
      CAP.BSP.003.NOT consomme le RES.BSP.004.ENVELOPPE_NON_CONSOMMEE pour
      alerter le prescripteur avec le détail de l'enveloppe non utilisée et
      lui permettre d'interpréter le signal de contournement potentiel.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  # ── CAP.BSP.003.COD — Co-décision inter-prescripteurs ───────────────────────

  - id: SUB.RESOURCE.BSP.003.006
    consumer_capability: CAP.BSP.003.COD
    linked_business_subscription: SUB.BUSINESS.BSP.003.006
    subscribed_resource_event:
      id: RVT.CAN.002.OVERRIDE_UX_INITIE
      emitting_capability: CAP.CAN.002.ACT
      linked_business_event: EVT.CAN.002.OVERRIDE_UX_DECLENCHE
    scope: public
    rationale: >-
      CAP.BSP.003.COD consomme le RES.BSP.003.CODECISION_EN_COURS (porté par
      RVT.CAN.002.OVERRIDE_UX_INITIE) pour initialiser le processus de
      co-décision avec les prescripteurs identifiés et le palier cible demandé.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - resource
      - subscription

  # ── CAP.BSP.004.AUT — Autorisation à l'achat ────────────────────────────────

  - id: SUB.RESOURCE.BSP.004.001
    consumer_capability: CAP.BSP.004.AUT
    linked_business_subscription: SUB.BUSINESS.BSP.004.001
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.004.AUT consomme le RES.BSP.001.FRANCHISSEMENT pour mettre à
      jour son référentiel de règles d'autorisation avec les nouvelles
      catégories autorisées et le nouveau plafond journalier du palier atteint.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.004.002
    consumer_capability: CAP.BSP.004.AUT
    linked_business_subscription: SUB.BUSINESS.BSP.004.002
    subscribed_resource_event:
      id: RVT.BSP.001.RETROGRADATION_ENREGISTREE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_RETROGRADE
    scope: public
    rationale: >-
      CAP.BSP.004.AUT consomme le RES.BSP.001.RETROGRADATION pour appliquer
      immédiatement les règles restrictives du palier inférieur dans ses
      décisions d'autorisation à l'achat.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.004.003
    consumer_capability: CAP.BSP.004.AUT
    linked_business_subscription: SUB.BUSINESS.BSP.004.003
    subscribed_resource_event:
      id: RVT.BSP.001.SURCHARGE_ACTIVEE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
    scope: public
    rationale: >-
      CAP.BSP.004.AUT consomme le RES.BSP.001.SURCHARGE_ACTIVE pour appliquer
      le palier prescripteur forcé dans ses règles d'autorisation, en ignorant
      temporairement le palier algorithmique.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  # ── CAP.BSP.004.ENV — Gestion des enveloppes ────────────────────────────────

  - id: SUB.RESOURCE.BSP.004.004
    consumer_capability: CAP.BSP.004.ENV
    linked_business_subscription: SUB.BUSINESS.BSP.004.004
    subscribed_resource_event:
      id: RVT.BSP.002.DOSSIER_OUVERT
      emitting_capability: CAP.BSP.002.ENR
      linked_business_event: EVT.BSP.002.BENEFICIAIRE_ENROLE
    scope: public
    rationale: >-
      CAP.BSP.004.ENV consomme le RES.BSP.002.DOSSIER_ACTIF pour extraire le
      palier initial du bénéficiaire et initialiser les enveloppes budgétaires
      correspondantes pour la première période du programme.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.BSP.004.005
    consumer_capability: CAP.BSP.004.ENV
    linked_business_subscription: SUB.BUSINESS.BSP.004.005
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.BSP.004.ENV consomme le RES.BSP.001.FRANCHISSEMENT pour recalibrer
      les enveloppes budgétaires selon les catégories et plafonds définis pour
      le nouveau palier atteint.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  # ── CAP.BSP.004.ALT — Comparaison & alternatives ────────────────────────────

  - id: SUB.RESOURCE.BSP.004.006
    consumer_capability: CAP.BSP.004.ALT
    linked_business_subscription: SUB.BUSINESS.BSP.004.006
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_BLOQUE
      emitting_capability: CAP.BSP.004.AUT
      linked_business_event: EVT.BSP.004.TRANSACTION_REFUSEE
    scope: public
    rationale: >-
      CAP.BSP.004.ALT consomme le RES.BSP.004.PAIEMENT_REFUSE pour extraire
      la catégorie, le montant et le marchand du refus afin de rechercher des
      alternatives commerciales compatibles avec le palier courant.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - resource
      - subscription

  # ── CAP.CAN.001.TAB — Tableau de progression ────────────────────────────────

  - id: SUB.RESOURCE.CAN.001.001
    consumer_capability: CAP.CAN.001.TAB
    linked_business_subscription: SUB.BUSINESS.CAN.001.001
    subscribed_resource_event:
      id: RVT.BSP.001.SCORE_COURANT_RECALCULE
      emitting_capability: CAP.BSP.001.SCO
      linked_business_event: EVT.BSP.001.SCORE_RECALCULE
    scope: public
    rationale: >-
      CAP.CAN.001.TAB consomme le RES.BSP.001.SCORE_COURANT pour afficher la
      valeur numérique du score dans la barre de progression gamifiée du
      tableau de bord bénéficiaire.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.CAN.001.002
    consumer_capability: CAP.CAN.001.TAB
    linked_business_subscription: SUB.BUSINESS.CAN.001.002
    subscribed_resource_event:
      id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
      emitting_capability: CAP.BSP.001.PAL
      linked_business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    rationale: >-
      CAP.CAN.001.TAB consomme le RES.BSP.001.FRANCHISSEMENT pour mettre à
      jour le niveau de palier affiché dans le tableau de bord et déclencher
      l'animation de progression motivationnelle.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  - id: SUB.RESOURCE.CAN.001.003
    consumer_capability: CAP.CAN.001.TAB
    linked_business_subscription: SUB.BUSINESS.CAN.001.003
    subscribed_resource_event:
      id: RVT.BSP.004.CONSOMMATION_ENREGISTREE
      emitting_capability: CAP.BSP.004.ENV
      linked_business_event: EVT.BSP.004.ENVELOPPE_CONSOMMEE
    scope: public
    rationale: >-
      CAP.CAN.001.TAB consomme le RES.BSP.004.ENVELOPPE_OUVERTE pour mettre
      à jour en quasi-temps-réel le solde disponible de chaque catégorie
      affiché dans le tableau de bord bénéficiaire.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - resource
      - subscription

  # ── CAP.CAN.001.ACH — Assistance à l'achat ──────────────────────────────────

  - id: SUB.RESOURCE.CAN.001.004
    consumer_capability: CAP.CAN.001.ACH
    linked_business_subscription: SUB.BUSINESS.CAN.001.004
    subscribed_resource_event:
      id: RVT.BSP.004.PAIEMENT_ACCORDE
