meta:
  bcm_name: BCM Reliever — L2
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

capabilities:

  # ── CAP.BSP.001 — Behavioural Remediation ───────────────────────────────────

  - id: CAP.BSP.001.SCO
    name: Behavioural Scoring
    level: L2
    parent: CAP.BSP.001
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Compute the beneficiary's behavioural score in real time from each
      transaction and incoming signal. The score is the sole source of truth for
      tier-change decisions, except for explicitly validated prescriber overrides.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0005

  - id: CAP.BSP.001.PAL
    name: Tier Management
    level: L2
    parent: CAP.BSP.001
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Manage tier transitions (upward progression, demotion) by applying the
      thresholds defined in CAP.REF.001.PAL. Triggers updates to the dedicated card
      rules (B2B.001.CRT) on each tier change.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0005

  - id: CAP.BSP.001.SIG
    name: Signal Detection
    level: L2
    parent: CAP.BSP.001
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Detect abnormal behavioural signals surfaced by BSP.004 (notably unconsumed
      budget envelopes as a relapse signal) and transform them into actionable events
      for scoring and prescriber coordination.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0005

  - id: CAP.BSP.001.ARB
    name: Prescriber Arbitration
    level: L2
    parent: CAP.BSP.001
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Handle manual overrides initiated by a prescriber via CAN.002.ACT:
      apply the human decision, monitor actual outcomes, and return control
      to the algorithm when reality confirms or refutes the prescriber's decision.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0005

  # ── CAP.BSP.002 — Beneficiary Access & Lifecycle ────────────────────────────

  - id: CAP.BSP.002.ELI
    name: Eligibility
    level: L2
    parent: CAP.BSP.002
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Verify that an individual meets the entry criteria for the Reliever programme
      (demonstrated financial vulnerability, valid prescription) before any enrolment.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0006

  - id: CAP.BSP.002.ENR
    name: Enrolment
    level: L2
    parent: CAP.BSP.002
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Formalise the beneficiary's entry into the programme after eligibility
      verification and GDPR consent. Triggers the creation of the dedicated card
      (B2B.001.CRT) and the initialisation of open banking access (B2B.001.OBK).
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0006

  - id: CAP.BSP.002.CYC
    name: Lifecycle Monitoring
    level: L2
    parent: CAP.BSP.002
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Maintain the beneficiary's current state within the programme: active tier,
      prescriber statuses, history of key events. Reference point for all other L2
      capabilities requiring the beneficiary's current state.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0006

  - id: CAP.BSP.002.SOR
    name: Programme Exit
    level: L2
    parent: CAP.BSP.002
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Manage the beneficiary's exit: successful exit (transfer to standard banking
      application at the final tier), administrative exit, or voluntary dropout.
      Triggers card termination (B2B.001.CRT) and rights review (SUP.001.RET).
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0006

  # ── CAP.BSP.003 — Prescriber Coordination ───────────────────────────────────

  - id: CAP.BSP.003.ROL
    name: Prescriber Role Management
    level: L2
    parent: CAP.BSP.003
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Define and maintain prescriber roles on each beneficiary case:
      who can see what, who can act, who co-decides. Visibility is filtered by role
      to respect distinct professional confidentiality obligations (medical, social, banking).
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0007

  - id: CAP.BSP.003.NOT
    name: Prescriber Notification & Communication
    level: L2
    parent: CAP.BSP.003
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Notify the relevant prescribers of significant events in the beneficiary's
      journey (behavioural alert, tier change, co-decision request)
      according to their rights and channel preferences.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0007

  - id: CAP.BSP.003.COD
    name: Co-Decision
    level: L2
    parent: CAP.BSP.003
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Formalise decisions requiring agreement from multiple prescribers:
      collect positions, resolve disagreements, produce a validated collective
      decision transmitted to BSP.001.PAL for application.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0007

  # ── CAP.BSP.004 — Transaction Control ───────────────────────────────────────

  - id: CAP.BSP.004.AUT
    name: Transaction Authorisation
    level: L2
    parent: CAP.BSP.004
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Authorise or decline each transaction on the dedicated card by applying the
      current tier rules (limits, authorised categories, authorised merchants) in real time.
      This is the universal and non-bypassable control point of the programme.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0008

  - id: CAP.BSP.004.ENV
    name: Budget Envelope Management
    level: L2
    parent: CAP.BSP.004
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Allocate and track budget envelopes by spending category according to the
      current tier. Triggers card funding (B2B.001.FLX) and produces depletion signals.
      An unconsumed budget triggers a potential relapse signal.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0008

  - id: CAP.BSP.004.ALT
    name: Behavioural Alerts
    level: L2
    parent: CAP.BSP.004
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Detect and surface abnormal behavioural patterns from the transaction stream
      to BSP.001.SIG: bypass attempts, recurring declines, systematically unconsumed
      budgets. These signals feed the scoring without directly modifying operations.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0008

  # ── CAP.CAN.001 — Beneficiary Journey ───────────────────────────────────────

  - id: CAP.CAN.001.TAB
    name: Beneficiary Dashboard
    level: L2
    parent: CAP.CAN.001
    zoning: CHANNEL
    description: >
      Expose to the beneficiary a synthetic view of their financial situation adapted
      to their tier: available balance, envelopes, transaction history. The interface
      is calibrated to encourage without patronising — dignity is a functional constraint.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0009

  - id: CAP.CAN.001.ACH
    name: Purchase Assistance
    level: L2
    parent: CAP.CAN.001
    zoning: CHANNEL
    description: >
      Provide contextualised assistance at the point of purchase: budget availability
      check before payment, cheaper alternatives, price comparison. This capability
      is the UX manifestation of real-time behavioural control.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0009

  - id: CAP.CAN.001.NOT
    name: Beneficiary Notifications
    level: L2
    parent: CAP.CAN.001
    zoning: CHANNEL
    description: >
      Notify the beneficiary of relevant events in their journey: declined transaction,
      tier change, message from a prescriber, budget alert.
      Tone and content respect the dignity constraint.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0009

  # ── CAP.CAN.002 — Prescriber Portal ─────────────────────────────────────────

  - id: CAP.CAN.002.VUE
    name: Prescriber Beneficiary View
    level: L2
    parent: CAP.CAN.002
    zoning: CHANNEL
    description: >
      Expose to prescribers a filtered view of the beneficiary case according to their
      role and rights. A doctor does not see the same data as a banker. Access
      requires Consent.Granted (SUP.001.CON) as a precondition.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0010

  - id: CAP.CAN.002.ACT
    name: Prescriber Actions
    level: L2
    parent: CAP.CAN.002
    zoning: CHANNEL
    description: >
      Allow authorised prescribers to take actions on a case:
      manual tier override, co-decision initiation, envelope rule adjustment.
      These actions are forwarded to BSP.003.COD or BSP.001.ARB.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0010

  - id: CAP.CAN.002.RAP
    name: Prescriber Reporting
    level: L2
    parent: CAP.CAN.002
    zoning: CHANNEL
    description: >
      Provide prescribers with aggregated monitoring reports on the beneficiary:
      score evolution, tier history, behavioural trends. Data comes from
      DAT.001.REP and is filtered by the prescriber's rights.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0010

  # ── CAP.B2B.001 — Financial Instrument Management ───────────────────────────

  - id: CAP.B2B.001.CRT
    name: Dedicated Card Management
    level: L2
    parent: CAP.B2B.001
    zoning: EXCHANGE_B2B
    description: >
      Drive the complete lifecycle of the Reliever dedicated card — issuance, activation,
      suspension, termination — in liaison with an approved issuing partner. Card usage
      rules (limits, categories) are synchronised with the current tier.
    owner: Financial Partnerships & Payments Team
    adrs:
      - ADR-BCM-FUNC-0011

  - id: CAP.B2B.001.OBK
    name: Open Banking Integration
    level: L2
    parent: CAP.B2B.001
    zoning: EXCHANGE_B2B
    description: >
      Access and refresh the beneficiary's main account financial data
      via open banking APIs (PSD2). Requires prior Consent.Granted.
      Makes Reliever independent of inter-bank agreements.
    owner: Financial Partnerships & Payments Team
    adrs:
      - ADR-BCM-FUNC-0011

  - id: CAP.B2B.001.FLX
    name: Financial Flow Management
    level: L2
    parent: CAP.B2B.001
    zoning: EXCHANGE_B2B
    description: >
      Orchestrate the funding of the dedicated card from the beneficiary's main account,
      ensure flow reconciliation and handle anomalies. Triggered by envelope
      events from BSP.004.ENV.
    owner: Financial Partnerships & Payments Team
    adrs:
      - ADR-BCM-FUNC-0011

  # ── CAP.SUP.001 — Compliance & Data Protection ──────────────────────────────

  - id: CAP.SUP.001.CON
    name: Consent Management
    level: L2
    parent: CAP.SUP.001
    zoning: SUPPORT
    description: >
      Collect, store, manage and honour the beneficiary's GDPR consents for
      each type of data sharing. Consent.Granted is a blocking precondition
      for enrolment, open banking, and any prescriber consultation.
    owner: DPO (Data Protection Officer)
    adrs:
      - ADR-BCM-FUNC-0012

  - id: CAP.SUP.001.AUD
    name: Audit & Traceability
    level: L2
    parent: CAP.SUP.001
    zoning: SUPPORT
    description: >
      Log all accesses and actions on beneficiary data, across all capabilities.
      Cross-cutting capability: 100% of beneficiary data accesses must produce
      DataAccess.Logged — a GDPR regulatory obligation.
    owner: DPO (Data Protection Officer)
    adrs:
      - ADR-BCM-FUNC-0012

  - id: CAP.SUP.001.RET
    name: Beneficiary Rights
    level: L2
    parent: CAP.SUP.001
    zoning: SUPPORT
    description: >
      Process the beneficiary's GDPR rights requests (access, rectification, erasure,
      portability, objection) within the legal timeframe (1 month). Triggered notably
      by programme exit (BSP.002.SOR).
    owner: DPO (Data Protection Officer)
    adrs:
      - ADR-BCM-FUNC-0012

  # ── CAP.REF.001 — Shared Referentials ───────────────────────────────────────

  - id: CAP.REF.001.BEN
    name: Beneficiary Referential
    level: L2
    parent: CAP.REF.001
    zoning: REFERENTIAL
    description: >
      Hold and maintain the canonical beneficiary identity, single source of truth
      for all capabilities. No other capability may maintain its own copy
      of the beneficiary identity — golden record rule.
    owner: Data & Referentials Team
    adrs:
      - ADR-BCM-FUNC-0013

  - id: CAP.REF.001.PRE
    name: Prescriber Referential
    level: L2
    parent: CAP.REF.001
    zoning: REFERENTIAL
    description: >
      Hold and maintain the canonical identity of prescribers and their organisations.
      Distinguishes prescriber types (banker, doctor, social worker) and their
      respective authorisations within the programme.
    owner: Data & Referentials Team
    adrs:
      - ADR-BCM-FUNC-0013

  - id: CAP.REF.001.PAL
    name: Tier Referential
    level: L2
    parent: CAP.REF.001
    zoning: REFERENTIAL
    description: >
      Hold and maintain the canonical tier definitions: usage rules, transition
      thresholds, associated rights. Any modification goes through this L2 and triggers
      Tier.DefinitionUpdated, consumed in cascade by BSP.001, BSP.004 and B2B.001.
    owner: Data & Referentials Team
    adrs:
      - ADR-BCM-FUNC-0013

  # ── CAP.DAT.001 — Behavioural Analytics ─────────────────────────────────────

  - id: CAP.DAT.001.ING
    name: Event Ingestion
    level: L2
    parent: CAP.DAT.001
    zoning: DATA_ANALYTIQUE
    description: >
      Collect and consolidate in decoupled analytics mode all behavioural events
      produced by the programme (BSP.001, BSP.002, BSP.003, BSP.004) to feed the
      analytics pipelines. Strict separation from the operational transactional pipeline.
    owner: Data Science & BI Team
    adrs:
      - ADR-BCM-FUNC-0014

  - id: CAP.DAT.001.MOD
    name: Score Analytics Model
    level: L2
    parent: CAP.DAT.001
    zoning: DATA_ANALYTIQUE
    description: >
      Analyse aggregated behavioural patterns, improve the scoring model and propose
      tier threshold updates. ScoreModel.Updated is sent to PIL.001.GOV
      for validation — never directly to BSP.001.SCO, preventing any uncontrolled feedback loop.
    owner: Data Science & BI Team
    adrs:
      - ADR-BCM-FUNC-0014

  - id: CAP.DAT.001.REP
    name: Programme Reporting
    level: L2
    parent: CAP.DAT.001
    zoning: DATA_ANALYTIQUE
    description: >
      Produce dashboards and monitoring reports on the overall effectiveness of the
      remediation programme: progression rate, relapse rate, exit rate. This data
      feeds PIL.001.KPI for programme governance decisions.
    owner: Data Science & BI Team
    adrs:
      - ADR-BCM-FUNC-0014

  # ── CAP.PIL.001 — Programme Steering ────────────────────────────────────────

  - id: CAP.PIL.001.GOV
    name: Programme Governance
    level: L2
    parent: CAP.PIL.001
    zoning: STEERING
    description: >
      Define and evolve programme governance policies: eligibility rules,
      tier thresholds, co-decision protocols. Validates scoring model updates
      (ScoreModel.Updated from DAT.001.MOD) before any production deployment.
    owner: Reliever Programme Directorate / Compliance Officer
    adrs:
      - ADR-BCM-FUNC-0015

  - id: CAP.PIL.001.KPI
    name: Performance Monitoring
    level: L2
    parent: CAP.PIL.001
    zoning: STEERING
    description: >
      Measure programme effectiveness at scale: progression rate, relapse rate,
      successful exit rate, perceived dignity. Consumes DAT.001.REP reports and
      produces ProgrammePerformance.Evaluated for governance decisions.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0015

  - id: CAP.PIL.001.AUD
    name: Programme Compliance Audit
    level: L2
    parent: CAP.PIL.001
    zoning: STEERING
    description: >
      Verify the programme's overall regulatory compliance (banking, medical and social
      frameworks). Distinct from SUP.001.AUD (technical GDPR audit): PIL.001.AUD certifies
      programme-level regulatory compliance, with the Compliance Officer as the principal actor.
    owner: Compliance Officer
    adrs:
      - ADR-BCM-FUNC-0015
