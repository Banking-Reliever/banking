meta:
  bcm_name: BCM Reliever — Resource Events
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

resource_events:

  # ── BSP.001.SCO — Behavioural scoring ────────────────────────────────────────

  - id: RVT.BSP.001.SCORE_ENTREE_CALCULE
    name: Entry score computed
    definition: >-
      The baseline behavioural score has been computed at the beneficiary's enrolment.
      First evaluation, serves as a reference to measure progression throughout the programme.
    emitting_capability: CAP.BSP.001.SCO
    carried_resource: RES.BSP.001.SCORE_ENTREE
    business_event: EVT.BSP.001.SCORE_RECALCULE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - baseline

  - id: RVT.BSP.001.SCORE_COURANT_RECALCULE
    name: Current score recomputed
    definition: >-
      The behavioural score has been recomputed after a transaction or a significant
      behavioural signal. Operational value used for tier decisions.
    emitting_capability: CAP.BSP.001.SCO
    carried_resource: RES.BSP.001.SCORE_COURANT
    business_event: EVT.BSP.001.SCORE_RECALCULE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - real-time

  # ── BSP.001.PAL — Tier management ───────────────────────────────────────────

  - id: RVT.BSP.001.FRANCHISSEMENT_ENREGISTRE
    name: Tier upgrade recorded
    definition: >-
      The transition to a higher tier has been recorded. Triggers the update
      of the dedicated card's rules and the allocation of new envelopes.
    emitting_capability: CAP.BSP.001.PAL
    carried_resource: RES.BSP.001.FRANCHISSEMENT
    business_event: EVT.BSP.001.PALIER_HAUSSE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - progression

  - id: RVT.BSP.001.RETROGRADATION_ENREGISTREE
    name: Tier demotion recorded
    definition: >-
      The return to a lower tier has been recorded. Triggers the restrictive update
      of the dedicated card's rules and a prescriber alert.
    emitting_capability: CAP.BSP.001.PAL
    carried_resource: RES.BSP.001.RETROGRADATION
    business_event: EVT.BSP.001.PALIER_RETROGRADE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - regression

  # ── BSP.001.ARB — Algorithm / prescriber arbitration ──────────────────────────

  - id: RVT.BSP.001.SURCHARGE_ACTIVEE
    name: Prescriber override activated
    definition: >-
      A prescriber override has been put into force: the algorithm is placed on hold,
      the prescriber takes control of the tier.
    emitting_capability: CAP.BSP.001.PAL
    carried_resource: RES.BSP.001.SURCHARGE_ACTIVE
    business_event: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - human-override

  - id: RVT.BSP.001.SURCHARGE_CLOTUREE
    name: Prescriber override closed
    definition: >-
      A prescriber override has ended: the algorithm has resumed control,
      the outcome of the human decision is documented.
    emitting_capability: CAP.BSP.001.ARB
    carried_resource: RES.BSP.001.SURCHARGE_CLOTUREE
    business_event: EVT.BSP.001.ARBITRAGE_ALGO_REAFFIRME
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - audit

  # ── BSP.001.SIG — Behavioural signals ───────────────────────────────────────

  - id: RVT.BSP.001.SIGNAL_RECHUTE_QUALIFIE
    name: Relapse signal qualified
    definition: >-
      A potential relapse behavioural signal has been qualified and contextualised.
      Feeds score recomputation and can trigger a prescriber alert.
    emitting_capability: CAP.BSP.001.SIG
    carried_resource: RES.BSP.001.SIGNAL_COMPORTEMENTAL
    business_event: EVT.BSP.001.SIGNAL_RECHUTE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - behavioral
      - counterintuitive

  - id: RVT.BSP.001.SIGNAL_PROGRESSION_QUALIFIE
    name: Progression signal qualified
    definition: >-
      A positive behavioural signal has been qualified. Contributes positively
      to the behavioural score recomputation.
    emitting_capability: CAP.BSP.001.SIG
    carried_resource: RES.BSP.001.SIGNAL_COMPORTEMENTAL
    business_event: EVT.BSP.001.SIGNAL_PROGRESSION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - behavioral

  # ── BSP.002.ENR — Enrolment ─────────────────────────────────────────────────

  - id: RVT.BSP.002.DOSSIER_OUVERT
    name: Participation case opened
    definition: >-
      An active case has been created for a beneficiary enrolled in the programme.
    emitting_capability: CAP.BSP.002.ENR
    carried_resource: RES.BSP.002.DOSSIER_ACTIF
    business_event: EVT.BSP.002.BENEFICIAIRE_ENROLE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - core-domain

  # ── BSP.002.SOR — Exit ─────────────────────────────────────────────────────

  - id: RVT.BSP.002.DOSSIER_CLOTURE
    name: Participation case closed
    definition: >-
      A beneficiary's case has been closed following their exit from the programme.
    emitting_capability: CAP.BSP.002.SOR
    carried_resource: RES.BSP.002.DOSSIER_CLOS
    business_event: EVT.BSP.002.BENEFICIAIRE_SORTI
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - terminal

  # ── BSP.004.AUT — Payment authorisation ──────────────────────────────────────

  - id: RVT.BSP.004.PAIEMENT_ACCORDE
    name: Payment granted
    definition: >-
      A dedicated card transaction has been authorised. The relevant budget
      envelope is updated.
    emitting_capability: CAP.BSP.004.AUT
    carried_resource: RES.BSP.004.PAIEMENT_AUTORISE
    business_event: EVT.BSP.004.TRANSACTION_AUTORISEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time

  - id: RVT.BSP.004.PAIEMENT_BLOQUE
    name: Payment blocked
    definition: >-
      A dedicated card transaction has been declined. The decline is a
      behavioural signal forwarded to CAP.BSP.001.SIG.
    emitting_capability: CAP.BSP.004.AUT
    carried_resource: RES.BSP.004.PAIEMENT_REFUSE
    business_event: EVT.BSP.004.TRANSACTION_REFUSEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time
      - behavioral-signal

  # ── BSP.004.ENV — Budget envelopes ────────────────────────────────────────────

  - id: RVT.BSP.004.ENVELOPPE_INITIALISEE
    name: Budget envelope initialised
    definition: >-
      A budget envelope has been opened for the current period according to
      the beneficiary's tier definition.
    emitting_capability: CAP.BSP.004.ENV
    carried_resource: RES.BSP.004.ENVELOPPE_OUVERTE
    business_event: EVT.BSP.004.ENVELOPPE_ALLOUEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget

  - id: RVT.BSP.004.ENVELOPPE_ATTEINT_PLAFOND
    name: Budget envelope capped
    definition: >-
      A budget envelope has reached its cap. Normal consumption signal.
    emitting_capability: CAP.BSP.004.ENV
    carried_resource: RES.BSP.004.ENVELOPPE_EPUISEE
    business_event: EVT.BSP.004.ENVELOPPE_EPUISEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget

  - id: RVT.BSP.004.ENVELOPPE_PERIODE_SANS_CONSOMMATION
    name: Envelope closed without consumption
    definition: >-
      A budget envelope closed at the end of the period without consumption
      or with marginal consumption. Counter-intuitive relapse signal.
    emitting_capability: CAP.BSP.004.ENV
    carried_resource: RES.BSP.004.ENVELOPPE_NON_CONSOMMEE
    business_event: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - behavioral-signal
      - counterintuitive
      - relapse-signal

  # ── B2B.001.CRT — Card lifecycle ──────────────────────────────────────────────

  - id: RVT.B2B.001.CARTE_MISE_EN_SERVICE
    name: Dedicated card put into service
    definition: >-
      The dedicated card has been activated with the current tier's usage rules.
    emitting_capability: CAP.B2B.001.CRT
    carried_resource: RES.B2B.001.CARTE_ACTIVE
    business_event: EVT.B2B.001.CARTE_ACTIVEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-instrument

  - id: RVT.B2B.001.CARTE_MISE_EN_ATTENTE
    name: Dedicated card placed on hold
    definition: >-
      The dedicated card has been temporarily suspended. Reactivation is possible.
    emitting_capability: CAP.B2B.001.CRT
    carried_resource: RES.B2B.001.CARTE_SUSPENDUE
    business_event: EVT.B2B.001.CARTE_SUSPENDUE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - lifecycle

  - id: RVT.B2B.001.CARTE_FERMEE_DEFINITIVEMENT
    name: Dedicated card permanently closed
    definition: >-
      The dedicated card has been terminated following the beneficiary's exit from the programme.
    emitting_capability: CAP.B2B.001.CRT
    carried_resource: RES.B2B.001.CARTE_RESILIEE
    business_event: EVT.B2B.001.CARTE_RESILIEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - lifecycle
      - terminal

  # ── SUP.001.CON — GDPR consent ─────────────────────────────────────────────

  - id: RVT.SUP.001.CONSENTEMENT_ACTIVE
    name: GDPR consent activated
    definition: >-
      A valid GDPR consent is in force. Unblocks enrolment, open banking
      and prescriber consultations.
    emitting_capability: CAP.SUP.001.CON
    carried_resource: RES.SUP.001.CONSENTEMENT_ACTIF
    business_event: EVT.SUP.001.CONSENTEMENT_ACCORDE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0012
    tags:
      - RGPD
      - blocking-precondition

  - id: RVT.SUP.001.CONSENTEMENT_RETIRE
    name: GDPR consent withdrawn
    definition: >-
      The GDPR consent has been revoked. All access to the beneficiary's data
      is immediately suspended.
    emitting_capability: CAP.SUP.001.CON
    carried_resource: RES.SUP.001.CONSENTEMENT_REVOQUE
    business_event: EVT.SUP.001.CONSENTEMENT_REVOQUE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0012
    tags:
      - RGPD
      - compliance

  # ── DAT.001.MOD — Scoring model ─────────────────────────────────────────────

  - id: RVT.DAT.001.MODELE_SOUMIS_GOUVERNANCE
    name: Model submitted to governance
    definition: >-
      A new scoring model has been submitted to PIL.001.GOV for validation.
      Production deployment is blocked until validation.
    emitting_capability: CAP.DAT.001.MOD
    carried_resource: RES.DAT.001.MODELE_EN_VALIDATION
    business_event: EVT.DAT.001.MODELE_SCORE_MAJ
    scope: public
    adrs:
      - ADR-BCM-FUNC-0014
      - ADR-BCM-FUNC-0015
    tags:
      - governance
      - versioned

  - id: RVT.DAT.001.MODELE_DEPLOYE_PRODUCTION
    name: Model deployed to production
    definition: >-
      A scoring model validated by PIL.001.GOV has been deployed to production
      on CAP.BSP.001.SCO. Only one active model at a time.
    emitting_capability: CAP.DAT.001.MOD
    carried_resource: RES.DAT.001.MODELE_ACTIF
    business_event: EVT.DAT.001.MODELE_SCORE_MAJ
    scope: public
    adrs:
      - ADR-BCM-FUNC-0014
      - ADR-BCM-FUNC-0015
    tags:
      - governance
      - production

  # ── Additional RVTs added to complete subscription coverage ────────────────

  # BSP.001.SCO — score threshold
  - id: RVT.BSP.001.SEUIL_SCORE_ATTEINT
    name: Score threshold reached
    definition: >-
      A beneficiary's current score has crossed a tier transition threshold.
      Triggers the evaluation of a tier change in CAP.BSP.001.PAL.
    emitting_capability: CAP.BSP.001.SCO
    carried_resource: RES.BSP.001.SCORE_COURANT
    business_event: EVT.BSP.001.SCORE_SEUIL_ATTEINT
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - algorithmic
      - trigger

  # BSP.002.ELI — eligibility validated
  - id: RVT.BSP.002.ELIGIBILITE_ENREGISTREE
    name: Eligibility recorded
    definition: >-
      A candidate has been formally recorded as eligible for the programme.
      The ELIGIBLE case status authorises the start of enrolment by CAP.BSP.002.ENR.
    emitting_capability: CAP.BSP.002.ELI
    carried_resource: RES.BSP.002.DOSSIER_ELIGIBLE
    business_event: EVT.BSP.002.ELIGIBILITE_VALIDEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - pre-enrollment

  # BSP.002.SOR — transfer to standard app
  - id: RVT.BSP.002.TRANSFERT_APP_ENREGISTRE
    name: Transfer to standard application recorded
    definition: >-
      The successful closure of a case following transfer to the standard banking application.
      This is the programme's nominal outcome: full financial autonomy achieved.
    emitting_capability: CAP.BSP.002.SOR
    carried_resource: RES.BSP.002.DOSSIER_CLOS
    business_event: EVT.BSP.002.BENEFICIAIRE_TRANSFERE_APP_STANDARD
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - success
      - terminal

  # BSP.003.COD — co-decision opened
  - id: RVT.BSP.003.CODECISION_OUVERTE
    name: Co-decision opened
    definition: >-
      A co-decision request has been opened and prescriber positions are
      starting to be collected. The override has not yet been applied.
    emitting_capability: CAP.BSP.003.COD
    carried_resource: RES.BSP.003.CODECISION_EN_COURS
    business_event: EVT.BSP.003.OVERRIDE_DEMANDE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - human-override

  # BSP.003.ROL — role assigned
  - id: RVT.BSP.003.HABILITATION_ACTIVEE
    name: Prescriber authorisation activated
    definition: >-
      A prescriber role is now active on a beneficiary's case.
      Consultation and action rights are immediately effective.
    emitting_capability: CAP.BSP.003.ROL
    carried_resource: RES.BSP.003.ROLE_ATTRIBUE
    business_event: EVT.BSP.003.ROLE_ATTRIBUE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - access-control

  # BSP.003.COD — co-decision validated
  - id: RVT.BSP.003.DECISION_COVALIDEE
    name: Co-decision validated
    definition: >-
      The resolution of a multi-prescriber deliberation is validated.
      The override is forwarded to CAP.BSP.001.PAL or BSP.001.ARB for application.
    emitting_capability: CAP.BSP.003.COD
    carried_resource: RES.BSP.003.CODECISION_VALIDEE
    business_event: EVT.BSP.003.OVERRIDE_COVALIDÉ
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - audit

  # BSP.003.COD — co-decision rejected
  - id: RVT.BSP.003.DECISION_REJETEE
    name: Co-decision rejected
    definition: >-
      The multi-prescriber deliberation concluded with a rejection.
      The algorithm retains control of the tier.
    emitting_capability: CAP.BSP.003.COD
    carried_resource: RES.BSP.003.CODECISION_REJETEE
    business_event: EVT.BSP.003.OVERRIDE_REFUSE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - audit

  # BSP.004.ENV — envelope consumption
  - id: RVT.BSP.004.CONSOMMATION_ENREGISTREE
    name: Envelope consumption recorded
    definition: >-
      A transaction has been charged to an ongoing budget envelope.
      The available balance is updated. Neutral signal of normal behaviour.
    emitting_capability: CAP.BSP.004.ENV
    carried_resource: RES.BSP.004.ENVELOPPE_OUVERTE
    business_event: EVT.BSP.004.ENVELOPPE_CONSOMMEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget

  # BSP.004.ALT — alternative identified
  - id: RVT.BSP.004.ALTERNATIVE_IDENTIFIEE
    name: Purchase alternative identified
    definition: >-
      One or more commercial alternatives compatible with the tier have been
      identified and proposed to the beneficiary following a payment decline.
    emitting_capability: CAP.BSP.004.ALT
    carried_resource: RES.BSP.004.ALTERNATIVE_PROPOSEE
    business_event: EVT.BSP.004.ALTERNATIVE_PROPOSEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - dignity

  # CAN.002.ACT — UX override initiated
  - id: RVT.CAN.002.OVERRIDE_UX_INITIE
    name: UX override initiated
    definition: >-
      An algorithmic override request action has been recorded from the prescriber
      interface. The co-decision is forwarded to CAP.BSP.003.COD.
    emitting_capability: CAP.CAN.002.ACT
    carried_resource: RES.BSP.003.CODECISION_EN_COURS
    business_event: EVT.CAN.002.OVERRIDE_UX_DECLENCHE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - channel
      - human-override

  # CAN.002.VUE — prescriber case consultation
  - id: RVT.CAN.002.DOSSIER_VU_PRESCRIPTEUR
    name: Case consulted by prescriber
    definition: >-
      A prescriber's consultation of a beneficiary's case has been recorded
      in the channel interface. Triggers report generation in CAP.CAN.002.RAP.
    emitting_capability: CAP.CAN.002.VUE
    carried_resource: RES.BSP.002.DOSSIER_ACTIF
    business_event: EVT.CAN.002.DOSSIER_CONSULTE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - channel
      - audit

  # DAT.001.ING — behavioural batch available
  - id: RVT.DAT.001.LOT_DISPONIBLE
    name: Behavioural batch available
    definition: >-
      A batch of anonymised behavioural data is available in the analytics platform
      to feed the scoring model (DAT.001.MOD) and reporting (DAT.001.REP).
    emitting_capability: CAP.DAT.001.ING
    carried_resource: RES.DAT.001.LOT_INGERE
    business_event: EVT.DAT.001.DONNEES_COMPORTEMENTALES_INGEREES
    scope: internal
    adrs:
      - ADR-BCM-FUNC-0014
    tags:
      - analytics

  # DAT.001.REP — analytics report available
  - id: RVT.DAT.001.RAPPORT_DISPONIBLE
    name: Programme analytics report available
    definition: >-
      A global programme performance report is available for
      steering governance bodies (PIL.001.KPI).
    emitting_capability: CAP.DAT.001.REP
    carried_resource: RES.DAT.001.RAPPORT_ANALYTIQUE
    business_event: EVT.DAT.001.RAPPORT_PROGRAMME_GENERE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0014
    tags:
      - analytics
      - reporting

  # SUP.001.AUD — access trace recorded
  - id: RVT.SUP.001.TRACE_ENREGISTREE
    name: Access trace recorded
    definition: >-
      An access to a beneficiary's sensitive data has been logged in the GDPR journal.
      Consumed by PIL.001.AUD for regulatory compliance audits.
    emitting_capability: CAP.SUP.001.AUD
    carried_resource: RES.SUP.001.TRACE_ACCES_PRESCRIPTEUR
    business_event: EVT.SUP.001.ACCES_JOURNALISE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0012
    tags:
      - RGPD
      - audit
