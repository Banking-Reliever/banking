meta:
  bcm_name: BCM Reliever — Business Subscriptions
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

business_subscriptions:

  # ── CAP.BSP.001.SCO — Behavioural scoring ───────────────────────────────────

  - id: SUB.BUSINESS.BSP.001.001
    consumer_capability: CAP.BSP.001.SCO
    subscribed_event:
      id: EVT.BSP.004.TRANSACTION_AUTORISEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.AUT
    scope: public
    rationale: >-
      Each authorised transaction is a positive behavioural signal that triggers
      recomputation of the beneficiary's current score.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  - id: SUB.BUSINESS.BSP.001.002
    consumer_capability: CAP.BSP.001.SCO
    subscribed_event:
      id: EVT.BSP.004.TRANSACTION_REFUSEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.AUT
    scope: public
    rationale: >-
      Each declined transaction is an actionable behavioural signal that triggers
      recomputation of the beneficiary's current score.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  - id: SUB.BUSINESS.BSP.001.003
    consumer_capability: CAP.BSP.001.SCO
    subscribed_event:
      id: EVT.BSP.001.SIGNAL_RECHUTE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SIG
    scope: public
    rationale: >-
      A qualified relapse signal negatively feeds the recomputation of the
      beneficiary's behavioural score.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  - id: SUB.BUSINESS.BSP.001.004
    consumer_capability: CAP.BSP.001.SCO
    subscribed_event:
      id: EVT.BSP.001.SIGNAL_PROGRESSION
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SIG
    scope: public
    rationale: >-
      A qualified progression signal positively feeds the recomputation of the
      beneficiary's behavioural score.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  # ── CAP.BSP.001.PAL — Tier management ───────────────────────────────────────

  - id: SUB.BUSINESS.BSP.001.005
    consumer_capability: CAP.BSP.001.PAL
    subscribed_event:
      id: EVT.BSP.001.SCORE_SEUIL_ATTEINT
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SCO
    scope: public
    rationale: >-
      Crossing a score threshold triggers the evaluation of an algorithmic tier
      transition in CAP.BSP.001.PAL.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  - id: SUB.BUSINESS.BSP.001.006
    consumer_capability: CAP.BSP.001.PAL
    subscribed_event:
      id: EVT.BSP.003.OVERRIDE_DEMANDE
      version: 1.0.0
      emitting_capability: CAP.BSP.003.COD
    scope: public
    rationale: >-
      A co-validated prescriber override request forces a tier transition
      independently of the algorithmic score.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  # ── CAP.BSP.001.SIG — Signal detection ──────────────────────────────────────

  - id: SUB.BUSINESS.BSP.001.007
    consumer_capability: CAP.BSP.001.SIG
    subscribed_event:
      id: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.ENV
    scope: public
    rationale: >-
      An unconsumed envelope at period end is a counter-intuitive relapse
      signal — indication of a bypass of the controlled channel.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  - id: SUB.BUSINESS.BSP.001.008
    consumer_capability: CAP.BSP.001.SIG
    subscribed_event:
      id: EVT.BSP.004.TRANSACTION_AUTORISEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.AUT
    scope: public
    rationale: >-
      Authorised transactions constitute the primary data for detecting
      behaviour patterns and any potential bypass.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  # ── CAP.BSP.001.ARB — Algorithm / prescriber arbitration ────────────────────

  - id: SUB.BUSINESS.BSP.001.009
    consumer_capability: CAP.BSP.001.ARB
    subscribed_event:
      id: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      Any applied tier override opens an arbitration window in which
      CAP.BSP.001.ARB monitors whether the prescriber's decision is confirmed or refuted.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  - id: SUB.BUSINESS.BSP.001.010
    consumer_capability: CAP.BSP.001.ARB
    subscribed_event:
      id: EVT.BSP.001.SCORE_RECALCULE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SCO
    scope: public
    rationale: >-
      Each score recomputation during an active override period allows
      CAP.BSP.001.ARB to assess whether algorithmic resume conditions are met.
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - business

  # ── CAP.BSP.002.ELI — Eligibility qualification ─────────────────────────────

  - id: SUB.BUSINESS.BSP.002.001
    consumer_capability: CAP.BSP.002.ELI
    subscribed_event:
      id: EVT.BSP.003.OVERRIDE_DEMANDE
      version: 1.0.0
      emitting_capability: CAP.BSP.003.COD
    scope: public
    rationale: >-
      A prescriber may request an override of the eligibility decision to
      force entry of a candidate whose algorithmic eligibility is borderline.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - business

  # ── CAP.BSP.002.ENR — Enrolment ─────────────────────────────────────────────

  - id: SUB.BUSINESS.BSP.002.002
    consumer_capability: CAP.BSP.002.ENR
    subscribed_event:
      id: EVT.BSP.002.ELIGIBILITE_VALIDEE
      version: 1.0.0
      emitting_capability: CAP.BSP.002.ELI
    scope: public
    rationale: >-
      Validated eligibility is the mandatory precondition to start the formal
      enrolment process for a beneficiary in the programme.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - business

  # ── CAP.BSP.002.CYC — Beneficiary lifecycle ─────────────────────────────────

  - id: SUB.BUSINESS.BSP.002.003
    consumer_capability: CAP.BSP.002.CYC
    subscribed_event:
      id: EVT.BSP.002.BENEFICIAIRE_ENROLE
      version: 1.0.0
      emitting_capability: CAP.BSP.002.ENR
    scope: public
    rationale: >-
      A beneficiary's enrolment opens their operational lifecycle in
      CAP.BSP.002.CYC — the case moves to ACTIF status.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - business

  - id: SUB.BUSINESS.BSP.002.004
    consumer_capability: CAP.BSP.002.CYC
    subscribed_event:
      id: EVT.BSP.001.SIGNAL_RECHUTE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SIG
    scope: public
    rationale: >-
      A detected relapse signal may trigger a temporary suspension of the
      beneficiary case in CAP.BSP.002.CYC according to programme governance rules.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - business

  # ── CAP.BSP.002.SOR — Programme exit ────────────────────────────────────────

  - id: SUB.BUSINESS.BSP.002.005
    consumer_capability: CAP.BSP.002.SOR
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      Reaching the final tier triggers the programme exit procedure
      and transfer to the standard banking application in CAP.BSP.002.SOR.
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - business

  # ── CAP.BSP.003.ROL — Prescriber role management ────────────────────────────

  - id: SUB.BUSINESS.BSP.003.001
    consumer_capability: CAP.BSP.003.ROL
    subscribed_event:
      id: EVT.BSP.002.BENEFICIAIRE_ENROLE
      version: 1.0.0
      emitting_capability: CAP.BSP.002.ENR
    scope: public
    rationale: >-
      A beneficiary's enrolment triggers the assignment of prescriber roles
      and the activation of their consultation and action rights on the case.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - business

  # ── CAP.BSP.003.NOT — Prescriber alerts & notifications ─────────────────────

  - id: SUB.BUSINESS.BSP.003.002
    consumer_capability: CAP.BSP.003.NOT
    subscribed_event:
      id: EVT.BSP.001.SIGNAL_RECHUTE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SIG
    scope: public
    rationale: >-
      A qualified relapse signal must be communicated to the case prescribers
      to enable an appropriate clinical or social response.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - business

  - id: SUB.BUSINESS.BSP.003.003
    consumer_capability: CAP.BSP.003.NOT
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier upgrade is a progression event to notify prescribers about —
      it changes the beneficiary's level of autonomy.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - business

  - id: SUB.BUSINESS.BSP.003.004
    consumer_capability: CAP.BSP.003.NOT
    subscribed_event:
      id: EVT.BSP.001.PALIER_RETROGRADE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier demotion is a critical event to notify prescribers about —
      it indicates a behavioural deterioration requiring enhanced follow-up.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - business

  - id: SUB.BUSINESS.BSP.003.005
    consumer_capability: CAP.BSP.003.NOT
    subscribed_event:
      id: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.ENV
    scope: public
    rationale: >-
      An unconsumed envelope is a bypass signal to bring to prescribers' attention —
      counter-intuitive, it requires clinical interpretation.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - business

  # ── CAP.BSP.003.COD — Inter-prescriber co-decision ──────────────────────────

  - id: SUB.BUSINESS.BSP.003.006
    consumer_capability: CAP.BSP.003.COD
    subscribed_event:
      id: EVT.CAN.002.OVERRIDE_UX_DECLENCHE
      version: 1.0.0
      emitting_capability: CAP.CAN.002.ACT
    scope: public
    rationale: >-
      An override request action initiated from the prescriber interface
      opens the business co-decision process in CAP.BSP.003.COD.
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - business

  # ── CAP.BSP.004.AUT — Purchase authorisation ────────────────────────────────

  - id: SUB.BUSINESS.BSP.004.001
    consumer_capability: CAP.BSP.004.AUT
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier upgrade widens the active authorisation rules —
      CAP.BSP.004.AUT must update its decision rules in real time.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - business

  - id: SUB.BUSINESS.BSP.004.002
    consumer_capability: CAP.BSP.004.AUT
    subscribed_event:
      id: EVT.BSP.001.PALIER_RETROGRADE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier demotion restricts the active authorisation rules —
      CAP.BSP.004.AUT must immediately apply the restrictive rules of the new tier.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - business

  - id: SUB.BUSINESS.BSP.004.003
    consumer_capability: CAP.BSP.004.AUT
    subscribed_event:
      id: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A prescriber tier override modifies the active authorisation rules —
      CAP.BSP.004.AUT applies the rules of the prescriber-forced tier.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - business

  # ── CAP.BSP.004.ENV — Envelope management ───────────────────────────────────

  - id: SUB.BUSINESS.BSP.004.004
    consumer_capability: CAP.BSP.004.ENV
    subscribed_event:
      id: EVT.BSP.002.BENEFICIAIRE_ENROLE
      version: 1.0.0
      emitting_capability: CAP.BSP.002.ENR
    scope: public
    rationale: >-
      A beneficiary's enrolment triggers the initial allocation of budget
      envelopes according to the activated initial tier definition.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - business

  - id: SUB.BUSINESS.BSP.004.005
    consumer_capability: CAP.BSP.004.ENV
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier upgrade triggers recalibration of budget envelopes —
      the new tier defines new categories and new limits.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - business

  # ── CAP.BSP.004.ALT — Comparison & alternatives ─────────────────────────────

  - id: SUB.BUSINESS.BSP.004.006
    consumer_capability: CAP.BSP.004.ALT
    subscribed_event:
      id: EVT.BSP.004.TRANSACTION_REFUSEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.AUT
    scope: public
    rationale: >-
      A declined transaction triggers the search for commercial alternatives
      compatible with the tier to preserve the beneficiary's functional dignity.
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - business

  # ── CAP.CAN.001.TAB — Progress dashboard ────────────────────────────────────

  - id: SUB.BUSINESS.CAN.001.001
    consumer_capability: CAP.CAN.001.TAB
    subscribed_event:
      id: EVT.BSP.001.SCORE_RECALCULE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SCO
    scope: public
    rationale: >-
      Each score recomputation updates the progression displayed in the beneficiary
      dashboard — the score is the central gamification data point.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  - id: SUB.BUSINESS.CAN.001.002
    consumer_capability: CAP.CAN.001.TAB
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier upgrade is a major progression event to display
      in a rewarding way in the beneficiary dashboard.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  - id: SUB.BUSINESS.CAN.001.003
    consumer_capability: CAP.CAN.001.TAB
    subscribed_event:
      id: EVT.BSP.004.ENVELOPPE_CONSOMMEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.ENV
    scope: public
    rationale: >-
      Each envelope consumption updates the available balance displayed in
      the dashboard in near-real time.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  # ── CAP.CAN.001.ACH — Purchase assistance ───────────────────────────────────

  - id: SUB.BUSINESS.CAN.001.004
    consumer_capability: CAP.CAN.001.ACH
    subscribed_event:
      id: EVT.BSP.004.TRANSACTION_AUTORISEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.AUT
    scope: public
    rationale: >-
      A transaction authorisation triggers the successful purchase UX feedback
      in the beneficiary interface.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  - id: SUB.BUSINESS.CAN.001.005
    consumer_capability: CAP.CAN.001.ACH
    subscribed_event:
      id: EVT.BSP.004.TRANSACTION_REFUSEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.AUT
    scope: public
    rationale: >-
      A declined transaction triggers the decline UX feedback in the beneficiary
      interface, accompanied where available by the proposed alternative.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  - id: SUB.BUSINESS.CAN.001.006
    consumer_capability: CAP.CAN.001.ACH
    subscribed_event:
      id: EVT.BSP.004.ALTERNATIVE_PROPOSEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.ALT
    scope: public
    rationale: >-
      An alternative proposed by BSP.004.ALT must be displayed immediately
      in the purchase interface to allow the beneficiary to consult it.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  # ── CAP.CAN.001.NOT — Beneficiary notifications ──────────────────────────────

  - id: SUB.BUSINESS.CAN.001.007
    consumer_capability: CAP.CAN.001.NOT
    subscribed_event:
      id: EVT.BSP.004.TRANSACTION_REFUSEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.AUT
    scope: public
    rationale: >-
      A declined transaction generates a push/SMS notification to the beneficiary
      with a motivated explanation and an alternative if available.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  - id: SUB.BUSINESS.CAN.001.008
    consumer_capability: CAP.CAN.001.NOT
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier upgrade generates a motivating congratulations notification
      to the beneficiary — a key gamification event in the programme.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  - id: SUB.BUSINESS.CAN.001.009
    consumer_capability: CAP.CAN.001.NOT
    subscribed_event:
      id: EVT.BSP.004.ENVELOPPE_EPUISEE
      version: 1.0.0
      emitting_capability: CAP.BSP.004.ENV
    scope: public
    rationale: >-
      A depleted budget envelope generates a notification to the beneficiary
      informing them they have reached their spending limit for this category.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  - id: SUB.BUSINESS.CAN.001.010
    consumer_capability: CAP.CAN.001.NOT
    subscribed_event:
      id: EVT.BSP.002.BENEFICIAIRE_TRANSFERE_APP_STANDARD
      version: 1.0.0
      emitting_capability: CAP.BSP.002.SOR
    scope: public
    rationale: >-
      Transfer to the standard banking application is the terminal event
      of the programme — it triggers the final congratulations notification to the beneficiary.
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - business

  # ── CAP.CAN.002.VUE — Prescriber beneficiary view ───────────────────────────

  - id: SUB.BUSINESS.CAN.002.001
    consumer_capability: CAP.CAN.002.VUE
    subscribed_event:
      id: EVT.BSP.001.SCORE_RECALCULE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SCO
    scope: public
    rationale: >-
      Each score recomputation updates the case progression view displayed
      to prescribers in the portal.
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - business

  - id: SUB.BUSINESS.CAN.002.002
    consumer_capability: CAP.CAN.002.VUE
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier upgrade changes the case state displayed to the prescriber
      and may unlock new actions in the portal.
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - business

  - id: SUB.BUSINESS.CAN.002.003
    consumer_capability: CAP.CAN.002.VUE
    subscribed_event:
      id: EVT.BSP.001.SIGNAL_RECHUTE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.SIG
    scope: public
    rationale: >-
      A relapse signal must be visible in the prescriber view to enable
      a rapid clinical or social response.
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - business

  - id: SUB.BUSINESS.CAN.002.004
    consumer_capability: CAP.CAN.002.VUE
    subscribed_event:
      id: EVT.BSP.003.ROLE_ATTRIBUE
      version: 1.0.0
      emitting_capability: CAP.BSP.003.ROL
    scope: public
    rationale: >-
      The assignment of a prescriber role determines what that prescriber
      can see in the beneficiary view, according to their differentiated rights.
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - business

  # ── CAP.CAN.002.ACT — Prescriber actions ────────────────────────────────────

  - id: SUB.BUSINESS.CAN.002.005
    consumer_capability: CAP.CAN.002.ACT
    subscribed_event:
      id: EVT.BSP.003.OVERRIDE_COVALIDÉ
      version: 1.0.0
      emitting_capability: CAP.BSP.003.COD
    scope: public
    rationale: >-
      A co-validated override in the CORE must be reflected in the prescriber
      interface to visually confirm that the collective decision has been made.
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - business

  - id: SUB.BUSINESS.CAN.002.006
    consumer_capability: CAP.CAN.002.ACT
    subscribed_event:
      id: EVT.BSP.003.OVERRIDE_REFUSE
      version: 1.0.0
      emitting_capability: CAP.BSP.003.COD
    scope: public
    rationale: >-
      A refused override in the CORE must be reflected in the prescriber
      interface to confirm that the override request was not granted.
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - business

  # ── CAP.CAN.002.RAP — Reports & exports ─────────────────────────────────────

  - id: SUB.BUSINESS.CAN.002.007
    consumer_capability: CAP.CAN.002.RAP
    subscribed_event:
      id: EVT.CAN.002.DOSSIER_CONSULTE
      version: 1.0.0
      emitting_capability: CAP.CAN.002.VUE
    scope: public
    rationale: >-
      A prescriber's consultation of a case may trigger the generation
      of a monitoring report adapted to their role and the period consulted.
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - business

  # ── CAP.B2B.001.CRT — Dedicated card management ─────────────────────────────

  - id: SUB.BUSINESS.B2B.001.001
    consumer_capability: CAP.B2B.001.CRT
    subscribed_event:
      id: EVT.BSP.002.BENEFICIAIRE_ENROLE
      version: 1.0.0
      emitting_capability: CAP.BSP.002.ENR
    scope: public
    rationale: >-
      A beneficiary's enrolment triggers issuance of the dedicated card by
      the partner institution and its activation with the initial tier rules.
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - business

  - id: SUB.BUSINESS.B2B.001.002
    consumer_capability: CAP.B2B.001.CRT
    subscribed_event:
      id: EVT.BSP.001.PALIER_HAUSSE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
      A tier upgrade updates the dedicated card rules to
      reflect the new authorised categories and the new daily limit.
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - business

  - id: SUB.BUSINESS.B2B.001.003
    consumer_capability: CAP.B2B.001.CRT
    subscribed_event:
      id: EVT.BSP.001.PALIER_RETROGRADE
      version: 1.0.0
      emitting_capability: CAP.BSP.001.PAL
    scope: public
    rationale: >-
