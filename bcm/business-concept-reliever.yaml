meta:
  bcm_name: BCM Reliever — Business Concepts
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

concepts:

  - id: CPT.BCM.000.BENEFICIAIRE
    name: Beneficiary
    definition: >-
      An individual in a situation of financial vulnerability engaged or candidate
      for a structured behavioural remediation process.
    scope:
      - Application and eligibility verification
      - Programme enrolment
      - Programme follow-up and tier progression
      - Programme exit (success, dropout, transfer)
    business_rules:
      - "A beneficiary may only be enrolled after verification of their eligibility"
      - "The canonical identity of a beneficiary is held exclusively by CAP.REF.001.BEN"
      - "A beneficiary may be prescribed by several prescribers simultaneously"
    tags:
      - canonical
      - core-domain

  - id: CPT.BCM.000.PRESCRIPTEUR
    name: Prescriber
    definition: >-
      An authorised actor who prescribes, accompanies and co-decides within the
      framework of a financial remediation. May be banking, medical or social.
    scope:
      - Prescribing and referring a beneficiary to the programme
      - Case follow-up and consultation according to their role rights
      - Participation in inter-prescriber co-decisions
      - Manual override of algorithmic decisions
    business_rules:
      - "A prescriber's visibility on a case is strictly filtered by their role and type (banking, medical, social)"
      - "A medical prescriber and a banking prescriber do not see the same data"
    tags:
      - canonical
      - multi-actor

  - id: CPT.BCM.000.DOSSIER
    name: Remediation case
    definition: >-
      A structured record of a beneficiary's participation in the Reliever
      programme, from entry to exit.
    scope:
      - Opening at enrolment
      - Tier evolution throughout the programme
      - Coordination of assigned prescribers
      - Closure at programme exit
    business_rules:
      - "A case is associated with exactly one beneficiary"
      - "A case holds exactly one active tier at any given time"
      - "A successful case exit triggers transfer to a standard banking application"
    tags:
      - canonical
      - core-domain
      - stateful

  - id: CPT.BCM.000.SCORE
    name: Behavioural score
    definition: >-
      A quantified and automated assessment of a beneficiary's financial behavioural
      progress, computed from their transactions and signals.
    scope:
      - Initial computation at enrolment (baseline)
      - Recomputation after each transaction or significant signal
      - Contribution to tier change decisions
      - Historisation for programme analytics
    business_rules:
      - "The score is the source of truth for tier changes, except for explicit prescriber overrides"
      - "The score computation model can only evolve after validation by PIL.001.GOV"
    tags:
      - canonical
      - algorithmic
      - core-domain

  - id: CPT.BCM.000.PALIER
    name: Autonomy tier
    definition: >-
      A level of financial autonomy defined by its usage rules,
      transition thresholds and the rights associated with the beneficiary.
    scope:
      - Normative definition of rules and thresholds (REF)
      - Operational application to payment authorisations (BSP.004)
      - Configuration of dedicated card rules (B2B.001)
      - Tier transitions (BSP.001)
    business_rules:
      - "The canonical definition of a tier is held exclusively by CAP.REF.001.PAL"
      - "Any modification of a tier triggers a cascading update on BSP.001, BSP.004 and B2B.001"
      - "The final tier converts the tool into a standard banking application"
    tags:
      - canonical
      - referential

  - id: CPT.BCM.000.TRANSACTION
    name: Transaction
    definition: >-
      A financial act — completed or attempted — via the payment instrument
      dedicated to the Reliever programme.
    scope:
      - Purchase attempt with the dedicated card
      - Real-time authorisation or decline decision
      - Contribution to the behavioural score
      - Budget envelope consumption
    business_rules:
      - "Every transaction is subject to the beneficiary's current tier rules"
      - "A transaction declined for envelope overspend is an actionable behavioural signal"
    tags:
      - canonical
      - real-time
      - core-domain

  - id: CPT.BCM.000.ENVELOPPE
    name: Budget envelope
    definition: >-
      A categorised and time-bounded financial allocation assigned to a
      beneficiary according to their current tier.
    scope:
      - Allocation at period start according to the tier
      - Consumption through authorised transactions
      - Depletion and non-consumption detection
      - Funding from the main account via B2B.001
    business_rules:
      - "An unconsumed envelope at period end is a potential relapse signal"
      - "An envelope's limit is determined by the current tier definition"
    tags:
      - canonical
      - budget
      - behavioral-signal

  - id: CPT.BCM.000.CONSENTEMENT
    name: Consent
    definition: >-
      A formal and revocable authorisation from a beneficiary for the processing
      and sharing of their sensitive data (financial, medical, social).
    scope:
      - Collection at enrolment
      - Revocation management at any time
      - Access control at each prescriber consultation
      - GDPR rights processing post-exit
    business_rules:
      - "Consent.Granted is a mandatory precondition to enrolment, open banking and any prescriber consultation"
      - "Consent revocation immediately suspends all access to the beneficiary's data"
    tags:
      - canonical
      - RGPD
      - compliance

  - id: CPT.BCM.000.INSTRUMENT
    name: Payment instrument
    definition: >-
      A dedicated payment means enabling complete control and traceability
      of the beneficiary's spending within the programme.
    scope:
      - Issuance at enrolment
      - Rule configuration according to the current tier
      - Suspension/termination according to case events
      - Financial flow support from the main account
    business_rules:
      - "The dedicated card is the sole universal spending control point for the beneficiary"
      - "Card usage rules are updated at each tier change"
      - "Card termination is triggered by the beneficiary's exit from the programme"
    tags:
      - canonical
      - financial-instrument

  - id: CPT.BCM.000.SIGNAL
    name: Behavioural signal
    definition: >-
      An anomaly or progression indicator detected in a beneficiary's financial
      behaviour, notably the absence of envelope consumption.
    scope:
      - Detection in the transactional stream (BSP.004)
      - Interpretation and qualification by scoring (BSP.001)
      - Contribution to score recomputation
      - Triggering of prescriber alerts
    business_rules:
      - "An unconsumed budget is a relapse signal, not a success signal"
      - "Signals feed the scoring in decoupled analytics mode — they do not directly modify operations"
    tags:
      - canonical
      - behavioral
      - counterintuitive

  - id: CPT.BCM.000.MODELE
    name: Scoring model
    definition: >-
      An algorithmic behavioural assessment model, versioned
      and subject to governance before any production deployment.
    scope:
      - Training and improvement on aggregated analytics data (DAT.001)
      - Governance validation before deployment (PIL.001.GOV)
      - Application to operational score computation (BSP.001.SCO)
      - Version historisation for audit
    business_rules:
      - "No model may be deployed to production without GovernancePolicy.Updated from PIL.001.GOV"
      - "The analytics model (DAT.001.MOD) is never directly connected to the operational scoring (BSP.001.SCO)"
    tags:
      - canonical
      - algorithmic
      - governance
