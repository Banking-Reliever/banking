meta:
  bcm_name: BCM Reliever — Business Events
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

business_events:

  # ── CAP.BSP.001.SCO — Behavioural scoring ───────────────────────────────────

  - id: EVT.BSP.001.SCORE_RECALCULE
    name: Score recomputed
    version: 1.0.0
    definition: >-
      The behavioural score of a beneficiary has been recomputed after a transaction
      or a significant behavioural signal. Triggers the evaluation of a potential
      tier change.
    emitting_capability: CAP.BSP.001.SCO
    carried_business_object: OBJ.BSP.001.EVALUATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - algorithmic
      - core-domain
      - real-time

  - id: EVT.BSP.001.SCORE_SEUIL_ATTEINT
    name: Score threshold reached
    version: 1.0.0
    definition: >-
      The behavioural score of a beneficiary has reached or crossed a tier transition
      threshold — whether the upward progression threshold or the demotion threshold.
      Triggers the tier change evaluation process in CAP.BSP.001.PAL.
    emitting_capability: CAP.BSP.001.SCO
    carried_business_object: OBJ.BSP.001.EVALUATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - algorithmic
      - core-domain
      - trigger

  # ── CAP.BSP.001.PAL — Tier management ───────────────────────────────────────

  - id: EVT.BSP.001.PALIER_HAUSSE
    name: Tier upgraded
    version: 1.0.0
    definition: >-
      A beneficiary has progressed to a higher autonomy tier. Triggers
      the update of the dedicated card rules (B2B.001.CRT) and the allocation
      of new budget envelopes (BSP.004.ENV).
    emitting_capability: CAP.BSP.001.PAL
    carried_business_object: OBJ.BSP.001.CHANGEMENT_PALIER
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - progression
      - core-domain

  - id: EVT.BSP.001.PALIER_RETROGRADE
    name: Tier demoted
    version: 1.0.0
    definition: >-
      A beneficiary has been moved back to a lower autonomy tier following
      deteriorated behavioural signals. Triggers a restrictive update of the
      dedicated card rules and an alert to prescribers.
    emitting_capability: CAP.BSP.001.PAL
    carried_business_object: OBJ.BSP.001.CHANGEMENT_PALIER
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - regression
      - core-domain

  - id: EVT.BSP.001.PALIER_OVERRIDE_APPLIQUE
    name: Tier override applied
    version: 1.0.0
    definition: >-
      A prescriber has forced a tier change against the algorithmic decision.
      The algorithm monitors the outcome and resumes control as soon as conditions
      are met or the override is closed.
    emitting_capability: CAP.BSP.001.PAL
    carried_business_object: OBJ.BSP.001.SURCHARGE_ALGO
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - human-override
      - core-domain

  # ── CAP.BSP.001.SIG — Signal interpretation ─────────────────────────────────

  - id: EVT.BSP.001.SIGNAL_RECHUTE
    name: Relapse signal detected
    version: 1.0.0
    definition: >-
      A potential relapse behavioural signal has been detected and qualified —
      notably the non-consumption of a budget envelope, which indicates a bypass
      of the controlled channel rather than virtuous behaviour.
    emitting_capability: CAP.BSP.001.SIG
    carried_business_object: OBJ.BSP.001.SIGNAL_INTERPRETE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - behavioral
      - counterintuitive
      - core-domain

  - id: EVT.BSP.001.SIGNAL_PROGRESSION
    name: Progression signal detected
    version: 1.0.0
    definition: >-
      A positive behavioural signal has been qualified — regular consumption,
      compliance with authorised categories, improving trend. Contributes
      positively to score recomputation.
    emitting_capability: CAP.BSP.001.SIG
    carried_business_object: OBJ.BSP.001.SIGNAL_INTERPRETE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - behavioral
      - core-domain

  # ── CAP.BSP.001.ARB — Algorithm vs prescriber arbitration ───────────────────

  - id: EVT.BSP.001.ARBITRAGE_OVERRIDE_VALIDE
    name: Override validated by arbitration
    version: 1.0.0
    definition: >-
      The prescriber override has been maintained and validated by the arbitration
      mechanism: the observed outcomes confirmed the relevance of the human decision
      over the algorithm.
    emitting_capability: CAP.BSP.001.ARB
    carried_business_object: OBJ.BSP.001.SURCHARGE_ALGO
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - human-override
      - audit

  - id: EVT.BSP.001.ARBITRAGE_ALGO_REAFFIRME
    name: Algorithm reaffirmed by arbitration
    version: 1.0.0
    definition: >-
      The algorithm has resumed control of the tier: the observed outcomes refuted
      or rendered inconclusive the prescriber override decision.
      The override is closed.
    emitting_capability: CAP.BSP.001.ARB
    carried_business_object: OBJ.BSP.001.SURCHARGE_ALGO
    scope: public
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - algorithmic
      - audit

  # ── CAP.BSP.002.ELI — Eligibility verification ──────────────────────────────

  - id: EVT.BSP.002.ELIGIBILITE_VALIDEE
    name: Eligibility validated
    version: 1.0.0
    definition: >-
      A candidate has been declared eligible for the Reliever programme after
      verification of all entry criteria. Authorises the start of enrolment.
    emitting_capability: CAP.BSP.002.ELI
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - core-domain

  - id: EVT.BSP.002.ELIGIBILITE_REFUSEE
    name: Eligibility refused
    version: 1.0.0
    definition: >-
      A candidate did not meet the eligibility criteria for the Reliever programme.
      The case will not be opened.
    emitting_capability: CAP.BSP.002.ELI
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - core-domain

  # ── CAP.BSP.002.ENR — Enrolment ─────────────────────────────────────────────

  - id: EVT.BSP.002.BENEFICIAIRE_ENROLE
    name: Beneficiary enrolled
    version: 1.0.0
    definition: >-
      An eligible beneficiary has been officially integrated into the Reliever programme:
      case opened, consent collected, baseline score computed, initial tier
      activated, dedicated card issued.
    emitting_capability: CAP.BSP.002.ENR
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - core-domain
      - lifecycle

  - id: EVT.BSP.002.PALIER_INITIAL_ACTIVE
    name: Initial tier activated
    version: 1.0.0
    definition: >-
      The programme entry tier has been activated for a new beneficiary,
      based on the baseline score computed at enrolment.
    emitting_capability: CAP.BSP.002.ENR
    carried_business_object: OBJ.BSP.001.CHANGEMENT_PALIER
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - core-domain
      - lifecycle

  # ── CAP.BSP.002.CYC — Lifecycle management ──────────────────────────────────

  - id: EVT.BSP.002.BENEFICIAIRE_SUSPENDU
    name: Beneficiary suspended
    version: 1.0.0
    definition: >-
      A beneficiary's programme participation has been temporarily suspended.
      The dedicated card is blocked and prescriber access is maintained.
    emitting_capability: CAP.BSP.002.CYC
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - stateful

  - id: EVT.BSP.002.BENEFICIAIRE_REACTIVE
    name: Beneficiary reactivated
    version: 1.0.0
    definition: >-
      A previously suspended beneficiary has resumed their programme participation.
      The dedicated card is reactivated with the current tier rules.
    emitting_capability: CAP.BSP.002.CYC
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - stateful

  # ── CAP.BSP.002.SOR — Programme exit ────────────────────────────────────────

  - id: EVT.BSP.002.BENEFICIAIRE_SORTI
    name: Beneficiary exited
    version: 1.0.0
    definition: >-
      A beneficiary has left the Reliever programme. The case is closed,
      the dedicated card terminated. The exit reason determines the
      post-exit actions (success, dropout, administrative).
    emitting_capability: CAP.BSP.002.SOR
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - terminal
      - core-domain

  - id: EVT.BSP.002.BENEFICIAIRE_TRANSFERE_APP_STANDARD
    name: Beneficiary transferred to standard application
    version: 1.0.0
    definition: >-
      A beneficiary has reached the final tier and is transferred to the standard
      banking application. This is the nominal and desired outcome of the programme:
      full financial autonomy has been achieved.
    emitting_capability: CAP.BSP.002.SOR
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - lifecycle
      - success
      - core-domain

  # ── CAP.BSP.003.ROL — Prescriber role management ────────────────────────────

  - id: EVT.BSP.003.ROLE_ATTRIBUE
    name: Prescriber role assigned
    version: 1.0.0
    definition: >-
      A prescriber has been assigned a role on a beneficiary case.
      Their consultation and action rights are determined by their role type
      (banking, medical, social) per ADR-BCM-FUNC-0007.
    emitting_capability: CAP.BSP.003.ROL
    carried_business_object: OBJ.BSP.003.ROLE_PRESCRIPTEUR
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - access-control

  - id: EVT.BSP.003.ROLE_REVOQUE
    name: Prescriber role revoked
    version: 1.0.0
    definition: >-
      A prescriber's role assignment on a case has been revoked.
      The prescriber's access to the case is immediately removed.
    emitting_capability: CAP.BSP.003.ROL
    carried_business_object: OBJ.BSP.003.ROLE_PRESCRIPTEUR
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - access-control

  # ── CAP.BSP.003.NOT — Prescriber notification ───────────────────────────────

  - id: EVT.BSP.003.PRESCRIPTEUR_ALERTE
    name: Prescriber alerted
    version: 1.0.0
    definition: >-
      One or more prescribers have received an alert regarding a beneficiary case:
      behavioural signal, tier change, inactivity, or override request.
    emitting_capability: CAP.BSP.003.NOT
    carried_business_object: OBJ.BSP.003.ALERTE_PRESCRIPTEUR
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - notification

  # ── CAP.BSP.003.COD — Inter-prescriber co-decision ──────────────────────────

  - id: EVT.BSP.003.OVERRIDE_DEMANDE
    name: Override requested
    version: 1.0.0
    definition: >-
      A prescriber has initiated an algorithmic override request requiring
      co-validation from at least one other prescriber. The deliberation is open.
    emitting_capability: CAP.BSP.003.COD
    carried_business_object: OBJ.BSP.003.DECISION_CONCERTEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - human-override

  - id: EVT.BSP.003.OVERRIDE_COVALIDÉ
    name: Override co-validated
    version: 1.0.0
    definition: >-
      An algorithmic override request has obtained co-validation from the required
      prescribers. The decision is forwarded to CAP.BSP.001.PAL or CAP.BSP.001.ARB for application.
    emitting_capability: CAP.BSP.003.COD
    carried_business_object: OBJ.BSP.003.DECISION_CONCERTEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - human-override
      - audit

  - id: EVT.BSP.003.OVERRIDE_REFUSE
    name: Override refused
    version: 1.0.0
    definition: >-
      An algorithmic override request has been rejected by the co-deciding prescribers.
      The algorithm retains control of the tier.
    emitting_capability: CAP.BSP.003.COD
    carried_business_object: OBJ.BSP.003.DECISION_CONCERTEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - audit

  # ── CAP.BSP.004.AUT — Payment authorisation ─────────────────────────────────

  - id: EVT.BSP.004.TRANSACTION_AUTORISEE
    name: Transaction authorised
    version: 1.0.0
    definition: >-
      A payment attempt on the dedicated card has been authorised in real time,
      in accordance with the beneficiary's current tier rules.
    emitting_capability: CAP.BSP.004.AUT
    carried_business_object: OBJ.BSP.004.DECISION_PAIEMENT
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time
      - core-domain

  - id: EVT.BSP.004.TRANSACTION_REFUSEE
    name: Transaction declined
    version: 1.0.0
    definition: >-
      A payment attempt on the dedicated card has been declined in real time.
      The decline is an actionable behavioural signal for CAP.BSP.001.SIG.
    emitting_capability: CAP.BSP.004.AUT
    carried_business_object: OBJ.BSP.004.DECISION_PAIEMENT
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time
      - core-domain
      - behavioral-signal

  # ── CAP.BSP.004.ENV — Budget envelope management ────────────────────────────

  - id: EVT.BSP.004.ENVELOPPE_ALLOUEE
    name: Budget envelope allocated
    version: 1.0.0
    definition: >-
      A new categorised budget envelope has been allocated to a beneficiary
      for the current period, according to their tier definition.
    emitting_capability: CAP.BSP.004.ENV
    carried_business_object: OBJ.BSP.004.ALLOCATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget
      - core-domain

  - id: EVT.BSP.004.ENVELOPPE_CONSOMMEE
    name: Budget envelope consumed
    version: 1.0.0
    definition: >-
      A budget envelope has been partially or fully consumed within
      the period limits. Neutral signal of normal behaviour.
    emitting_capability: CAP.BSP.004.ENV
    carried_business_object: OBJ.BSP.004.ALLOCATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget

  - id: EVT.BSP.004.ENVELOPPE_NON_CONSOMMEE
    name: Envelope unconsumed at period end
    version: 1.0.0
    definition: >-
      A budget envelope closed without consumption or with marginal
      consumption. Counter-intuitive relapse signal: the absence
      of usage indicates a bypass of the controlled channel.
    emitting_capability: CAP.BSP.004.ENV
    carried_business_object: OBJ.BSP.004.ALLOCATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget
      - behavioral-signal
      - counterintuitive
      - relapse-signal

  - id: EVT.BSP.004.ENVELOPPE_EPUISEE
    name: Budget envelope depleted
    version: 1.0.0
    definition: >-
      A budget envelope's limit has been reached before the end of the period.
      This is not a relapse signal — it is a signal of normal consumption
      within authorised limits.
    emitting_capability: CAP.BSP.004.ENV
    carried_business_object: OBJ.BSP.004.ALLOCATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - budget
      - core-domain

  # ── CAP.BSP.004.ALT — Purchase alternatives ─────────────────────────────────

  - id: EVT.BSP.004.ALTERNATIVE_PROPOSEE
    name: Purchase alternative proposed
    version: 1.0.0
    definition: >-
      Following a declined transaction, a consumption alternative compatible
      with the current tier has been proposed to the beneficiary. Upholds the
      functional dignity of the programme.
    emitting_capability: CAP.BSP.004.ALT
    carried_business_object: OBJ.BSP.004.ALTERNATIVE_ACHAT
    scope: public
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - dignity
      - channel

  # ── CAP.CAN.001 — Beneficiary interface ─────────────────────────────────────

  - id: EVT.CAN.001.TABLEAU_BORD_CONSULTE
    name: Dashboard consulted
    version: 1.0.0
    definition: >-
      A beneficiary has consulted their dashboard in the mobile application:
      envelope balances, current tier, progression.
    emitting_capability: CAP.CAN.001.TAB
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: internal
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - channel

  - id: EVT.CAN.001.SCAN_PRODUIT_LANCE
    name: Product scan initiated
    version: 1.0.0
    definition: >-
      A beneficiary has scanned a product in store to check its compatibility
      with their current tier rules before purchase.
    emitting_capability: CAP.CAN.001.ACH
    carried_business_object: OBJ.BSP.004.DECISION_PAIEMENT
    scope: public
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - channel
      - real-time

  - id: EVT.CAN.001.ALTERNATIVE_ACCEPTEE
    name: Purchase alternative accepted
    version: 1.0.0
    definition: >-
      A beneficiary has accepted and selected a purchase alternative proposed
      following a declined transaction.
    emitting_capability: CAP.CAN.001.ACH
    carried_business_object: OBJ.BSP.004.ALTERNATIVE_ACHAT
    scope: public
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - channel
      - dignity

  - id: EVT.CAN.001.NOTIFICATION_EMISE
    name: Notification sent to beneficiary
    version: 1.0.0
    definition: >-
      An in-app notification has been sent to the beneficiary — payment decline,
      tier progression, envelope alert or proposed alternative.
    emitting_capability: CAP.CAN.001.NOT
    carried_business_object: OBJ.CAN.001.NOTIFICATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0009
    tags:
      - channel
      - notification

  # ── CAP.CAN.002 — Prescriber interface ──────────────────────────────────────

  - id: EVT.CAN.002.DOSSIER_CONSULTE
    name: Case consulted by prescriber
    version: 1.0.0
    definition: >-
      A prescriber has consulted a beneficiary's case. The consultation is
      filtered according to the prescriber's role type (banking, medical, social)
      and logged for GDPR audit.
    emitting_capability: CAP.CAN.002.VUE
    carried_business_object: OBJ.BSP.002.PARTICIPATION
    scope: public
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - channel
      - multi-actor
      - audit

  - id: EVT.CAN.002.OVERRIDE_UX_DECLENCHE
    name: Override triggered from prescriber interface
    version: 1.0.0
    definition: >-
      A prescriber has initiated an algorithmic override request from
      the prescriber interface. The request is forwarded to CAP.BSP.003.COD for
      co-decision processing.
    emitting_capability: CAP.CAN.002.ACT
    carried_business_object: OBJ.BSP.003.DECISION_CONCERTEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - channel
      - human-override

  - id: EVT.CAN.002.RAPPORT_GENERE
    name: Prescriber report generated
    version: 1.0.0
    definition: >-
      A summary report on a beneficiary's progress has been generated
      at a prescriber's request, covering a given period.
    emitting_capability: CAP.CAN.002.RAP
    carried_business_object: OBJ.CAN.002.RAPPORT_PRESCRIPTEUR
    scope: public
    adrs:
      - ADR-BCM-FUNC-0010
    tags:
      - channel
      - reporting

  # ── CAP.B2B.001.CRT — Dedicated card management ─────────────────────────────

  - id: EVT.B2B.001.CARTE_EMISE
    name: Dedicated card issued
    version: 1.0.0
    definition: >-
      A dedicated payment card has been issued by the partner institution
      upon a beneficiary's enrolment in the Reliever programme.
    emitting_capability: CAP.B2B.001.CRT
    carried_business_object: OBJ.B2B.001.CARTE_DEDIEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-instrument
      - lifecycle

  - id: EVT.B2B.001.CARTE_ACTIVEE
    name: Dedicated card activated
    version: 1.0.0
    definition: >-
      The beneficiary's dedicated card has been activated with the usage rules
      corresponding to their current tier.
    emitting_capability: CAP.B2B.001.CRT
    carried_business_object: OBJ.B2B.001.CARTE_DEDIEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-instrument
      - lifecycle

  - id: EVT.B2B.001.CARTE_SUSPENDUE
    name: Dedicated card suspended
    version: 1.0.0
    definition: >-
      The beneficiary's dedicated card has been temporarily blocked following
      a case event or a prescriber decision. Reactivation is possible.
    emitting_capability: CAP.B2B.001.CRT
    carried_business_object: OBJ.B2B.001.CARTE_DEDIEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-instrument
      - lifecycle

  - id: EVT.B2B.001.CARTE_RESILIEE
    name: Dedicated card terminated
    version: 1.0.0
    definition: >-
      The beneficiary's dedicated card has been permanently closed following
      their exit from the Reliever programme. No reactivation is possible.
    emitting_capability: CAP.B2B.001.CRT
    carried_business_object: OBJ.B2B.001.CARTE_DEDIEE
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-instrument
      - lifecycle
      - terminal

  # ── CAP.B2B.001.OBK — Open banking PSD2 ────────────────────────────────────

  - id: EVT.B2B.001.DONNEES_FINANCIERES_RAFRAICHIES
    name: Financial data refreshed
    version: 1.0.0
    definition: >-
      A new open banking financial snapshot of the beneficiary has been
      obtained via PSD2 and forwarded to CAP.BSP.001.SCO to feed the scoring.
    emitting_capability: CAP.B2B.001.OBK
    carried_business_object: OBJ.B2B.001.SNAPSHOT_FIN
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - open-banking
      - DSP2

  # ── CAP.B2B.001.FLX — Financial flows to card ───────────────────────────────

  - id: EVT.B2B.001.ALIMENTATION_EFFECTUEE
    name: Card funding completed
    version: 1.0.0
    definition: >-
      A fund transfer from the main account to the dedicated card has been carried out
      by the partner institution to fund the budget envelopes for the period.
    emitting_capability: CAP.B2B.001.FLX
    carried_business_object: OBJ.B2B.001.FLUX_FINANCIER
    scope: public
    adrs:
      - ADR-BCM-FUNC-0011
    tags:
      - financial-flow
      - B2B

  # ── CAP.SUP.001.CON — GDPR consent management ───────────────────────────────

  - id: EVT.SUP.001.CONSENTEMENT_ACCORDE
    name: GDPR consent granted
    version: 1.0.0
    definition: >-
      A beneficiary has granted consent for the processing and sharing
      of their sensitive data. Mandatory precondition to enrolment, open
      banking and any prescriber consultation.
    emitting_capability: CAP.SUP.001.CON
    carried_business_object: OBJ.SUP.001.CONSENTEMENT_RGPD
    scope: public
    adrs:
      - ADR-BCM-FUNC-0012
    tags:
      - RGPD
      - compliance
      - blocking-precondition

  - id: EVT.SUP.001.CONSENTEMENT_REVOQUE
    name: GDPR consent revoked
    version: 1.0.0
    definition: >-
      A beneficiary has revoked their GDPR consent. All access to their data
      by consuming capabilities is immediately suspended.
    emitting_capability: CAP.SUP.001.CON
