meta:
  bcm_name: BCM Reliever — Ressources
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Direction Programme Reliever

resources:

  # ── OBJ.REF.001.FICHE_BENEFICIAIRE ─────────────────────────────────────────

  - id: RES.REF.001.IDENTITE_BENEFICIAIRE
    name: Identité bénéficiaire
    definition: >-
      L'enregistrement complet et actif d'un bénéficiaire dans le référentiel.
      Créé à l'enrôlement, archivé à la sortie définitive.
    emitting_capability: CAP.REF.001.BEN
    business_object: OBJ.REF.001.FICHE_BENEFICIAIRE
    data:
      - name: identifiant_interne
        type: string
        description: Identifiant unique Reliever
        required: true
        business_object_property: identifiant_interne
      - name: nom
        type: string
        description: Nom de famille
        required: true
        business_object_property: nom
      - name: prenom
        type: string
        description: Prénom
        required: true
        business_object_property: prenom
      - name: date_naissance
        type: date
        description: Date de naissance
        required: true
        business_object_property: date_naissance
      - name: coordonnees
        type: object
        description: Adresse postale et coordonnées de contact
        required: true
        business_object_property: coordonnees
      - name: statut_referentiel
        type: string
        description: actif ou archivé
        required: true
        business_object_property: statut_referentiel
      - name: date_creation
        type: date
        description: Date d'entrée dans le référentiel
        required: true
        business_object_property: date_creation
      - name: sources_identite
        type: array
        description: Systèmes sources ayant alimenté l'identité (banque, hôpital, CCAS...)
        required: false
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - golden-record

  # ── OBJ.REF.001.FICHE_PRESCRIPTEUR ─────────────────────────────────────────

  - id: RES.REF.001.IDENTITE_PRESCRIPTEUR
    name: Identité prescripteur
    definition: >-
      L'enregistrement actif d'un prescripteur avec ses habilitations dans le dispositif.
      Cycle de vie : actif → suspendu → archivé.
    emitting_capability: CAP.REF.001.PRE
    business_object: OBJ.REF.001.FICHE_PRESCRIPTEUR
    data:
      - name: identifiant_interne
        type: string
        description: Identifiant unique Reliever
        required: true
        business_object_property: identifiant_interne
      - name: type_prescripteur
        type: string
        description: BANCAIRE, MEDICAL ou SOCIAL
        required: true
        business_object_property: type_prescripteur
      - name: nom_complet
        type: string
        description: Nom et prénom
        required: true
        business_object_property: nom_complet
      - name: organisation
        type: string
        description: Établissement d'appartenance
        required: true
        business_object_property: organisation
      - name: habilitations
        type: array
        description: Habilitations accordées dans le dispositif
        required: true
        business_object_property: habilitations
      - name: statut_referentiel
        type: string
        description: actif, suspendu ou archivé
        required: true
        business_object_property: statut_referentiel
      - name: perimetre_visibilite
        type: object
        description: Configuration de ce que ce prescripteur peut voir selon son type
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - master-data

  # ── OBJ.REF.001.DEFINITION_PALIER ──────────────────────────────────────────

  - id: RES.REF.001.PALIER_ACTIF
    name: Palier actif
    definition: >-
      La version courante et en vigueur d'une définition de palier, avec toutes
      ses règles opérationnelles. C'est cette ressource qui est consommée
      par BSP.001, BSP.004 et B2B.001 au moment de l'application des règles.
    emitting_capability: CAP.REF.001.PAL
    business_object: OBJ.REF.001.DEFINITION_PALIER
    data:
      - name: code_palier
        type: string
        description: Identifiant du palier
        required: true
        business_object_property: code_palier
      - name: libelle
        type: string
        description: Libellé métier
        required: true
        business_object_property: libelle
      - name: plafond_journalier
        type: number
        description: Plafond journalier en euros
        required: true
        business_object_property: plafond_journalier
      - name: categories_autorisees
        type: array
        description: Catégories de dépenses autorisées
        required: true
        business_object_property: categories_autorisees
      - name: seuil_franchissement
        type: number
        description: Score minimum pour le palier supérieur
        required: true
        business_object_property: seuil_franchissement
      - name: seuil_retrogradation
        type: number
        description: Score déclenchant la rétrogradation
        required: true
        business_object_property: seuil_retrogradation
      - name: version
        type: string
        description: Version de la définition
        required: true
        business_object_property: version
      - name: statut
        type: string
        description: actif
        required: true
        business_object_property: statut
      - name: date_mise_en_vigueur
        type: date
        description: Date à partir de laquelle cette version est active
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - normative

  - id: RES.REF.001.PALIER_ARCHIVE
    name: Palier archivé
    definition: >-
      Une version remplacée d'une définition de palier, conservée pour l'historisation
      et l'audit. Les dossiers ouverts sous cette version peuvent y faire référence.
    emitting_capability: CAP.REF.001.PAL
    business_object: OBJ.REF.001.DEFINITION_PALIER
    data:
      - name: code_palier
        type: string
        description: Identifiant du palier
        required: true
        business_object_property: code_palier
      - name: libelle
        type: string
        description: Libellé métier
        required: true
        business_object_property: libelle
      - name: plafond_journalier
        type: number
        description: Plafond journalier en vigueur dans cette version
        required: true
        business_object_property: plafond_journalier
      - name: categories_autorisees
        type: array
        description: Catégories autorisées dans cette version
        required: true
        business_object_property: categories_autorisees
      - name: seuil_franchissement
        type: number
        description: Seuil de franchissement dans cette version
        required: true
        business_object_property: seuil_franchissement
      - name: seuil_retrogradation
        type: number
        description: Seuil de rétrogradation dans cette version
        required: true
        business_object_property: seuil_retrogradation
      - name: version
        type: string
        description: Version de la définition
        required: true
        business_object_property: version
      - name: statut
        type: string
        description: archivé
        required: true
        business_object_property: statut
      - name: date_archivage
        type: date
        description: Date à laquelle cette version a été remplacée
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - historical
      - audit

  # ── OBJ.BSP.002.PARTICIPATION ───────────────────────────────────────────────

  - id: RES.BSP.002.DOSSIER_ACTIF
    name: Dossier actif
    definition: >-
      La participation en cours d'un bénéficiaire au programme Reliever.
      Contient l'état opérationnel complet : palier courant, prescripteurs assignés,
      score courant, métriques de progression. Référence centrale pour toutes les L2 BSP.
    emitting_capability: CAP.BSP.002.CYC
    business_object: OBJ.BSP.002.PARTICIPATION
    data:
      - name: identifiant_dossier
        type: string
        description: Identifiant unique du dossier
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_beneficiaire
        type: string
        description: Référence bénéficiaire (REF.001.BEN)
        required: true
        business_object_property: identifiant_beneficiaire
      - name: palier_courant
        type: string
        description: Code du palier actif
        required: true
        business_object_property: palier_courant
      - name: statut_dossier
        type: string
        description: ACTIF
        required: true
        business_object_property: statut_dossier
      - name: date_ouverture
        type: date
        description: Date d'enrôlement
        required: true
        business_object_property: date_ouverture
      - name: date_cloture
        type: date
        description: Null pour un dossier actif
        required: false
        business_object_property: date_cloture
      - name: prescripteurs_assignes
        type: array
        description: Prescripteurs actifs sur ce dossier
        required: true
        business_object_property: prescripteurs_assignes
      - name: score_courant
        type: number
        description: Dernière valeur de score calculée
        required: true
      - name: nb_transactions_periode
        type: number
        description: Nombre de transactions sur la période courante
        required: false
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - operational
      - core-domain

  - id: RES.BSP.002.DOSSIER_CLOS
    name: Dossier clos
    definition: >-
      La participation terminée d'un bénéficiaire, quelle que soit la raison de clôture.
      Conserve l'état final et la raison de sortie pour audit et analytique programme.
    emitting_capability: CAP.BSP.002.CYC
    business_object: OBJ.BSP.002.PARTICIPATION
    data:
      - name: identifiant_dossier
        type: string
        description: Identifiant unique du dossier
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_beneficiaire
        type: string
        description: Référence bénéficiaire
        required: true
        business_object_property: identifiant_beneficiaire
      - name: palier_courant
        type: string
        description: Palier atteint à la clôture
        required: true
        business_object_property: palier_courant
      - name: statut_dossier
        type: string
        description: CLOS_SUCCES, CLOS_ABANDON ou CLOS_ADMINISTRATIF
        required: true
        business_object_property: statut_dossier
      - name: date_ouverture
        type: date
        description: Date d'enrôlement
        required: true
        business_object_property: date_ouverture
      - name: date_cloture
        type: date
        description: Date de sortie
        required: true
        business_object_property: date_cloture
      - name: prescripteurs_assignes
        type: array
        description: Prescripteurs assignés à la clôture
        required: true
        business_object_property: prescripteurs_assignes
      - name: raison_cloture
        type: string
        description: Description de la raison de clôture
        required: true
      - name: palier_max_atteint
        type: string
        description: Plus haut palier jamais atteint dans ce dossier
        required: true
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - historical
      - audit

  # ── OBJ.BSP.001.EVALUATION ─────────────────────────────────────────────────

  - id: RES.BSP.001.SCORE_ENTREE
    name: Score d'entrée
    definition: >-
      Le score comportemental de référence (baseline) calculé à l'enrôlement
      du bénéficiaire. Sert de point de comparaison pour mesurer la progression.
    emitting_capability: CAP.BSP.001.SCO
    business_object: OBJ.BSP.001.EVALUATION
    data:
      - name: identifiant_evaluation
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_evaluation
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: valeur_score
        type: number
        description: Score baseline à l'entrée
        required: true
        business_object_property: valeur_score
      - name: facteurs_contributifs
        type: array
        description: Facteurs ayant contribué au baseline
        required: true
        business_object_property: facteurs_contributifs
      - name: timestamp_calcul
        type: date
        description: Horodatage du calcul initial
        required: true
        business_object_property: timestamp_calcul
      - name: version_modele
        type: string
        description: Version du modèle utilisé
        required: true
        business_object_property: version_modele
      - name: type_evaluation
        type: string
        description: INITIAL
        required: true
        business_object_property: type_evaluation
      - name: donnees_financieres_snapshot
        type: object
        description: Snapshot des données financières open banking utilisées pour le baseline
        required: false
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - baseline

  - id: RES.BSP.001.SCORE_COURANT
    name: Score courant
    definition: >-
      Le score comportemental recalculé après chaque transaction ou signal
      significatif. Valeur opérationnelle utilisée pour les décisions de palier.
    emitting_capability: CAP.BSP.001.SCO
    business_object: OBJ.BSP.001.EVALUATION
    data:
      - name: identifiant_evaluation
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_evaluation
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: valeur_score
        type: number
        description: Valeur du score après recalcul
        required: true
        business_object_property: valeur_score
      - name: facteurs_contributifs
        type: array
        description: Facteurs ayant contribué à ce recalcul
        required: true
        business_object_property: facteurs_contributifs
      - name: timestamp_calcul
        type: date
        description: Horodatage du recalcul
        required: true
        business_object_property: timestamp_calcul
      - name: version_modele
        type: string
        description: Version du modèle utilisé
        required: true
        business_object_property: version_modele
      - name: type_evaluation
        type: string
        description: COURANT
        required: true
        business_object_property: type_evaluation
      - name: evenement_declencheur
        type: string
        description: Identifiant de la transaction ou du signal ayant déclenché le recalcul
        required: true
      - name: delta_score
        type: number
        description: Variation du score par rapport à l'évaluation précédente
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - real-time

  # ── OBJ.BSP.001.CHANGEMENT_PALIER ──────────────────────────────────────────

  - id: RES.BSP.001.FRANCHISSEMENT
    name: Franchissement de palier
    definition: >-
      La transition vers un palier supérieur — événement de progression.
      Déclenche la mise à jour des règles de la carte dédiée (B2B.001.CRT).
    emitting_capability: CAP.BSP.001.PAL
    business_object: OBJ.BSP.001.CHANGEMENT_PALIER
    data:
      - name: identifiant_transition
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_transition
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: palier_precedent
        type: string
        description: Palier quitté
        required: true
        business_object_property: palier_precedent
      - name: nouveau_palier
        type: string
        description: Palier atteint
        required: true
        business_object_property: nouveau_palier
      - name: sens
        type: string
        description: FRANCHISSEMENT
        required: true
        business_object_property: sens
      - name: declencheur
        type: string
        description: ALGORITHME ou SURCHARGE_PRESCRIPTEUR
        required: true
        business_object_property: declencheur
      - name: score_au_moment
        type: number
        description: Score ayant déclenché le franchissement
        required: true
        business_object_property: score_au_moment
      - name: timestamp_transition
        type: date
        description: Horodatage
        required: true
        business_object_property: timestamp_transition
      - name: est_sortie_programme
        type: boolean
        description: True si ce franchissement correspond au dernier palier (transfert app standard)
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - progression

  - id: RES.BSP.001.RETROGRADATION
    name: Rétrogradation de palier
    definition: >-
      Le retour vers un palier inférieur — événement de difficulté.
      Déclenche la mise à jour restrictive des règles de la carte dédiée.
    emitting_capability: CAP.BSP.001.PAL
    business_object: OBJ.BSP.001.CHANGEMENT_PALIER
    data:
      - name: identifiant_transition
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_transition
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: palier_precedent
        type: string
        description: Palier quitté
        required: true
        business_object_property: palier_precedent
      - name: nouveau_palier
        type: string
        description: Palier restrictif atteint
        required: true
        business_object_property: nouveau_palier
      - name: sens
        type: string
        description: RETROGRADATION
        required: true
        business_object_property: sens
      - name: declencheur
        type: string
        description: ALGORITHME ou SURCHARGE_PRESCRIPTEUR
        required: true
        business_object_property: declencheur
      - name: score_au_moment
        type: number
        description: Score ayant déclenché la rétrogradation
        required: true
        business_object_property: score_au_moment
      - name: timestamp_transition
        type: date
        description: Horodatage
        required: true
        business_object_property: timestamp_transition
      - name: signaux_declencheurs
        type: array
        description: Liste des signaux ayant contribué à cette rétrogradation
        required: false
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - regression

  # ── OBJ.BSP.001.SURCHARGE_ALGO ─────────────────────────────────────────────

  - id: RES.BSP.001.SURCHARGE_ACTIVE
    name: Surcharge active
    definition: >-
      Une surcharge prescripteur en vigueur : l'algorithme est mis en attente,
      le prescripteur assume le contrôle du palier. Les résultats sont surveillés.
    emitting_capability: CAP.BSP.001.ARB
    business_object: OBJ.BSP.001.SURCHARGE_ALGO
    data:
      - name: identifiant_surcharge
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_surcharge
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_prescripteur
        type: string
        description: Prescripteur décideur
        required: true
        business_object_property: identifiant_prescripteur
      - name: palier_force
        type: string
        description: Palier imposé
        required: true
        business_object_property: palier_force
      - name: justification
        type: string
        description: Justification métier
        required: true
        business_object_property: justification
      - name: statut_surcharge
        type: string
        description: ACTIVE
        required: true
        business_object_property: statut_surcharge
      - name: date_surcharge
        type: date
        description: Date d'activation
        required: true
        business_object_property: date_surcharge
      - name: date_reprise_algo
        type: date
        description: Null tant que la surcharge est active
        required: false
        business_object_property: date_reprise_algo
      - name: resultat_observe
        type: string
        description: EN_ATTENTE
        required: false
        business_object_property: resultat_observe
      - name: criteres_reprise_algo
        type: object
        description: Conditions définies pour que l'algorithme reprenne le contrôle
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - human-override

  - id: RES.BSP.001.SURCHARGE_CLOTUREE
    name: Surcharge clôturée
    definition: >-
      Une surcharge terminée : l'algorithme a repris le contrôle, le résultat de la
      décision prescripteur est documenté (confirmé, infirmé, ou non concluant).
    emitting_capability: CAP.BSP.001.ARB
    business_object: OBJ.BSP.001.SURCHARGE_ALGO
    data:
      - name: identifiant_surcharge
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_surcharge
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_prescripteur
        type: string
        description: Prescripteur décideur
        required: true
        business_object_property: identifiant_prescripteur
      - name: palier_force
        type: string
        description: Palier qui avait été imposé
        required: true
        business_object_property: palier_force
      - name: justification
        type: string
        description: Justification documentée
        required: true
        business_object_property: justification
      - name: statut_surcharge
        type: string
        description: CLOTUREE
        required: true
        business_object_property: statut_surcharge
      - name: date_surcharge
        type: date
        description: Date d'activation
        required: true
        business_object_property: date_surcharge
      - name: date_reprise_algo
        type: date
        description: Date de reprise algorithmique
        required: true
        business_object_property: date_reprise_algo
      - name: resultat_observe
        type: string
        description: CONFIRME, INFIRME ou NON_CONCLUANT
        required: true
        business_object_property: resultat_observe
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - audit

  # ── OBJ.BSP.004.DECISION_PAIEMENT ──────────────────────────────────────────

  - id: RES.BSP.004.PAIEMENT_AUTORISE
    name: Paiement autorisé
    definition: >-
      Une transaction accordée par les règles du palier courant.
      Déclenche la mise à jour de l'enveloppe budgétaire concernée et contribue au score.
    emitting_capability: CAP.BSP.004.AUT
    business_object: OBJ.BSP.004.DECISION_PAIEMENT
    data:
      - name: identifiant_decision
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_decision
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: montant
        type: number
        description: Montant autorisé
        required: true
        business_object_property: montant
      - name: categorie_marchand
        type: string
        description: Catégorie du marchand
        required: true
        business_object_property: categorie_marchand
      - name: identifiant_marchand
        type: string
        description: Identifiant du point de vente
        required: true
        business_object_property: identifiant_marchand
      - name: resultat
        type: string
        description: AUTORISEE
        required: true
        business_object_property: resultat
      - name: regle_appliquee
        type: string
        description: Règle de palier ayant accordé l'autorisation
        required: true
        business_object_property: regle_appliquee
      - name: timestamp_decision
        type: date
        description: Horodatage
        required: true
        business_object_property: timestamp_decision
      - name: solde_enveloppe_apres
        type: number
        description: Solde restant dans l'enveloppe après cette transaction
        required: true
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time

  - id: RES.BSP.004.PAIEMENT_REFUSE
    name: Paiement refusé
    definition: >-
      Une transaction refusée par les règles du palier courant.
      Le refus lui-même est un signal comportemental exploitable par BSP.001.SIG.
    emitting_capability: CAP.BSP.004.AUT
    business_object: OBJ.BSP.004.DECISION_PAIEMENT
    data:
      - name: identifiant_decision
        type: string
        description: Identifiant unique
        required: true
        business_object_property: identifiant_decision
      - name: identifiant_dossier
        type: string
        description: Référence au dossier
        required: true
        business_object_property: identifiant_dossier
      - name: montant
        type: number
        description: Montant tenté
        required: true
