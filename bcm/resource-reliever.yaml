meta:
  bcm_name: BCM Reliever — Resources
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

resources:

  # ── OBJ.REF.001.FICHE_BENEFICIAIRE ─────────────────────────────────────────

  - id: RES.REF.001.IDENTITE_BENEFICIAIRE
    name: Beneficiary identity
    definition: >-
      The complete and active record of a beneficiary in the referential.
      Created at enrolment, archived upon definitive exit.
    emitting_capability: CAP.REF.001.BEN
    business_object: OBJ.REF.001.FICHE_BENEFICIAIRE
    data:
      - name: identifiant_interne
        type: string
        description: Unique Reliever identifier
        required: true
        business_object_property: identifiant_interne
      - name: nom
        type: string
        description: Last name
        required: true
        business_object_property: nom
      - name: prenom
        type: string
        description: First name
        required: true
        business_object_property: prenom
      - name: date_naissance
        type: date
        description: Date of birth
        required: true
        business_object_property: date_naissance
      - name: coordonnees
        type: object
        description: Postal address and contact details
        required: true
        business_object_property: coordonnees
      - name: statut_referentiel
        type: string
        description: active or archived
        required: true
        business_object_property: statut_referentiel
      - name: date_creation
        type: date
        description: Date of entry into the referential
        required: true
        business_object_property: date_creation
      - name: sources_identite
        type: array
        description: Source systems that have fed the identity (bank, hospital, CCAS...)
        required: false
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - golden-record

  # ── OBJ.REF.001.FICHE_PRESCRIPTEUR ─────────────────────────────────────────

  - id: RES.REF.001.IDENTITE_PRESCRIPTEUR
    name: Prescriber identity
    definition: >-
      The active record of a prescriber with their authorisations in the programme.
      Lifecycle: active → suspended → archived.
    emitting_capability: CAP.REF.001.PRE
    business_object: OBJ.REF.001.FICHE_PRESCRIPTEUR
    data:
      - name: identifiant_interne
        type: string
        description: Unique Reliever identifier
        required: true
        business_object_property: identifiant_interne
      - name: type_prescripteur
        type: string
        description: BANCAIRE, MEDICAL or SOCIAL
        required: true
        business_object_property: type_prescripteur
      - name: nom_complet
        type: string
        description: Full name
        required: true
        business_object_property: nom_complet
      - name: organisation
        type: string
        description: Affiliated institution
        required: true
        business_object_property: organisation
      - name: habilitations
        type: array
        description: Authorisations granted in the programme
        required: true
        business_object_property: habilitations
      - name: statut_referentiel
        type: string
        description: active, suspended or archived
        required: true
        business_object_property: statut_referentiel
      - name: perimetre_visibilite
        type: object
        description: Configuration of what this prescriber can see according to their type
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - master-data

  # ── OBJ.REF.001.DEFINITION_PALIER ──────────────────────────────────────────

  - id: RES.REF.001.PALIER_ACTIF
    name: Active tier
    definition: >-
      The current and in-force version of a tier definition, with all its operational
      rules. This is the resource consumed by BSP.001, BSP.004 and B2B.001 when
      applying rules.
    emitting_capability: CAP.REF.001.PAL
    business_object: OBJ.REF.001.DEFINITION_PALIER
    data:
      - name: code_palier
        type: string
        description: Tier identifier
        required: true
        business_object_property: code_palier
      - name: libelle
        type: string
        description: Business label
        required: true
        business_object_property: libelle
      - name: plafond_journalier
        type: number
        description: Daily cap in euros
        required: true
        business_object_property: plafond_journalier
      - name: categories_autorisees
        type: array
        description: Authorised spending categories
        required: true
        business_object_property: categories_autorisees
      - name: seuil_franchissement
        type: number
        description: Minimum score to reach the next tier
        required: true
        business_object_property: seuil_franchissement
      - name: seuil_retrogradation
        type: number
        description: Score triggering a demotion
        required: true
        business_object_property: seuil_retrogradation
      - name: version
        type: string
        description: Definition version
        required: true
        business_object_property: version
      - name: statut
        type: string
        description: active
        required: true
        business_object_property: statut
      - name: date_mise_en_vigueur
        type: date
        description: Date from which this version is active
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - normative

  - id: RES.REF.001.PALIER_ARCHIVE
    name: Archived tier
    definition: >-
      A superseded version of a tier definition, retained for historisation and
      audit. Cases opened under this version may reference it.
    emitting_capability: CAP.REF.001.PAL
    business_object: OBJ.REF.001.DEFINITION_PALIER
    data:
      - name: code_palier
        type: string
        description: Tier identifier
        required: true
        business_object_property: code_palier
      - name: libelle
        type: string
        description: Business label
        required: true
        business_object_property: libelle
      - name: plafond_journalier
        type: number
        description: Daily cap in force for this version
        required: true
        business_object_property: plafond_journalier
      - name: categories_autorisees
        type: array
        description: Authorised categories in this version
        required: true
        business_object_property: categories_autorisees
      - name: seuil_franchissement
        type: number
        description: Upgrade threshold in this version
        required: true
        business_object_property: seuil_franchissement
      - name: seuil_retrogradation
        type: number
        description: Demotion threshold in this version
        required: true
        business_object_property: seuil_retrogradation
      - name: version
        type: string
        description: Definition version
        required: true
        business_object_property: version
      - name: statut
        type: string
        description: archived
        required: true
        business_object_property: statut
      - name: date_archivage
        type: date
        description: Date on which this version was replaced
        required: true
    adrs:
      - ADR-BCM-FUNC-0013
    tags:
      - historical
      - audit

  # ── OBJ.BSP.002.PARTICIPATION ───────────────────────────────────────────────

  - id: RES.BSP.002.DOSSIER_ACTIF
    name: Active case
    definition: >-
      A beneficiary's ongoing participation in the Reliever programme.
      Contains the complete operational state: current tier, assigned prescribers,
      current score, progression metrics. Central reference for all BSP L2 capabilities.
    emitting_capability: CAP.BSP.002.CYC
    business_object: OBJ.BSP.002.PARTICIPATION
    data:
      - name: identifiant_dossier
        type: string
        description: Unique case identifier
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_beneficiaire
        type: string
        description: Beneficiary reference (REF.001.BEN)
        required: true
        business_object_property: identifiant_beneficiaire
      - name: palier_courant
        type: string
        description: Active tier code
        required: true
        business_object_property: palier_courant
      - name: statut_dossier
        type: string
        description: ACTIF
        required: true
        business_object_property: statut_dossier
      - name: date_ouverture
        type: date
        description: Enrolment date
        required: true
        business_object_property: date_ouverture
      - name: date_cloture
        type: date
        description: Null for an active case
        required: false
        business_object_property: date_cloture
      - name: prescripteurs_assignes
        type: array
        description: Active prescribers on this case
        required: true
        business_object_property: prescripteurs_assignes
      - name: score_courant
        type: number
        description: Latest computed score value
        required: true
      - name: nb_transactions_periode
        type: number
        description: Number of transactions in the current period
        required: false
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - operational
      - core-domain

  - id: RES.BSP.002.DOSSIER_CLOS
    name: Closed case
    definition: >-
      A beneficiary's completed participation, regardless of the reason for closure.
      Retains the final state and exit reason for audit and programme analytics.
    emitting_capability: CAP.BSP.002.CYC
    business_object: OBJ.BSP.002.PARTICIPATION
    data:
      - name: identifiant_dossier
        type: string
        description: Unique case identifier
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_beneficiaire
        type: string
        description: Beneficiary reference
        required: true
        business_object_property: identifiant_beneficiaire
      - name: palier_courant
        type: string
        description: Tier reached at closure
        required: true
        business_object_property: palier_courant
      - name: statut_dossier
        type: string
        description: CLOS_SUCCES, CLOS_ABANDON or CLOS_ADMINISTRATIF
        required: true
        business_object_property: statut_dossier
      - name: date_ouverture
        type: date
        description: Enrolment date
        required: true
        business_object_property: date_ouverture
      - name: date_cloture
        type: date
        description: Exit date
        required: true
        business_object_property: date_cloture
      - name: prescripteurs_assignes
        type: array
        description: Prescribers assigned at closure
        required: true
        business_object_property: prescripteurs_assignes
      - name: raison_cloture
        type: string
        description: Description of the closure reason
        required: true
      - name: palier_max_atteint
        type: string
        description: Highest tier ever reached in this case
        required: true
    adrs:
      - ADR-BCM-FUNC-0006
    tags:
      - historical
      - audit

  # ── OBJ.BSP.001.EVALUATION ─────────────────────────────────────────────────

  - id: RES.BSP.001.SCORE_ENTREE
    name: Entry score
    definition: >-
      The reference behavioural score (baseline) computed at the beneficiary's
      enrolment. Serves as a comparison point to measure progression.
    emitting_capability: CAP.BSP.001.SCO
    business_object: OBJ.BSP.001.EVALUATION
    data:
      - name: identifiant_evaluation
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_evaluation
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: valeur_score
        type: number
        description: Baseline score at entry
        required: true
        business_object_property: valeur_score
      - name: facteurs_contributifs
        type: array
        description: Factors that contributed to the baseline
        required: true
        business_object_property: facteurs_contributifs
      - name: timestamp_calcul
        type: date
        description: Timestamp of the initial computation
        required: true
        business_object_property: timestamp_calcul
      - name: version_modele
        type: string
        description: Model version used
        required: true
        business_object_property: version_modele
      - name: type_evaluation
        type: string
        description: INITIAL
        required: true
        business_object_property: type_evaluation
      - name: donnees_financieres_snapshot
        type: object
        description: Snapshot of open banking financial data used for the baseline
        required: false
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - baseline

  - id: RES.BSP.001.SCORE_COURANT
    name: Current score
    definition: >-
      The behavioural score recomputed after each transaction or significant signal.
      Operational value used for tier decisions.
    emitting_capability: CAP.BSP.001.SCO
    business_object: OBJ.BSP.001.EVALUATION
    data:
      - name: identifiant_evaluation
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_evaluation
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: valeur_score
        type: number
        description: Score value after recomputation
        required: true
        business_object_property: valeur_score
      - name: facteurs_contributifs
        type: array
        description: Factors that contributed to this recomputation
        required: true
        business_object_property: facteurs_contributifs
      - name: timestamp_calcul
        type: date
        description: Recomputation timestamp
        required: true
        business_object_property: timestamp_calcul
      - name: version_modele
        type: string
        description: Model version used
        required: true
        business_object_property: version_modele
      - name: type_evaluation
        type: string
        description: COURANT
        required: true
        business_object_property: type_evaluation
      - name: evenement_declencheur
        type: string
        description: Identifier of the transaction or signal that triggered the recomputation
        required: true
      - name: delta_score
        type: number
        description: Score variation compared to the previous evaluation
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - real-time

  # ── OBJ.BSP.001.CHANGEMENT_PALIER ──────────────────────────────────────────

  - id: RES.BSP.001.FRANCHISSEMENT
    name: Tier upgrade
    definition: >-
      The transition to a higher tier — a progression event.
      Triggers the update of the dedicated card's rules (B2B.001.CRT).
    emitting_capability: CAP.BSP.001.PAL
    business_object: OBJ.BSP.001.CHANGEMENT_PALIER
    data:
      - name: identifiant_transition
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_transition
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: palier_precedent
        type: string
        description: Tier left
        required: true
        business_object_property: palier_precedent
      - name: nouveau_palier
        type: string
        description: Tier reached
        required: true
        business_object_property: nouveau_palier
      - name: sens
        type: string
        description: FRANCHISSEMENT
        required: true
        business_object_property: sens
      - name: declencheur
        type: string
        description: ALGORITHME or SURCHARGE_PRESCRIPTEUR
        required: true
        business_object_property: declencheur
      - name: score_au_moment
        type: number
        description: Score that triggered the upgrade
        required: true
        business_object_property: score_au_moment
      - name: timestamp_transition
        type: date
        description: Timestamp
        required: true
        business_object_property: timestamp_transition
      - name: est_sortie_programme
        type: boolean
        description: True if this upgrade corresponds to the final tier (transfer to standard app)
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - progression

  - id: RES.BSP.001.RETROGRADATION
    name: Tier demotion
    definition: >-
      The return to a lower tier — a difficulty event.
      Triggers the restrictive update of the dedicated card's rules.
    emitting_capability: CAP.BSP.001.PAL
    business_object: OBJ.BSP.001.CHANGEMENT_PALIER
    data:
      - name: identifiant_transition
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_transition
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: palier_precedent
        type: string
        description: Tier left
        required: true
        business_object_property: palier_precedent
      - name: nouveau_palier
        type: string
        description: Restrictive tier reached
        required: true
        business_object_property: nouveau_palier
      - name: sens
        type: string
        description: RETROGRADATION
        required: true
        business_object_property: sens
      - name: declencheur
        type: string
        description: ALGORITHME or SURCHARGE_PRESCRIPTEUR
        required: true
        business_object_property: declencheur
      - name: score_au_moment
        type: number
        description: Score that triggered the demotion
        required: true
        business_object_property: score_au_moment
      - name: timestamp_transition
        type: date
        description: Timestamp
        required: true
        business_object_property: timestamp_transition
      - name: signaux_declencheurs
        type: array
        description: List of signals that contributed to this demotion
        required: false
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - regression

  # ── OBJ.BSP.001.SURCHARGE_ALGO ─────────────────────────────────────────────

  - id: RES.BSP.001.SURCHARGE_ACTIVE
    name: Active override
    definition: >-
      A prescriber override currently in force: the algorithm is placed on hold,
      the prescriber takes control of the tier. Results are monitored.
    emitting_capability: CAP.BSP.001.ARB
    business_object: OBJ.BSP.001.SURCHARGE_ALGO
    data:
      - name: identifiant_surcharge
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_surcharge
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_prescripteur
        type: string
        description: Deciding prescriber
        required: true
        business_object_property: identifiant_prescripteur
      - name: palier_force
        type: string
        description: Enforced tier
        required: true
        business_object_property: palier_force
      - name: justification
        type: string
        description: Business justification
        required: true
        business_object_property: justification
      - name: statut_surcharge
        type: string
        description: ACTIVE
        required: true
        business_object_property: statut_surcharge
      - name: date_surcharge
        type: date
        description: Activation date
        required: true
        business_object_property: date_surcharge
      - name: date_reprise_algo
        type: date
        description: Null while the override is active
        required: false
        business_object_property: date_reprise_algo
      - name: resultat_observe
        type: string
        description: EN_ATTENTE
        required: false
        business_object_property: resultat_observe
      - name: criteres_reprise_algo
        type: object
        description: Conditions defined for the algorithm to resume control
        required: true
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - human-override

  - id: RES.BSP.001.SURCHARGE_CLOTUREE
    name: Closed override
    definition: >-
      A completed override: the algorithm has resumed control, the outcome of the
      prescriber's decision is documented (confirmed, refuted, or inconclusive).
    emitting_capability: CAP.BSP.001.ARB
    business_object: OBJ.BSP.001.SURCHARGE_ALGO
    data:
      - name: identifiant_surcharge
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_surcharge
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: identifiant_prescripteur
        type: string
        description: Deciding prescriber
        required: true
        business_object_property: identifiant_prescripteur
      - name: palier_force
        type: string
        description: Tier that had been enforced
        required: true
        business_object_property: palier_force
      - name: justification
        type: string
        description: Documented justification
        required: true
        business_object_property: justification
      - name: statut_surcharge
        type: string
        description: CLOTUREE
        required: true
        business_object_property: statut_surcharge
      - name: date_surcharge
        type: date
        description: Activation date
        required: true
        business_object_property: date_surcharge
      - name: date_reprise_algo
        type: date
        description: Date of algorithmic resumption
        required: true
        business_object_property: date_reprise_algo
      - name: resultat_observe
        type: string
        description: CONFIRME, INFIRME or NON_CONCLUANT
        required: true
        business_object_property: resultat_observe
    adrs:
      - ADR-BCM-FUNC-0005
    tags:
      - audit

  # ── OBJ.BSP.004.DECISION_PAIEMENT ──────────────────────────────────────────

  - id: RES.BSP.004.PAIEMENT_AUTORISE
    name: Authorised payment
    definition: >-
      A transaction approved by the current tier's rules.
      Triggers the update of the relevant budget envelope and contributes to the score.
    emitting_capability: CAP.BSP.004.AUT
    business_object: OBJ.BSP.004.DECISION_PAIEMENT
    data:
      - name: identifiant_decision
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_decision
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: montant
        type: number
        description: Authorised amount
        required: true
        business_object_property: montant
      - name: categorie_marchand
        type: string
        description: Merchant category
        required: true
        business_object_property: categorie_marchand
      - name: identifiant_marchand
        type: string
        description: Point of sale identifier
        required: true
        business_object_property: identifiant_marchand
      - name: resultat
        type: string
        description: AUTORISEE
        required: true
        business_object_property: resultat
      - name: regle_appliquee
        type: string
        description: Tier rule that granted the authorisation
        required: true
        business_object_property: regle_appliquee
      - name: timestamp_decision
        type: date
        description: Timestamp
        required: true
        business_object_property: timestamp_decision
      - name: solde_enveloppe_apres
        type: number
        description: Remaining balance in the envelope after this transaction
        required: true
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time

  - id: RES.BSP.004.PAIEMENT_REFUSE
    name: Declined payment
    definition: >-
      A transaction declined by the current tier's rules.
      The decline itself is a behavioural signal exploitable by BSP.001.SIG.
    emitting_capability: CAP.BSP.004.AUT
    business_object: OBJ.BSP.004.DECISION_PAIEMENT
    data:
      - name: identifiant_decision
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_decision
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: montant
        type: number
        description: Attempted amount
        required: true
        business_object_property: montant
      - name: categorie_marchand
        type: string
        description: Merchant category
        required: true
        business_object_property: categorie_marchand
      - name: identifiant_marchand
        type: string
        description: Point of sale identifier
        required: true
        business_object_property: identifiant_marchand
      - name: resultat
        type: string
        description: REFUSEE
        required: true
        business_object_property: resultat
      - name: regle_appliquee
        type: string
        description: Tier rule that caused the decline
        required: true
        business_object_property: regle_appliquee
      - name: timestamp_decision
        type: date
        description: Timestamp
        required: true
        business_object_property: timestamp_decision
      - name: motif_refus
        type: string
        description: Detailed reason — CATEGORIE_INTERDITE, PLAFOND_DEPASSE, ENVELOPPE_EPUISEE, etc.
        required: true
    adrs:
      - ADR-BCM-FUNC-0008
    tags:
      - real-time
      - behavioral-signal

  # ── OBJ.BSP.004.ALLOCATION ─────────────────────────────────────────────────

  - id: RES.BSP.004.ENVELOPPE_OUVERTE
    name: Open envelope
    definition: >-
      A budget allocation currently being consumed in the current period.
    emitting_capability: CAP.BSP.004.ENV
    business_object: OBJ.BSP.004.ALLOCATION
    data:
      - name: identifiant_allocation
        type: string
        description: Unique identifier
        required: true
        business_object_property: identifiant_allocation
      - name: identifiant_dossier
        type: string
        description: Case reference
        required: true
        business_object_property: identifiant_dossier
      - name: categorie
        type: string
        description: Spending category
        required: true
        business_object_property: categorie
      - name: montant_plafond
        type: number
        description: Period cap
        required: true
        business_object_property: montant_plafond
      - name: montant_consomme
        type: number
        description: Amount consumed to date
        required: true
