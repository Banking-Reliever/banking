      An open multi-prescriber deliberation awaiting resolution.
      Individual positions are being collected; the resolution has not yet been validated.
    emitting_capability: CAP.BSP.003.COD
    business_object: OBJ.BSP.003.DECISION_CONCERTEE
    data:
