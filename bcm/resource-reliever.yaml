        type: string
        description: Subject of the decision
        required: true
        business_object_property: objet_decision
      - name: participants
        type: array
        description: Prescribers who participated and their final position
        required: true
        business_object_property: participants
      - name: resolution
        type: string
        description: Final validated decision
        required: true
        business_object_property: resolution
      - name: statut
        type: string
        description: VALIDEE
        required: true
        business_object_property: statut
      - name: date_finalisation
        type: date
        description: Date of decision validation
        required: true
        business_object_property: date_finalisation
      - name: capacite_destinataire
        type: string
        description: Capability to which the decision is forwarded (BSP.001.PAL or BSP.001.ARB)
        required: true
    adrs:
      - ADR-BCM-FUNC-0007
    tags:
      - multi-actor
      - audit

