meta:
  bcm_name: BCM Reliever
  version: 0.1.0
  template_version: 1.0.0
  last_updated: '2026-04-24'
  owners:
    - Reliever Programme Directorate

capabilities:
  - id: CAP.BSP.001
    name: Behavioural Remediation
    level: L1
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Continuously assess the beneficiary's financial behaviour, compute a score,
      manage autonomy tiers and arbitrate tier-change decisions
      between the algorithm and prescribers. This is Reliever's core domain.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0005

  - id: CAP.BSP.002
    name: Beneficiary Access & Lifecycle
    level: L1
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Manage the complete lifecycle of a beneficiary within the Reliever programme:
      eligibility verification, enrolment, follow-up, and exit (including transfer
      to a standard banking application at the final tier).
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0006

  - id: CAP.BSP.003
    name: Prescriber Coordination
    level: L1
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Orchestrate multi-prescriber collaboration (banker, doctor, social worker)
      by defining roles, notifying prescribers of relevant events
      and formalising co-constructed decisions that affect the beneficiary's journey.
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0007

  - id: CAP.BSP.004
    name: Transaction Control
    level: L1
    zoning: BUSINESS_SERVICE_PRODUCTION
    description: >
      Authorise or decline each transaction on the dedicated card according to the
      current tier rules, manage budget envelopes, and surface behavioural signals
      (notably unconsumed budgets as a relapse signal).
    owner: Reliever Programme Directorate
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0008

  - id: CAP.CAN.001
    name: Beneficiary Journey
    level: L1
    zoning: CHANNEL
    description: >
      Expose to the beneficiary an interface adapted to their current tier: financial
      dashboard, real-time purchase assistance, and personalised notifications —
      with dignity as a non-negotiable functional constraint.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0009

  - id: CAP.CAN.002
    name: Prescriber Portal
    level: L1
    zoning: CHANNEL
    description: >
      Expose to prescribers a filtered view of the beneficiary according to their role
      and access rights, allow them to take actions (manual override, co-decision)
      and consult monitoring reports in compliance with professional confidentiality.
    owner: User Experience Directorate
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0010

  - id: CAP.B2B.001
    name: Financial Instrument Management
    level: L1
    zoning: EXCHANGE_B2B
    description: >
      Manage the lifecycle of the Reliever dedicated card, access the beneficiary's
      main account financial data via open banking (PSD2), and orchestrate fund flows
      between the main account and the card — making Reliever independent of banking institutions.
    owner: Financial Partnerships & Payments Team
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0011

  - id: CAP.SUP.001
    name: Compliance & Data Protection
    level: L1
    zoning: SUPPORT
    description: >
      Manage the beneficiary's GDPR consents, log all data accesses
      (across all capabilities) and handle rights-exercise requests — resolving the
      transparency/privacy tension inherent in a system concentrating financial,
      medical and social data on a single individual.
    owner: DPO (Data Protection Officer)
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0012

  - id: CAP.REF.001
    name: Shared Referentials
    level: L1
    zoning: REFERENTIAL
    description: >
      Hold and maintain the canonical reference data shared across the entire
      programme: the beneficiary identity, the prescriber identity, and the tier
      definitions with their transition rules — guaranteeing a single source of truth
      for the three foundational business concepts of Reliever.
    owner: Data & Referentials Team
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0013

  - id: CAP.DAT.001
    name: Behavioural Analytics
    level: L1
    zoning: DATA_ANALYTIQUE
    description: >
      Collect aggregated behavioural events from the programme, analyse patterns
      to improve the scoring model over time, and produce steering dashboards —
      strictly separating the analytics pipeline from the operational transactional
      pipeline to prevent any uncontrolled feedback loop.
    owner: Data Science & BI Team
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0014

  - id: CAP.PIL.001
    name: Programme Steering
    level: L1
    zoning: STEERING
    description: >
      Steer the Reliever remediation programme at scale: define and evolve governance
      policies, measure programme effectiveness, validate scoring model updates before
      deployment, and certify overall regulatory compliance
      (banking, medical and social frameworks).
    owner: Reliever Programme Directorate / Compliance Officer
    adrs:
      - ADR-BCM-FUNC-0004
      - ADR-BCM-FUNC-0015
