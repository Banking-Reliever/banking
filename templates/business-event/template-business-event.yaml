# ──────────────────────────────────────────────────────────────
# Business events
# ──────────────────────────────────────────────────────────────
#
# A business event represents a significant business fact,
# emitted by a BCM capability, and carrying a business object.
#
# Identifier convention: (TODO: define an identifier convention for business events)
#   EVT.<ZONE>.<L1>.<CODE>   e.g. EVT.CORE.005.CASE_OPENED
#
# either carried_business_object or data must be filled, but not both
# Scope:
#   - public: event broadcast outside the capability (or even outside domain)
#   - private: internal event to the capability / domain not accessible from outside
#
# ──────────────────────────────────────────────────────────────

business_events:

  - id: EVT.BCP.005.XXX                       # Unique business event identifier
    name: Business event name                  # Short and explicit name
    version: 1.0.0                             # Event contract version (SemVer recommended)
    definition: >-                             # Business definition of the event
      Functional description of the business event:
      what happens, in what context, and why this event exists.

    emitting_capability: CAP.BCP.005          # BCM capability that emits the event
                                               # (must match an id in capabilities-*.yaml)
    carried_business_object: OBJ.BCP.005.XXX  # Business object carried by the event
                                               # (if it does exists, it must match an id in business-object-*.yaml)
    data  :                                               
      - name: field_1                         #   field / attribute name
        type: string                          #   type (string, number, date, boolean, object, array)
        description: Field 1 description      #   functional description
        required: true     
      
      - name: field_2
        type: date
        description: Field 2 description
        required: false

    scope: public                              # Event scope: public | private

    # Optional fields
    adrs: []                                   # Associated ADRs
    tags: []                                   # Free tags for filtering / search
