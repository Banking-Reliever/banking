# ──────────────────────────────────────────────────────────────
# Business subscriptions
# ──────────────────────────────────────────────────────────────
#
# This file references only business events.
# It is intentionally separate from resource subscriptions.
#
# Identifier convention (suggestion):
#   SUB.BUSINESS.<ZONE>.<L1>.<CODE>
#
# Differentiation:
#   - business subscription    -> subscribed_event.id: EVT.... (business event)
#   - resource subscription -> subscribed_resource_event.id: EVT.... (resource event)
#     (to be maintained in a separate file)
#
# ──────────────────────────────────────────────────────────────

business_subscriptions:

  - id: SUB.BUSINESS.CORE.005.XXX
    consumer_capability: CAP.CORE.005.XXX      # L2/L3 capability that consumes

    subscribed_event:
      id: EVT.CORE.005.XXX                     # Subscribed business event
      version: 1.0.0                            # Business event contract version
      emitting_capability: CAP.CORE.005.XXX    # L2/L3 emitting capability

    scope: public                               # public | private
    rationale: >-
      Business justification for the subscription.

    adrs: []
    tags:
      - business
