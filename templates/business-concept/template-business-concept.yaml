# ──────────────────────────────────────────────────────────────
# Business concepts (canonical model)
# ──────────────────────────────────────────────────────────────
#
# A business concept represents a cross-cutting and stable notion.
# It does not replace a business object or a resource.
#
# Identifier convention:
#   CPT.<ZONE>.<L1>.<CODE>   e.g. CPT.CORE.005.CLAIM_DECLARATION
#
#
# ──────────────────────────────────────────────────────────────

concepts:
  - id: CPT.DOM.000.XXX
    name: Business concept name
    definition: >-
      Cross-cutting business description of the concept,
      independent of a specific operational responsibility.

    scope:
      - step_1
      - step_2


    business_rules:
      - "Cross-cutting business rule 1"
      - "Cross-cutting business rule 2"

    tags:
      - business-concept
      - canonical
