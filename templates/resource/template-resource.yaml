meta:
  bcm_name: BCM Urbanisation
  version: 0.0.1
  template_version: 1.0.0
  last_updated: 'YYYY-MM-DD'
  owners:
    - Owner 1
    - Owner 2

# ──────────────────────────────────────────────────────────────
# Resources
# ──────────────────────────────────────────────────────────────
#
# A resource is a detailed operational artifact,
# produced (emitted) by a BCM capability.
# It implements a business object at a more abstract level.
#
# Identifier convention:
#   RES.<ZONE>.<L1>.<CODE>   e.g. RES.CORE.005.CAS (Claim case)
#
# ──────────────────────────────────────────────────────────────

resources:

  - id: RES.DOM.000.XXX                       # Unique resource identifier
    name: Resource name                       # Short and explicit name
    definition: >-                            # Business definition of the resource
      Functional description of the resource:
      what it represents, its scope, and main usages.

    emitting_capability: CAP.CORE.005.IND     # L2 BCM capability that produces / emits this resource
                                             # Expected format: CAP.<ZONE>.<L1>.<L2>
                                             # (must match an id in capabilities-*.yaml)
    emitting_capability_L3:                   # Optional: list of L3 BCM emitting capabilities
                                             # Rule 1: this list must contain EXCLUSIVELY L3 ids
                                             # Rule 2: omit this attribute entirely if no L3 exists for the L2
                                             # Rule 3: L3 format must be explicit: CAP.<ZONE>.<L1>.<L2>.<L3>
                                             # (must match an id in capabilities-*.yaml)
      - CAP.CORE.005.IND.COV

    data:                                     # Data carried by the resource
      - name: field_1                         #   field / attribute name
        type: string                          #   type (string, number, date, boolean, object, array)
        description: Field 1 description      #   functional description
        required: true                        #   required?
        business_object_property: field_1     #   (optional) reference to a business object property

      - name: field_2
        type: date
        description: Field 2 description
        required: false
        business_object_property: field_2     #   (optional) reference to a business object property

    business_object: OBJ.DOM.000.XXX          # Reference to the associated business object
                # (must match an id in business-object-*.yaml)

    

    # Optional fields
    adrs: []                                  # Associated ADRs
    tags: []                                  # Free tags for filtering / search
