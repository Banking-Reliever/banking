# ──────────────────────────────────────────────────────────────
# Resource subscriptions
# ──────────────────────────────────────────────────────────────
#
# This file references only resource events.
# It is intentionally separate from business subscriptions.
#
# Identifier convention (suggestion):
#   SUB.RESOURCE.<ZONE>.<L1>.<CODE>
#
# ──────────────────────────────────────────────────────────────

resource_subscriptions:

  - id: SUB.RESOURCE.CORE.005.XXX
    consumer_capability: CAP.CORE.005.XXX           # L2/L3 capability that consumes
    linked_business_subscription: SUB.BUSINESS.CORE.005.XXX  # Associated business subscription

    subscribed_resource_event:
      id: EVT.RES.CORE.005.XXX                      # Subscribed resource event
      emitting_capability: CAP.CORE.005.XXX         # L2/L3 emitting capability
      linked_business_event: EVT.CORE.005.XXX       # Linked business event

    scope: public                                    # public | private
    rationale: >-
      Operational justification for the subscription.

    adrs: []
    tags:
      - resource
      - subscription
