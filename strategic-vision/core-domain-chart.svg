<svg xmlns="http://www.w3.org/2000/svg" width="800" height="700" viewBox="0 0 800 700">
  <title>Core Domain Chart — Reliever IS</title>

  <!-- Background -->
  <rect width="800" height="700" fill="white"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#212121">Core Domain Chart — Reliever IS</text>

  <!--
    Plot area  : x ∈ [110, 690]  width=580
                 y ∈ [55, 585]   height=530   (y-axis inverted: high model complexity = low py)
    Mapping    : px = 110 + cx * 580
                 py = 585 − cy * 530
    Thresholds : Generic  x < 0.35  →  px < 313
                 Core     x ≥ 0.60  →  px ≥ 458   AND   y ≥ 0.50 → py ≤ 320
  -->

  <!-- ── Zone backgrounds ── -->

  <!-- Supporting (full plot area background — lavender/purple) -->
  <rect x="110" y="55" width="580" height="530" fill="#CE93D8" opacity="0.55"/>

  <!-- Generic (left vertical band — gray) -->
  <rect x="110" y="55" width="203" height="530" fill="#9E9E9E" opacity="0.80"/>

  <!-- Core (top-right rectangle — teal) -->
  <rect x="458" y="55" width="232" height="265" fill="#4DB6AC" opacity="0.70"/>

  <!-- ── Dividing dashed lines ── -->
  <!-- Vertical at x = 0.35  →  px = 313 -->
  <line x1="313" y1="55" x2="313" y2="585" stroke="#555555" stroke-width="1.2" stroke-dasharray="6,4"/>
  <!-- Vertical at x = 0.60  →  px = 458 -->
  <line x1="458" y1="55" x2="458" y2="585" stroke="#555555" stroke-width="1.2" stroke-dasharray="6,4"/>
  <!-- Horizontal at y = 0.50  →  py = 320 -->
  <line x1="110" y1="320" x2="690" y2="320" stroke="#555555" stroke-width="1.2" stroke-dasharray="6,4"/>

  <!-- ── Axes ── -->
  <!-- X axis -->
  <line x1="110" y1="585" x2="686" y2="585" stroke="#212121" stroke-width="2"/>
  <polygon points="684,579 700,585 684,591" fill="#212121"/>
  <!-- Y axis -->
  <line x1="110" y1="585" x2="110" y2="64" stroke="#212121" stroke-width="2"/>
  <polygon points="104,66 110,50 116,66" fill="#212121"/>

  <!-- Low / High labels -->
  <text x="118" y="602" font-family="sans-serif" font-size="12" fill="#424242">Low</text>
  <text x="692" y="602" text-anchor="end" font-family="sans-serif" font-size="12" fill="#424242">High</text>
  <text x="97"  y="584" text-anchor="end" font-family="sans-serif" font-size="12" fill="#424242">Low</text>
  <text x="97"  y="68"  text-anchor="end" font-family="sans-serif" font-size="12" fill="#424242">High</text>

  <!-- Axis titles -->
  <text x="400" y="622" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#212121">Business Differentiation →</text>
  <text x="26"  y="320" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#212121" transform="rotate(-90,26,320)">Model Complexity →</text>

  <!-- ── Zone labels ── -->

  <!-- GENERIC — written vertically in center of gray band  (cx≈212, cy=320) -->
  <text x="212" y="320" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold"
        letter-spacing="4" fill="white" opacity="0.95" transform="rotate(-90,212,320)">GENERIC</text>

  <!-- CORE — top-right teal zone -->
  <text x="574" y="100" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold"
        fill="white" opacity="0.95">CORE</text>

  <!-- SUPPORTING — bottom-right purple zone -->
  <text x="574" y="475" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold"
        fill="white" opacity="0.95">SUPPORTING</text>

  <!-- ── Capability dots ── -->
  <!--  px = 110 + cx * 580,   py = 585 − cy * 530                              -->
  <!--  Dot fill = classification colour (not zone colour):                      -->
  <!--    Core capability     #C62828  (dark red)                                -->
  <!--    Supporting cap.     #E65100  (dark orange)                             -->
  <!--    Generic capability  #1565C0  (dark blue)                               -->

  <!-- BSP.001 (0.95, 0.90) → px=661  py=108 — classified Core -->
  <circle cx="661" cy="108" r="10" fill="#C62828" stroke="white" stroke-width="2"/>
  <text x="648" y="97" text-anchor="end" font-family="monospace" font-size="11" font-weight="bold" fill="#B71C1C">BSP.001</text>

  <!-- BSP.004 (0.70, 0.65) → px=516  py=240 — classified Supporting -->
  <circle cx="516" cy="240" r="9" fill="#E65100" stroke="white" stroke-width="2"/>
  <text x="527" y="236" text-anchor="start" font-family="monospace" font-size="11" fill="#BF360C">BSP.004</text>

  <!-- BSP.003 (0.65, 0.60) → px=487  py=267 — classified Supporting -->
  <circle cx="487" cy="267" r="9" fill="#E65100" stroke="white" stroke-width="2"/>
  <text x="476" y="283" text-anchor="end" font-family="monospace" font-size="11" fill="#BF360C">BSP.003</text>

  <!-- DAT.001 (0.55, 0.55) → px=429  py=293 — classified Supporting -->
  <circle cx="429" cy="293" r="9" fill="#E65100" stroke="white" stroke-width="2"/>
  <text x="418" y="288" text-anchor="end" font-family="monospace" font-size="11" fill="#BF360C">DAT.001</text>

  <!-- BSP.002 (0.55, 0.50) → px=429  py=320 — classified Supporting (offset 4px from boundary) -->
  <circle cx="429" cy="324" r="9" fill="#E65100" stroke="white" stroke-width="2"/>
  <text x="440" y="338" text-anchor="start" font-family="monospace" font-size="11" fill="#BF360C">BSP.002</text>

  <!-- CAN.001 (0.45, 0.35) → px=371  py=399 — classified Supporting -->
  <circle cx="371" cy="399" r="9" fill="#E65100" stroke="white" stroke-width="2"/>
  <text x="382" y="394" text-anchor="start" font-family="monospace" font-size="11" fill="#BF360C">CAN.001</text>

  <!-- CAN.002 (0.40, 0.35) → px=342  py=399 — classified Supporting -->
  <circle cx="342" cy="399" r="9" fill="#E65100" stroke="white" stroke-width="2"/>
  <text x="331" y="394" text-anchor="end" font-family="monospace" font-size="11" fill="#BF360C">CAN.002</text>

  <!-- B2B.001 (0.25, 0.30) → px=255  py=426 — classified Generic -->
  <circle cx="255" cy="426" r="9" fill="#1565C0" stroke="white" stroke-width="2"/>
  <text x="266" y="421" text-anchor="start" font-family="monospace" font-size="11" fill="#0D47A1">B2B.001</text>

  <!-- REF.001 (0.25, 0.25) → px=255  py=452 — classified Generic -->
  <circle cx="255" cy="452" r="9" fill="#1565C0" stroke="white" stroke-width="2"/>
  <text x="266" y="458" text-anchor="start" font-family="monospace" font-size="11" fill="#0D47A1">REF.001</text>

  <!-- PIL.001 (0.20, 0.25) → px=226  py=452 — classified Generic (shifted down 14px to avoid REF.001) -->
  <circle cx="226" cy="466" r="9" fill="#1565C0" stroke="white" stroke-width="2"/>
  <text x="215" y="471" text-anchor="end" font-family="monospace" font-size="11" fill="#0D47A1">PIL.001</text>

  <!-- SUP.001 (0.15, 0.20) → px=197  py=479 — classified Generic -->
  <circle cx="197" cy="485" r="9" fill="#1565C0" stroke="white" stroke-width="2"/>
  <text x="186" y="500" text-anchor="middle" font-family="monospace" font-size="11" fill="#0D47A1">SUP.001</text>

  <!-- ── Legend ── -->
  <rect x="110" y="638" width="580" height="55" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <text x="400" y="653" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#424242">Légende — couleur du point = classification, position = score</text>

  <!-- Row 1 -->
  <circle cx="130" cy="667" r="7" fill="#C62828" stroke="white" stroke-width="1"/>
  <text x="143" y="671" font-family="sans-serif" font-size="10" fill="#212121">Core — BSP.001 (Remédiation Comportementale)</text>

  <circle cx="440" cy="667" r="7" fill="#E65100" stroke="white" stroke-width="1"/>
  <text x="453" y="671" font-family="sans-serif" font-size="10" fill="#212121">Supporting — BSP.002/003/004 · CAN.001/002 · DAT.001</text>

  <!-- Row 2 -->
  <circle cx="130" cy="683" r="7" fill="#1565C0" stroke="white" stroke-width="1"/>
  <text x="143" y="687" font-family="sans-serif" font-size="10" fill="#212121">Generic — B2B.001 · REF.001 · PIL.001 · SUP.001</text>

</svg>
