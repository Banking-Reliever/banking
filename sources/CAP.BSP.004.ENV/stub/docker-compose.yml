services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bsp-004-env-stub-rabbitmq
    hostname: bsp-004-env-stub-rabbitmq
    ports:
      - "45481:5672"    # AMQP
      - "45482:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

# CAP.BSP.004.ENV — development stub local infra (RabbitMQ only).
# No MongoDB, no domain persistence — Mode B is contract+stub, not a full microservice.
#
# Once running:
#   AMQP    : amqp://guest:guest@localhost:45481/
#   Mgmt UI : http://localhost:45482  (guest/guest)
#
# Then start the stub:
#   STUB_Stub__Active=true dotnet run --project src/Reliever.EnvelopeManagement.Stub
