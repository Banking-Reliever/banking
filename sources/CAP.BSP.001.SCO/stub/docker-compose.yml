version: "3.9"
# Local development stack for the CAP.BSP.001.SCO publication stub.
# Per ADR-TECH-STRAT-001 the stub publishes resource events on the operational
# RabbitMQ rail. No MongoDB, no analytics rail — this is a contract+stub
# scaffold (Mode B), not a full microservice.

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: cap-bsp-001-sco-stub-rabbitmq
    ports:
      - "47656:5672"   # AMQP — RABBIT_PORT
      - "47657:15672"  # Management UI — RABBIT_MGMT_PORT
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
