services:
  mongodb:
    image: mongo:7
    container_name: policy-management-mongodb
    ports:
      - "47512:27017"
    volumes:
      - mongodb_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 10

  mongodb-init:
    image: mongo:7
    container_name: policy-management-mongodb-init
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongodb --eval "
        try {
          rs.status();
          print('Replica set already initialized');
        } catch (err) {
          rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'localhost:27017'}]});
          print('Replica set initialized');
        }
      "
    restart: "no"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: policy-management-rabbitmq
    ports:
      - "47612:5672"
      - "47613:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 5

  rabbitmq-init:
    image: rabbitmq:3-management
    container_name: policy-management-rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    entrypoint: >
      bash -c "
        rabbitmqadmin -H rabbitmq -u admin -p password declare vhost name=policy-management &&
        rabbitmqadmin -H rabbitmq -u admin -p password declare permission vhost=policy-management user=admin configure='.*' write='.*' read='.*' &&
        echo 'RabbitMQ virtual host configured successfully'
      "
    restart: "no"

volumes:
  mongodb_data:
  rabbitmq_data:
